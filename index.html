<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APG BOCHUM</title>
    <style>
        body {
            background: linear-gradient(135deg, #1a4a6e, #0d2a3a);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background: #1e293b;
            padding: 40px;
            border-radius: 32px;
            border: 2px solid #38bdf8;
            width: 350px;
            text-align: center;
        }
        h2 { color: #38bdf8; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 24px;
            border: 1px solid #38bdf8;
            background: #0f172a;
            color: white;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border-radius: 24px;
            border: none;
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
        }
        .error { color: #ef4444; margin-top: 10px; }
        .hidden { display: none; }
        .welcome {
            background: #1e293b;
            padding: 40px;
            border-radius: 32px;
            border: 2px solid #38bdf8;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="loginScreen" class="login-card">
    <h2>⚡ APG LOGIN</h2>
    <input type="text" id="username" placeholder="Nachname">
    <input type="password" id="password" placeholder="Passwort">
    <button onclick="login()">ANMELDEN</button>
    <div id="errorMsg" class="error"></div>
</div>

<div id="welcomeScreen" class="welcome hidden">
    <h2>✅ Willkommen bei APG</h2>
    <p id="welcomeText" style="margin: 20px 0; color: #22c55e;"></p>
    <button onclick="logout()">ABMELDEN</button>
</div>

<script>
    const USERS = {
        "Keskin": "517",
        "Uzun": "1433", 
        "Kunert": "502"
    };

    function login() {
        let username = document.getElementById('username').value.trim();
        let password = document.getElementById('password').value.trim();
        
        if (USERS[username] && USERS[username] === password) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('welcomeScreen').classList.remove('hidden');
            document.getElementById('welcomeText').innerHTML = "👤 Angemeldet: " + username;
        } else {
            document.getElementById('errorMsg').innerHTML = "❌ Falscher Benutzername oder Passwort!";
        }
    }

    function logout() {
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('welcomeScreen').classList.add('hidden');
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        document.getElementById('errorMsg').innerHTML = '';
    }
</script>

</body>
</html>
