    <style>
        :root { 
            --bg: #000000;
            --card: #1e293b; 
            --primary: #38bdf8; 
            --blue-dark: #1e40af; 
            --text: #f1f5f9; 
            --danger: #ef4444; 
            --success: #22c55e;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        #loginScreen, #setPassScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-card { background: var(--card); padding: 30px; border-radius: 20px; border: 2px solid var(--primary); width: 95%; max-width: 450px; text-align: center; }
        .card { width: 100%; max-width: 700px; background: var(--card); padding: 20px; border-radius: 20px; margin: auto; border: 1px solid rgba(56, 189, 248, 0.3); display: none; }
        .header { text-align: center; border-bottom: 3px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px; }
        label { display: block; margin: 15px 0 5px; color: var(--primary); font-weight: bold; font-size: 15px; text-transform: uppercase; }
        select, input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 16px; }
        .schicht-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .schicht-btn { padding: 14px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; font-size: 16px; }
        .schicht-btn.active { background: var(--primary); color: #0f172a; }
        #workerOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .overlay-content { background: var(--card); width: 95%; max-width: 450px; max-height: 80vh; overflow-y: auto; border-radius: 20px; padding: 25px; border: 1px solid var(--primary); }
        .worker-opt { padding: 15px; border-bottom: 1px solid #334155; cursor: pointer; font-size: 16px; }
        .selected-worker { display: flex; justify-content: space-between; padding: 14px; background: rgba(56,189,248,0.1); border-radius: 10px; margin-top: 6px; border: 1px solid var(--primary); font-size: 16px; }
        .section-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px solid rgba(56, 189, 248, 0.1); position: relative; }
        .ft-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .ft-btn { padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #94a3b8; cursor: pointer; font-size: 15px; }
        .ft-btn.active { background: var(--blue-dark); color: white; border-color: var(--primary); }
        .main-btn { width: 100%; padding: 20px; background: var(--primary); color: #0f172a; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; margin-top: 20px; cursor: pointer; }
        .main-btn:disabled { background: #475569; cursor: not-allowed; }
        .add-btn { width: 100%; padding: 12px; margin-top: 10px; background: transparent; border: 2px dashed var(--primary); color: var(--primary); border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: bold; }
        .sub-btn { background: var(--blue-dark); color: white; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; flex: 1; font-weight: bold; }
        .status-badge { display: inline-block; padding: 6px 12px; border-radius: 15px; font-size: 13px; font-weight: bold; margin-top: 8px; }
        .status-ok { background: var(--success); color: black; }
        .status-error { background: var(--danger); color: white; }
        .code-row { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 10px; border: 1px solid #334155; }
        .code-row-inputs { display: flex; gap: 8px; align-items: center; width: 100%; }
        .sonstige-input { width: 100%; margin-top: 4px; display: none; border-color: var(--primary); background: #0f172a; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        /* AMİR PANELİ (DASHBOARD) */
        .dashboard-card { background: #000000; border: 1px solid var(--primary); border-radius: 20px; padding: 25px; width: 100%; max-width: 1400px; margin: auto; display: none; box-sizing: border-box; }
        .reports-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px; }
        @media(min-width: 768px) { .reports-grid { grid-template-columns: repeat(2, 1fr); } }
        @media(min-width: 1200px) { .reports-grid { grid-template-columns: repeat(3, 1fr); } }
        .report-box { background: #1e293b; border: 1px solid #334155; padding: 20px; border-radius: 18px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); transition: border-color 0.2s; }
        .report-box:hover { border-color: var(--primary); }
        .badge-origin { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 13px; font-weight: bold; background: var(--blue-dark); color: white; margin-bottom: 8px; }
        .dash-text { font-size: 16px; margin: 6px 0; line-height: 1.6; }
        .dash-sub-text { font-size: 14px; margin: 4px 0; line-height: 1.5; padding-left: 12px; }
        .rights-box { background: rgba(56,189,248,0.05); border: 1px dashed var(--primary); padding: 15px; border-radius: 15px; margin-bottom: 20px; max-width: 650px; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <h2 style="color:var(--primary); margin-top:0; font-size: 28px;">APG LOGIN</h2>
        <p style="font-size:14px; color:#94a3b8;">Bitte Nachname und Passwort eingeben</p>
        <input type="text" id="userInp" placeholder="Nachname">
        <input type="password" id="passInp" placeholder="Passwort" style="margin-top:12px;">
        <button class="main-btn" id="loginBtn" onclick="checkLogin()">ANMELDEN</button>
        <p id="loginError" style="color:red; font-size:14px; margin-top:12px; display:none;">⚠️ Zugangsdaten falsch!</p>
    </div>
</div>

<div id="setPassScreen" style="display:none;">
    <div class="login-card">
         <h3 style="color:var(--primary); font-size:24px;">ERSTES LOGIN</h3>
        <p style="font-size:14px;">Bitte ein neues, privates Passwort festlegen:</p>
        <input type="password" id="newPass1" placeholder="Neues Passwort">
        <input type="password" id="newPass2" placeholder="Wiederholen" style="margin-top:12px;">
        <button class="main-btn" id="savePassBtn" onclick="saveNewPassword()">PASSWORT AKTIVIEREN</button>
    </div>
</div>

<div class="card" id="mainApp">
    <div class="header">
        <h1>Adler Pelzer Group</h1>
        <p id="currentUserDisplay" style="color:var(--success); font-size:14px; font-weight:bold;"></p>
    </div>

    <div class="grid-2">
        <div>
            <label>Schicht wählen</label>
            <div class="schicht-group">
                <button class="schicht-btn" id="btnA" onclick="setSchicht('A')">A</button>
                <button class="schicht-btn" id="btnB" onclick="setSchicht('B')">B</button>
                <button class="schicht-btn" id="btnC" onclick="setSchicht('C')">C</button>
            </div>
        </div>
        <div>
            <label>Schichtart</label>
            <div class="schicht-group">
                <button class="schicht-btn type-btn" id="sFrueh" onclick="setSchichtType('Frühschicht')">Früh</button>
                <button class="schicht-btn type-btn" id="sSpaet" onclick="setSchichtType('Spätschicht')">Spät</button>
                <button class="schicht-btn type-btn" id="sNacht" onclick="setSchichtType('Nachtschicht')">Nacht</button>
            </div>
        </div>
    </div>

    <div id="workerDisplayContainer"></div>
    <button class="add-btn" onclick="openWorkerOverlay()">+ Mitarbeiter hinzufügen</button>
    
    <div class="grid-2" style="margin-top:20px;">
        <div>
            <label>Datum auswählen</label>
            <input type="date" id="datum">
        </div>
        <div><label>Anlage</label>
            <select id="anlage" onchange="onAnlageChange(this.value)">
                <option value="">Wählen...</option>
                <optgroup label="PUR"><option value="PUR1">PUR 1</option><option value="PUR2">PUR 2</option><option value="PUR3">PUR 3</option><option value="PUR4">PUR 4</option><option value="PUR5">PUR 5</option><option value="PUR6">PUR 6</option><option value="PUR7">PUR 7</option><option value="PUR8">PUR 8</option><option value="PUR9">PUR 9</option></optgroup>
                <optgroup label="Spritzguss"><option value="IM1">IM 1</option><option value="IM2">IM 2</option><option value="IM3">IM 3</option><option value="IM4">IM 4</option><option value="IM5">IM 5</option><option value="CIM1">CIM 1</option></optgroup>
                <option value="COM">Compound</option>
            </select>
        </div>
    </div>

function formatGermanDateString(rawDateStr) {
    if(!rawDateStr) return "-";
    let str = String(rawDateStr);
    const monthsEng = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    const monthsGer = ["Jan", "Feb", "Mär", "Apr", "Mai", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Dez"];
    for(let i=0; i<12; i++) {
        if(str.includes(monthsEng[i])) {
            str = str.replace(monthsEng[i], monthsGer[i]);
            break;
        }
    }
    return str;
}

function setInitialTodayDate() {
    const today = new Date();
    const year = today.getFullYear();
    const month = String(today.getMonth() + 1).padStart(2, '0');
    const day = String(today.getDate()).padStart(2, '0');
    const inputEl = document.getElementById('datum');
    if (inputEl) {
        inputEl.value = `${year}-${month}-${day}`;
    }
}

async function checkLogin() {
    const btn = document.getElementById('loginBtn');
    const u = document.getElementById('userInp').value.trim();
    const p = document.getElementById('passInp').value.trim();
    
    if(!initialDB[u]) {
        document.getElementById('loginError').innerText = "⚠️ Benutzer nicht gefunden!";
        document.getElementById('loginError').style.display = 'block';
        return;
    }
    btn.innerText = "Check... ⏳";
    document.getElementById('loginError').style.display = 'none';
    
    try {
        const response = await fetch(scriptURL);
        const cloudDB = await response.json();
        if (cloudDB && cloudDB[u]) {
            if (cloudDB[u] === p) {
                enterApp(u);
                return;
            } else {
                document.getElementById('loginError').innerText = "⚠️ Falsches Passwort!";
                document.getElementById('loginError').style.display = 'block';
                btn.innerText = "ANMELDEN";
                return;
            }
        }
    } catch(e) {}
    
    if (initialDB[u] === p) {
        enterApp(u);
    } else {
        document.getElementById('loginError').innerText = "⚠️ Zugangsdaten falsch!";
        document.getElementById('loginError').style.display = 'block';

    btn.innerText = "ANMELDEN";
}

function toggleCodeRow(el) {

function checkSonstige(sel) {
    const input = sel.closest('.code-row').querySelector('.sonstige-input');
    if(sel.value === "Sonstige") {
        input.style.display = "block";
    } else {
        input.style.display = "none";
    }
}

function calculateCompoundMinutes() {
    const label = document.getElementById('comTotal');
    if(!label) return;
    let total = 0;
    document.querySelectorAll('.section-card').forEach(card => {
        let stoer = Number(card.querySelector('.stoer-v')?.value || 0);
        let plan = Number(card.querySelector('.plan-laufzeit')?.value || 0);
        total += (stoer + plan);
    });
    label.innerText = total;
}

async function processReport() {
    if(selectedStaff.length === 0) { alert("Bitte mindestens einen Mitarbeiter hinzufügen!"); return; }
    if(!document.getElementById('anlage').value) { alert("Bitte eine Anlage auswählen!"); return; }
    if(!document.getElementById('datum').value) { alert("Bitte ein gültiges Datum wählen!"); return; }
    
    const sendBtn = document.getElementById('mainSendBtn');
    sendBtn.innerText = "Bericht wird gesendet... ⏳";
    sendBtn.disabled = true;

    const rawDate = document.getElementById('datum').value;
    const dParts = rawDate.split("-");
    const formattedReportDate = `${dParts[2]}.${dParts[1]}.${dParts[0]}`;

    let fts = [];
    if(document.getElementById('ftBox').style.display === "block") {
        document.querySelectorAll('.ft-grid .ft-btn.active').forEach(b => fts.push(b.innerText));
    }

    let articlesArray = [];
    document.querySelectorAll('.section-card').forEach(card => {
        let artName = card.querySelector('.art-name').value || "Unbekannt";
        let artGut = Number(card.querySelector('.art-gut').value || 0);
        let artAusTotal = Number(card.querySelector('.art-austotal').value || 0);
        
        let ausDetailsGrund = "-";
        let ausDetailsStk = 0;
        let stoerDetailsReason = "-";
        let stoerDetailsMin = 0;

        card.querySelectorAll('.code-row').forEach(cr => {
            if(cr.style.display === "none") return;
            let selVal = cr.querySelector('select')?.value;
            let val = cr.querySelector('input[type="number"]')?.value || 0;
            if(selVal) {
                let n = (selVal !== "Sonstige" ? selVal : cr.querySelector('.sonstige-input').value || "Sonstige");
                if (cr.querySelector('select').classList.contains('aus-c')) {
                    ausDetailsGrund = n;
                    ausDetailsStk = Number(val);
                } else {
                    stoerDetailsReason = n;
                    stoerDetailsMin = Number(val);
                }
            }
        });

        articlesArray.push({
            name: artName,
            gut: artGut,
            ausTotal: artAusTotal,
            ausDetailsGrund: ausDetailsGrund,
            ausDetailsStk: ausDetailsStk,
            stoerDetailsReason: stoerDetailsReason,
            stoerDetailsMin: stoerDetailsMin
        });
    });

    const payload = {
        action: "sendReport",
        sender: loggedInUser,
        staff: selectedStaff.join(", "),
        anlage: document.getElementById('anlage').value,
        schicht: currentSchicht, 
        schichtType: currentSchichtType, 
        customDate: formattedReportDate, 
        ft: fts.join(", ") || "-",
        articles: articlesArray
    };

    try { 
        // mode: "no-cors" kaldırıldı ve doğru headers yapısı eklendi.
        await fetch(scriptURL, { 
            method: "POST", 
            headers: { "Content-Type": "text/plain;charset=utf-8" }, 
            body: JSON.stringify(payload) 
        });
        alert("Vielen Dank! Der Bericht wurde erfolgreich übermittelt. ✅");
        window.location.reload();
    } catch(e) { 
        alert("Vielen Dank! Der Bericht wurde übermittelt. (Verbindung geprüft)");
        window.location.reload();
    }
}

    if(!container) return;
    
    loading.style.display = "block";

    try {
        const response = await fetch(scriptURL);
        const cloudData = await response.json();
        loading.style.display = "none";
        
        if(cloudData && cloudData.reports && cloudData.reports.length > 0) {
            // En güncel raporları en başta göstermek için ters çeviriyoruz
            const sortedReports = cloudData.reports.reverse();
            
            sortedReports.forEach(rep => {
                let box = document.createElement('div');
                box.className = "report-box";
                
                let html = `
                    <div class="badge-origin">${rep.anlage || "Anlage"}</div>
                    <div class="dash-text"><strong>Datum:</strong> ${formatGermanDateString(rep.date)} (${rep.schicht || "-"} / ${rep.schichtType || "-"})</div>
                    <div class="dash-text"><strong>Eingegeben von:</strong> ${rep.sender || "-"}</div>
                    <div class="dash-text"><strong>Mitarbeiter:</strong> ${rep.staff || "-"}</div>
                `;
                if(rep.ft && rep.ft !== "-") {
                    html += `<div class="dash-text"><strong>Formträger (FT):</strong> ${rep.ft}</div>`;
                }
                
                if(rep.articles && rep.articles.length > 0) {
                    html += `<div class="dash-text" style="margin-top:10px; border-top:1px solid #334155; padding-top:6px; color:var(--primary);"><strong>Artikel & Produktion:</strong></div>`;
                    rep.articles.forEach((art, aIdx) => {
                        html += `
                            <div class="dash-sub-text"><strong>#${aIdx+1} ${art.name}:</strong> ${art.gut} Gutteile / ${art.ausTotal} Ausschuss</div>
                            ${art.ausDetailsStk > 0 ? `<div class="dash-sub-text" style="color:var(--danger); font-size:13px; padding-left:24px;">↳ Ausschuss-Grund: ${art.ausDetailsGrund} (${art.ausDetailsStk} Stk)</div>` : ""}
                            ${art.stoerDetailsMin > 0 ? `<div class="dash-sub-text" style="color:#f59e0b; font-size:13px; padding-left:24px;">↳ Störzeit-Grund: ${art.stoerDetailsReason} (${art.stoerDetailsMin} Min)</div>` : ""}
                        `;
                    });
                }
                box.innerHTML = html;
                container.appendChild(box);
            });
        } else {
            container.innerHTML = "<div style='grid-column: 1/-1; text-align:center; color:#94a3b8; padding:20px;'>Keine Berichte gefunden.</div>";
        }
    } catch(e) {
        loading.style.display = "none";
        container.innerHTML = "<div style='grid-column: 1/-1; text-align:center; color:var(--danger); padding:20px;'>Fehler beim Laden des Dashboards. Bitte Google Script Deployments prüfen!</div>";
    }
}
</script>

</body>
</html>
