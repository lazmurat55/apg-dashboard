<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APG BOCHUM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a4a6e 0%, #0d2a3a 100%);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 32px;
            border: 2px solid #38bdf8;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h2 { color: #38bdf8; margin-bottom: 20px; font-size: 28px; }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 24px;
            border: 1px solid #38bdf8;
            background: rgba(15, 23, 42, 0.9);
            color: white;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            border-radius: 24px;
            border: none;
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { transform: scale(1.02); background: #7dd3fc; }
        .error { color: #ff6b6b; margin-top: 15px; font-size: 14px; }
        .success { color: #22c55e; margin-top: 15px; }
        .hidden { display: none; }
        .card, .dashboard-card {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 32px;
            border: 2px solid #38bdf8;
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }
        .dashboard-card { max-width: 1400px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .schicht-group { display: flex; gap: 10px; margin: 10px 0; }
        .schicht-btn, .type-btn, .filter-btn {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid #38bdf8;
            padding: 10px;
            border-radius: 30px;
            cursor: pointer;
            text-align: center;
        }
        .schicht-btn.active, .type-btn.active, .filter-btn.active-filter {
            background: #38bdf8;
            color: #0f172a;
        }
        .selected-worker {
            background: rgba(56,189,248,0.15);
            padding: 10px;
            border-radius: 20px;
            margin-top: 5px;
            border: 1px solid #38bdf8;
            display: flex;
            justify-content: space-between;
        }
        .add-btn { background: transparent; border: 2px dashed #38bdf8; color: #38bdf8; padding: 10px; border-radius: 24px; cursor: pointer; }
        .main-btn { background: #38bdf8; color: #0f172a; padding: 14px; border-radius: 24px; font-weight: bold; cursor: pointer; }
        .filter-group { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
        .report-box { background: rgba(15, 23, 42, 0.8); padding: 15px; border-radius: 20px; border: 1px solid #38bdf8; margin-bottom: 10px; }
        .reports-grid { display: grid; gap: 15px; margin-top: 20px; }
        @media (min-width: 800px) { .reports-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1200px) { .reports-grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-card">
    <h2>⚡ APG BOCHUM</h2>
    <input type="text" id="username" placeholder="Nachname">
    <input type="password" id="password" placeholder="Passwort">
    <button onclick="login()">ANMELDEN</button>
    <div id="loginMessage" class="error"></div>
</div>

<!-- İŞÇİ EKRANI -->
<div id="mainApp" class="card hidden">
    <h2>📋 APG Produktion</h2>
    <p id="userDisplay" class="success"></p>
    <div class="grid-2">
        <div><label>SCHICHT</label><div class="schicht-group"><button class="schicht-btn" onclick="setSchicht('A')">A</button><button class="schicht-btn" onclick="setSchicht('B')">B</button><button class="schicht-btn" onclick="setSchicht('C')">C</button></div></div>
        <div><label>SCHICHTART</label><div class="schicht-group"><button class="type-btn" onclick="setSchichtType('Frühschicht')">Früh</button><button class="type-btn" onclick="setSchichtType('Spätschicht')">Spät</button><button class="type-btn" onclick="setSchichtType('Nachtschicht')">Nacht</button></div></div>
    </div>
    <div id="workerList"></div>
    <button class="add-btn" onclick="alert('Mitarbeiter Funktion')">➕ Mitarbeiter</button>
    <div class="grid-2"><div><label>DATUM</label><input type="date" id="datum"></div><div><label>ANLAGE</label><select id="anlage"><option>PUR1</option><option>IM1</option></select></div></div>
    <button class="main-btn" onclick="alert('Bericht gesendet!')">📤 SPEICHERN & SENDEN</button>
    <button onclick="logout()" style="margin-top:10px; background:#475569;">ABMELDEN</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="dashboard-card hidden">
    <h2>📊 APG Live Dashboard</h2>
    <p id="adminDisplay" class="success"></p>
    <div class="filter-group"><button class="filter-btn" onclick="filterSchicht('A')">🔵 A</button><button class="filter-btn active-filter" onclick="filterSchicht('B')">🟢 B</button><button class="filter-btn" onclick="filterSchicht('C')">🟠 C</button></div>
    <button class="main-btn" onclick="loadDashboard()">🔄 AKTUALISIEREN</button>
    <div id="reportsContainer" class="reports-grid"></div>
    <button onclick="logout()" style="margin-top:20px; background:#475569;">ABMELDEN</button>
</div>

<script>
// ============================================
// BASİT VE SAĞLAM LOGIN SİSTEMİ
// ============================================

// KULLANICILAR (Nachname : Passwort)
const USERS = {
    "Keskin": "517",
    "Uzun": "1433",
    "Kunert": "502",
    "Aldirmaz": "577",
    "Beher": "510"
};

let currentUser = "";
let currentFilter = "B";

// LOGIN FONKSİYONU
function login() {
    let username = document.getElementById('username').value.trim();
    let password = document.getElementById('password').value.trim();
    let msgDiv = document.getElementById('loginMessage');
    
    if (USERS[username] && USERS[username] === password) {
        currentUser = username;
        document.getElementById('loginScreen').classList.add('hidden');
        
        // KESKIN ADMIN PANELİ GÖRÜR
        if (username === "Keskin") {
            document.getElementById('adminPanel').classList.remove('hidden');
            document.getElementById('adminDisplay').innerHTML = "👑 Willkommen, " + username + " (Admin)";
            loadDashboard();
        } 
        // DİĞER KULLANICILAR İŞÇİ EKRANI GÖRÜR
        else {
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userDisplay').innerHTML = "👤 Angemeldet: " + username;
            setTodayDate();
        }
        msgDiv.innerHTML = "";
    } else {
        msgDiv.innerHTML = "❌ Falscher Benutzername oder Passwort!";
    }
}

function logout() {
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('mainApp').classList.add('hidden');
    document.getElementById('adminPanel').classList.add('hidden');
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    document.getElementById('loginMessage').innerHTML = '';
}

// İŞÇİ EKRANI
function setTodayDate() {
    let today = new Date();
    let year = today.getFullYear();
    let month = String(today.getMonth() + 1).padStart(2, '0');
    let day = String(today.getDate()).padStart(2, '0');
    document.getElementById('datum').value = `${year}-${month}-${day}`;
}

function setSchicht(s) {
    document.querySelectorAll('.schicht-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.innerText === s) btn.classList.add('active');
    });
}

function setSchichtType(t) {
    document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
    let btns = document.querySelectorAll('.type-btn');
    if(t === 'Frühschicht') btns[0]?.classList.add('active');
    if(t === 'Spätschicht') btns[1]?.classList.add('active');
    if(t === 'Nachtschicht') btns[2]?.classList.add('active');
}

// ADMIN DASHBOARD
function filterSchicht(s) {
    currentFilter = s;
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active-filter');
        btn.style.background = "#0f172a";
    });
    event.target.classList.add('active-filter');
    event.target.style.background = "#38bdf8";
    loadDashboard();
}

function loadDashboard() {
    let container = document.getElementById('reportsContainer');
    container.innerHTML = `<p style="text-align:center; color:#94a3b8;">📊 Keine Berichte für Schicht ${currentFilter}</p>`;
}
</script>

</body>
</html>
