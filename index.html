<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APG BOCHUM SECURE PRO</title>
    <style>
        :root { 
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e293b);
            --card: #1e293b; 
            --card-inner: #334155;
            --primary: #38bdf8; 
            --blue-dark: #0284c7; 
            --text: #f8fafc; 
            --text-muted: #94a3b8;
            --danger: #f43f5e; 
            --success: #4ade80; 
            --border: #475569; 
            /* Yeni Kontrast Renkleri */
            --orange-bright: #fb923c; /* Zor okunan Störung mavisi yerine parlak turuncu */
            --text-bright: #ffffff;    /* Gizlenen işçi isimleri için net beyaz */
            /* Ausschuss İyileştirmesi İçin Yeni Renk */
            --yellow-bright: #e9f838; /* Koyu kırmızı yerine parlak neon sarısı */
        }
        body { background: var(--bg-gradient); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; min-height: 100vh; box-sizing: border-box; }
        #loginScreen, #setPassScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-gradient); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-card { background: var(--card); padding: 30px; border-radius: 20px; border: 2px solid var(--primary); width: 95%; max-width: 450px; text-align: center; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); }
        .card { width: 100%; max-width: 700px; background: var(--card); padding: 20px; border-radius: 20px; margin: auto; border: 1px solid var(--border); display: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2); }
        .header { text-align: center; border-bottom: 3px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px; }
        label { display: block; margin: 15px 0 5px; color: var(--primary); font-weight: bold; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        select, input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--card-inner); color: var(--text); box-sizing: border-box; font-size: 14px; }
        select:focus, input:focus { outline: none; border-color: var(--primary); }
        .schicht-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .schicht-btn { padding: 12px; background: #334155; border: 1px solid var(--border); border-radius: 10px; color: var(--text); cursor: pointer; font-weight: bold; font-size: 14px; transition: all 0.2s; }
        .schicht-btn.active { background: var(--primary); color: #0f172a; border-color: var(--primary); box-shadow: 0 0 10px rgba(56, 189, 248, 0.4); }
        #workerOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .overlay-content { background: var(--card); width: 95%; max-width: 450px; max-height: 80vh; overflow-y: auto; border-radius: 20px; padding: 25px; border: 1px solid var(--border); }
        .worker-opt { padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 14px; color: var(--text); }
        .worker-opt:hover { background: var(--card-inner); color: var(--primary); }
        .selected-worker { display: flex; justify-content: space-between; padding: 12px; background: rgba(56, 189, 248, 0.15); border-radius: 10px; margin-top: 6px; border: 1px solid var(--primary); font-size: 14px; }
        .section-card { background: var(--card-inner); padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px solid var(--border); position: relative; }
        .ft-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .ft-btn { padding: 10px; background: #334155; border: 1px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; font-size: 13px; font-weight: bold; }
        .ft-btn.active { background: var(--blue-dark); color: white; border-color: var(--primary); box-shadow: 0 0 8px rgba(2, 132, 199, 0.5); }
        .main-btn { width: 100%; padding: 16px; background: var(--primary); color: #0f172a; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; margin-top: 20px; cursor: pointer; transition: all 0.2s; }
        .main-btn:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; box-shadow: none; }
        .add-btn { width: 100%; padding: 10px; margin-top: 10px; background: transparent; border: 2px dashed var(--primary); color: var(--primary); border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: bold; transition: all 0.2s; }
        .add-btn:hover { background: rgba(56, 189, 248, 0.1); }
        .sub-btn { background: var(--blue-dark); color: white; padding: 8px 12px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: bold; white-space: nowrap; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 15px; font-size: 11px; font-weight: bold; margin-top: 8px; }
        .status-ok { background: var(--success); color: #0f172a; }
        .status-error { background: var(--danger); color: white; }
        .code-row { margin-top: 10px; padding: 10px; background: var(--card); border-radius: 10px; border: 1px solid var(--border); }
        .code-row-inputs { display: flex; gap: 8px; align-items: center; width: 100%; }
        .code-row-inputs select { flex: 3; margin: 0; }
        .code-row-inputs input { flex: 1; min-width: 70px; margin: 0; }
        .sonstige-input { width: 100%; margin-top: 6px; display: none; border-color: var(--primary); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        /* Dashboard ve Canlı Rapor Kutusu Alanları */
        .dashboard-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; width: 100%; max-width: 1400px; margin: auto; display: none; box-sizing: border-box; }
        .reports-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px; }
        @media(min-width: 768px) { .reports-grid { grid-template-columns: repeat(2, 1fr); } }
        @media(min-width: 1200px) { .reports-grid { grid-template-columns: repeat(3, 1fr); } }
        
        .report-box { background: var(--card-inner); border: 1px solid var(--border); padding: 18px; border-radius: 18px; transition: border-color 0.2s; margin-bottom: 10px; }
        .report-box:hover { border-color: var(--primary); }
        .badge-origin { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; background: var(--primary); color: #0f172a; margin-bottom: 8px; }
        
        /* Yenilenen Açık Renkli Rapor Yazı Stilleri (Görsel İyileştirmeler) */
        .report-box .report-date { font-size: 12px; color: #e2e8f0; font-weight: 500; margin-bottom: 8px; } 
        .report-box .report-artikel { font-size: 14px; font-weight: bold; margin-bottom: 6px; color: #ffffff; }
        
        /* Ausschuss: Koyu Kırmızı Yerine Parlak Neon Sarısı (Net Okunurluk) */
        .report-box .report-ausschuss { font-size: 13px; color: var(--yellow-bright); font-weight: bold; margin-bottom: 4px; }
        
        .report-box .report-störung { font-size: 13px; color: var(--orange-bright); font-weight: bold; } 
        .report-box .report-workers { font-size: 13px; margin-top: 8px; border-top: 1px solid var(--border); padding-top: 8px; color: var(--text-bright); font-weight: bold; } 

        .rights-box-compact { background: rgba(56, 189, 248, 0.08); border: 1px solid var(--border); padding: 12px 18px; border-radius: 12px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: space-between; }
        .rights-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; flex: 1; max-width: 850px; }
        .rights-controls select { padding: 8px 12px; background: var(--card-inner); border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-size: 13px; width: auto; min-width: 160px; }
        
        .filter-btn { padding: 10px 16px; background: #334155; border: 1px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; font-weight: bold; }
        .filter-btn.active-filter { border-color: var(--primary); background: var(--blue-dark); }
        optgroup { background: var(--card-inner); color: var(--text); }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <h2 style="color:var(--primary); margin-top: 0;">⚡ APG LOGIN</h2>
        <p style="font-size:14px; color: var(--text-muted);">Bitte Nachname und Passwort eingeben</p>
        <input type="text" id="userInp" placeholder="Nachname" style="margin-bottom: 10px;">
        <input type="password" id="passInp" placeholder="Passwort">
        <button class="main-btn" onclick="checkLogin()">ANMELDEN</button>
        <p id="loginError" style="color:var(--danger); font-size:14px; margin-top:12px; display:none;"></p>
    </div>
</div>

<div id="setPassScreen" style="display:none;">
    <div class="login-card">
        <h3 style="color:var(--primary);">📌 ERSTES LOGIN</h3>
        <p>Neues Passwort festlegen (min. 4 Zeichen)</p>
        <input type="password" id="newPass1" placeholder="Neues Passwort" style="margin-bottom: 10px;">
        <input type="password" id="newPass2" placeholder="Wiederholen">
        <button class="main-btn" onclick="saveNewPassword()">PASSWORT AKTIVIEREN</button>
    </div>
</div>

<div class="card" id="mainApp">
    <div class="header">
        <h1 style="margin: 0; color: var(--primary);">Adler Pelzer Group</h1>
        <p id="currentUserDisplay" style="color:var(--success); font-weight:bold; margin: 5px 0 0 0;"></p>
    </div>
    <div class="grid-2">
        <div><label>📌 Schicht</label><div class="schicht-group"><button class="schicht-btn" id="mSchichtA" onclick="setSchicht('A')">A</button><button class="schicht-btn" id="mSchichtB" onclick="setSchicht('B')">B</button><button class="schicht-btn" id="mSchichtC" onclick="setSchicht('C')">C</button></div></div>
        <div><label>⏳ Schichtart</label><div class="schicht-group"><button class="schicht-btn type-btn" onclick="setSchichtType('Frühschicht')">Früh</button><button class="schicht-btn type-btn" onclick="setSchichtType('Spätschicht')">Spät</button><button class="schicht-btn type-btn" onclick="setSchichtType('Nachtschicht')">Nacht</button></div></div>
    </div>
    <div id="workerDisplayContainer"></div>
    <button class="add-btn" onclick="openWorkerOverlay()">➕ Mitarbeiter hinzufügen</button>
    <div class="grid-2">
        <div><label>📅 Datum</label><input type="date" id="datum"></div>
        <div><label>🏭 Anlage</label><select id="anlage" onchange="onAnlageChange(this.value)"><option value="">Wählen...</option><optgroup label="PUR"><option value="PUR1">PUR 1</option><option value="PUR2">PUR 2</option><option value="PUR3">PUR 3</option><option value="PUR4">PUR 4</option><option value="PUR5">PUR 5</option><option value="PUR6">PUR 6</option><option value="PUR7">PUR 7</option><option value="PUR8">PUR 8</option><option value="PUR9">PUR 9</option></optgroup><optgroup label="Spritzguss"><option value="IM1">IM 1</option><option value="IM2">IM 2</option><option value="IM3">IM 3</option><option value="IM4">IM 4</option><option value="IM5">IM 5</option><option value="CIM1">CIM 1</option></optgroup><option value="COM">Compound</option></select></div>
    </div>
    <div id="ftBox" style="display:none;"><label>🧩 Formträger (FT)</label><div class="ft-grid"><button class="ft-btn" onclick="this.classList.toggle('active')">FT1</button><button class="ft-btn" onclick="this.classList.toggle('active')">FT2</button><button class="ft-btn" onclick="this.classList.toggle('active')">FT3</button><button class="ft-btn" onclick="this.classList.toggle('active')">FT4</button><button class="ft-btn" onclick="this.classList.toggle('active')">FT5</button><button class="ft-btn" onclick="this.classList.toggle('active')">FT6</button></div></div>
    <div id="comTimeBox" style="display:none; text-align:center; background:rgba(56, 189, 248, 0.15); border: 1px solid var(--primary); padding:10px; border-radius:10px; margin-top: 15px;"><span style="font-weight:bold; color:var(--primary);">Compound: <span id="comTotal">0</span> / 480 Min</span></div>
    <div id="artikelContainer"></div>
    <button class="add-btn" id="addArtikelBtn" disabled onclick="addArtikel()">📦 + Artikel hinzufügen</button>
    <button id="mainSendBtn" class="main-btn" disabled onclick="processReport()">🚀 SPEICHERN & SENDEN</button>
</div>

<div class="dashboard-card" id="adminPanel">
    <div class="header" style="border-bottom: none; margin-bottom: 10px;">
        <h1 style="margin: 0 0 5px 0;">📊 APG Live Dashboard</h1>
        <p id="adminUserDisplay" style="color:var(--primary); font-weight:bold; margin: 0 0 15px 0; font-size: 15px;"></p>
        
        <div id="rightsManagementBox" class="rights-box-compact" style="display:none;">
            <div class="rights-controls">
                <span style="font-size: 13px; font-weight: bold; color: var(--primary); white-space: nowrap;">🔐 Schichtleiter zuweisen:</span>
                <select id="rightsSelect"></select>
                <select id="assignedSchichtSelect">
                    <option value="A">Schicht A</option>
                    <option value="B" selected>Schicht B</option>
                    <option value="C">Schicht C</option>
                </select>
                <button class="sub-btn" onclick="grantSchichtleiterRights()">➕ Berechtigung geben</button>
            </div>
            <div id="currentManagersList" style="font-size:12px; color: var(--text-muted); text-align: right;"></div>
        </div>

        <div class="schicht-group" id="adminFilterGroup" style="max-width:450px; margin:15px auto 5px auto;">
            <button class="filter-btn" id="fltA" onclick="filterSchicht('A')">🔵 Schicht A</button>
            <button class="filter-btn" id="fltB" onclick="filterSchicht('B')">🟢 Schicht B</button>
            <button class="filter-btn" id="fltC" onclick="filterSchicht('C')">🟠 Schicht C</button>
        </div>
        <button class="main-btn" style="padding:10px 20px; font-size:13px; max-width:200px; margin:10px auto 0 auto; display: block;" onclick="loadAdminDashboard()">🔄 Aktualisieren</button>
    </div>
    
    <div id="reportsContainer" class="reports-grid"></div>
</div>

<div id="workerOverlay">
    <div class="overlay-content">
        <h3 style="color:var(--primary); margin-top: 0;">👥 Mitarbeiter wählen</h3>
        <div id="workerList" style="margin-bottom: 15px;"></div>
        <input type="text" id="manualWorker" placeholder="✏️ Name manuell..." style="margin-bottom: 10px;">
        <button class="add-btn" onclick="addManualWorker()">➕ Hinzufügen</button>
        <button class="main-btn" onclick="document.getElementById('workerOverlay').style.display='none'">Schließen</button>
    </div>
</div>

let currentSchicht = "B";

if(localStorage.getItem('apg_schichtleiter_db')) {
    try { schichtLeiterDb = JSON.parse(localStorage.getItem('apg_schichtleiter_db')); } catch(e){}
}

function setInitialTodayDate() {
    const today = new Date();
    document.getElementById('datum').value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
}

async function checkLogin() {
    const u = document.getElementById('userInp').value.trim();
    const p = document.getElementById('passInp').value.trim();
    const errorDiv = document.getElementById('loginError');
    if(!initialDB[u]) { errorDiv.innerText = "❌ Benutzer nicht gefunden!"; errorDiv.style.display = 'block'; return; }
    if (initialDB[u] === p) { enterApp(u); }
    else { errorDiv.innerText = "❌ Falsches Passwort!"; errorDiv.style.display = 'block'; }
}

function enterApp(u) { 
    loggedInUser = u; 
    document.getElementById('loginScreen').style.display = 'none'; 
    setInitialTodayDate();
    
    if (u === superAdmin) {
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminUserDisplay').innerHTML = "👑 Haupt-Admin: " + u;
        document.getElementById('rightsManagementBox').style.display = 'flex';
        document.getElementById('adminFilterGroup').style.display = 'grid';
        loadUserSelect();
        updateManagersList();
        filterSchicht('B');
    } 
    else if (schichtLeiterDb[u]) {
        const assignedSchicht = schichtLeiterDb[u];
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminUserDisplay').innerHTML = `🏃 Schichtleiter: ${u} (Vardiya ${assignedSchicht})`;
        document.getElementById('rightsManagementBox').style.display = 'none';
        
        document.querySelectorAll('.filter-btn').forEach(btn => btn.style.display = 'none');
        const targetBtn = document.getElementById('flt' + assignedSchicht);
        if(targetBtn) {
            targetBtn.style.display = 'inline-block';
            targetBtn.classList.add('active-filter');
        }
        filterSchicht(assignedSchicht);
    } 
    else {
        document.getElementById('mainApp').style.display = 'block'; 
        document.getElementById('currentUserDisplay').innerHTML = "👤 Angemeldet: " + u; 
        let foundSchicht = "B";
        if(workerData["A"].some(w => w.includes(u) || u.includes(w.split(" ")[0]))) foundSchicht = "A";
        if(workerData["C"].some(w => w.includes(u) || u.includes(w.split(" ")[0]))) foundSchicht = "C";
        setSchicht(foundSchicht); 
    }
}

function saveNewPassword() { alert("Passwort ändern"); enterApp(loggedInUser); }

function loadUserSelect() {
    const select = document.getElementById('rightsSelect');
    select.innerHTML = '<option value="">Mitarbeiter wählen...</option>' + Object.keys(initialDB).filter(x => x !== superAdmin).map(u => `<option value="${u}">${u}</option>`).join('');
}

function updateManagersList() { 
    let listText = "Aktiv: ";
    const entries = Object.entries(schichtLeiterDb);
    if(entries.length === 0) listText += "Keine Leiter zugewiesen";
    else listText += entries.map(([name, schicht]) => `${name} (${schicht})`).join(', ');
    document.getElementById('currentManagersList').innerHTML = listText; 
}

function grantSchichtleiterRights() {
    const name = document.getElementById('rightsSelect').value;
    const schicht = document.getElementById('assignedSchichtSelect').value;
    if(!name) { alert("Bitte wählen Sie einen Mitarbeiter!"); return; }
    
    schichtLeiterDb[name] = schicht;
    localStorage.setItem('apg_schichtleiter_db', JSON.stringify(schichtLeiterDb));
    updateManagersList();
    alert(`✅ ${name} wurde als Schichtleiter für Schicht ${schicht} zugewiesen!`);
}

function setSchicht(s) { 
    currentSchicht = s; 
    document.querySelectorAll('.schicht-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById('mSchicht' + s)?.classList.add('active');
    selectedStaff = []; renderStaff(); 
    if (s === "A") setSchichtType('Frühschicht');
    else if (s === "B") setSchichtType('Spätschicht');
    else if (s === "C") setSchichtType('Nachtschicht');
}
function setSchichtType(t) { 
    currentSchichtType = t; 
    document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
    if(t === 'Frühschicht') document.querySelector('.type-btn[onclick="setSchichtType(\'Frühschicht\')"]')?.classList.add('active');
    if(t === 'Spätschicht') document.querySelector('.type-btn[onclick="setSchichtType(\'Spätschicht\')"]')?.classList.add('active');
    if(t === 'Nachtschicht') document.querySelector('.type-btn[onclick="setSchichtType(\'Nachtschicht\')"]')?.classList.add('active');
}
function openWorkerOverlay() { 
    document.getElementById('workerList').innerHTML = workerData[currentSchicht].map(w => `<div class="worker-opt" onclick="addStaff('${w}')">${w}</div>`).join(""); 
    document.getElementById('workerOverlay').style.display='flex'; 
}
function addStaff(n) { if(!selectedStaff.includes(n)) selectedStaff.push(n); closeOverlay(); renderStaff(); }
function addManualWorker() { const v = document.getElementById('manualWorker').value.trim(); if(v) { selectedStaff.push("✍️ "+v); document.getElementById('manualWorker').value=""; closeOverlay(); renderStaff(); } }
function closeOverlay() { document.getElementById('workerOverlay').style.display='none'; }
function renderStaff() { document.getElementById('workerDisplayContainer').innerHTML = selectedStaff.map(s => `<div class="selected-worker"><span>${s}</span><span onclick="removeStaff('${s}')" style="color:var(--danger); cursor:pointer;">✕</span></div>`).join(""); liveCheck(); }
function removeStaff(n) { selectedStaff = selectedStaff.filter(x => x !== n); renderStaff(); }

function onAnlageChange(v) { 
    document.getElementById('ftBox').style.display = v.startsWith("PUR") ? "block" : "none"; 
    document.getElementById('comTimeBox').style.display = v === "COM" ? "block" : "none"; 
    document.getElementById('artikelContainer').innerHTML = ""; 
    document.getElementById('addArtikelBtn').disabled = v === "";
    liveCheck(); 
}

let artikelCounter = 0;
function addArtikel() {
    const id = Date.now() + artikelCounter++; 
    const div = document.createElement('div'); div.className = "section-card artikel-row"; div.id = `art_${id}`;
    div.innerHTML = `<button onclick="this.parentElement.remove(); liveCheck();" style="position:absolute; right:10px; top:10px; background:var(--danger); color:white; border:none; border-radius:5px; width:26px; height:26px; cursor:pointer;">✕</button>
        <label>📌 Artikelnummer</label><input type="text" class="art-name" placeholder="z.B. 123456">
        ${document.getElementById('anlage').value==='COM' ? '<label>⏱️ Dauer (Min)</label><input type="number" class="art-duration" placeholder="Minuten" oninput="liveCheck()">' : ''}
        <div class="grid-2"><div><label>✅ Gutteile</label><input type="number" class="art-gut" placeholder="Stk"></div><div><label>❌ Aus Gesamt</label><input type="number" class="art-aus-total" placeholder="Stk" oninput="liveCheck()"></div></div>
        <div class="status-badge" id="badge_${id}"></div><div id="rows_${id}"></div>
        <div style="display:flex; gap:10px; margin-top:10px;"><button class="sub-btn" onclick="addRow('${id}','aus')">+ Ausschuss</button><button class="sub-btn" onclick="addRow('${id}','stoer')">+ Störung</button></div>`;
    document.getElementById('artikelContainer').appendChild(div);
}

function addRow(artId, type) {
    const anl = document.getElementById('anlage').value; 
    const cat = anl==='COM'?'COM':(anl.startsWith("PUR")?'PUR':'Spritz');
    const div = document.createElement('div'); div.className="code-row";
    div.innerHTML = `<div class="code-row-inputs">
        <select class="${type}-select" style="flex:3;">
            ${codeData[cat][type].map(c => `<option value="${c}">${c}</option>`).join("")}
        </select>
        <input type="number" class="${type}-value" style="flex:1; min-width:80px;" placeholder="${type==='aus'?'Stk':'Min'}" oninput="liveCheck()">
        <button onclick="this.parentElement.parentElement.remove(); liveCheck();" style="color:var(--danger); background:none; border:none; font-size:18px; cursor:pointer;">✕</button></div>
        <input type="text" class="sonstige-input" placeholder="Grund manuell...">`;
    
    document.getElementById(`rows_${artId}`).appendChild(div);
    
    const select = div.querySelector(`.${type}-select`);
    const sonstInput = div.querySelector('.sonstige-input');
    select.onchange = () => { 
        sonstInput.style.display = select.value === 'Sonstige' ? 'block' : 'none'; 
    };
    liveCheck();
}

function liveCheck() {
    let v = true; let cT = 0;
    document.querySelectorAll('.artikel-row').forEach(row => {
        const id = row.id.split('_')[1]; const t = parseInt(row.querySelector('.art-aus-total').value) || 0;
        let s = 0; row.querySelectorAll('.aus-value').forEach(i => s += parseInt(i.value) || 0);
        const b = document.getElementById('badge_' + id);
        if(t > 0 && t !== s) { b.className="status-badge status-error"; b.innerText = "⚠️ Differenz: " + s + "/" + t; v=false; }
        else if(t > 0) { b.className="status-badge status-ok"; b.innerText = "✅ OK: " + s + "/" + t; }
        else { b.innerText=""; }
        if(document.getElementById('anlage').value==='COM') cT += parseInt(row.querySelector('.art-duration')?.value) || 0;
    });
    if(document.getElementById('anlage').value==='COM') { document.getElementById('comTotal').innerText = cT; if(cT !== 480) v = false; }
    if(selectedStaff.length === 0 || !document.getElementById('anlage').value) v = false;
    document.getElementById('mainSendBtn').disabled = !v;
}

async function processReport() {
    const mainBtn = document.getElementById('mainSendBtn');
    mainBtn.disabled = true;
    mainBtn.innerText = "⏳ WIRD GESENDET...";

    const now = new Date();
    const fullTimestamp = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
    const anlage = document.getElementById('anlage').value;
    let selectedFT = [];
    if (anlage.startsWith("PUR")) {
        document.querySelectorAll('#ftBox .ft-btn.active').forEach(b => selectedFT.push(b.innerText));
    }

    const rowsToPost = [];
    const artikelRows = document.querySelectorAll('.artikel-row');
    
    if(artikelRows.length === 0) {
        rowsToPost.push({
            Datum: fullTimestamp, Schicht: currentSchicht, Sender: loggedInUser,
            Mitarbeiter: selectedStaff.join(', '), Anlage: anlage, Formträger: selectedFT.join(', '),
            Artikelnummer: '', Stückzahl: '', Ausschuss: '', Grund: '', Störung: '', min: ''
        });
    } else {
        artikelRows.forEach(row => {
            const artNum = row.querySelector('.art-name').value;
            const gutTeile = row.querySelector('.art-gut').value;
            const ausRows = row.querySelectorAll('.code-row');
            
            if(ausRows.length === 0) {
                rowsToPost.push({
                    Datum: fullTimestamp, Schicht: currentSchicht, Sender: loggedInUser, 
                    Mitarbeiter: selectedStaff.join(', '), Anlage: anlage, Formträger: selectedFT.join(', '),
                    Artikelnummer: artNum, Stückzahl: gutTeile, Ausschuss: '', Grund: '', Störung: '', min: ''
                });
            } else {
                ausRows.forEach(subRow => {
                    const ausSelect = subRow.querySelector('.aus-select');
                    const stoerSelect = subRow.querySelector('.stoer-select');
                    const ausVal = subRow.querySelector('.aus-value');
                    const stoerVal = subRow.querySelector('.stoer-value');
                    const sonstInput = subRow.querySelector('.sonstige-input');

                    let grundText = '';
                    if(ausSelect && ausSelect.value === 'Sonstige') grundText = sonstInput.value;
                    else if(ausSelect) grundText = ausSelect.value;
                    if(stoerSelect && stoerSelect.value === 'Sonstige') grundText = sonstInput.value;
                    else if(stoerSelect && grundText === '') grundText = stoerSelect.value;

                    rowsToPost.push({
                        Datum: fullTimestamp, Schicht: currentSchicht, Sender: loggedInUser,
                        Mitarbeiter: selectedStaff.join(', '), Anlage: anlage, Formträger: selectedFT.join(', '),
                        Artikelnummer: artNum, Stückzahl: gutTeile, Ausschuss: ausVal ? ausVal.value : '',
                        Grund: grundText, Störung: stoerSelect ? stoerSelect.value : '', min: stoerVal ? stoerVal.value : ''
                    });
                });
            }
        });
    }

    try {
        const response = await fetch(scriptURL, {
            method: "POST",
            mode: "cors",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify({ action: "append", rows: rowsToPost })
        });
        const resText = await response.text();
        alert("✅ " + resText);
        location.reload();
    } catch(err) {
        alert("❌ Fehler beim Senden: " + err);
        mainBtn.disabled = false;
        mainBtn.innerText = "🚀 SPEICHERN & SENDEN";
    }
}

let currentFilter = "B";
function filterSchicht(s) { 
    currentFilter = s; 
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-filter'));
    document.getElementById('flt' + s)?.classList.add('active-filter');
    loadAdminDashboard(); 
}

async function loadAdminDashboard() {
    const container = document.getElementById('reportsContainer');
    container.innerHTML = '<p style="text-align:center; color:var(--text-muted);">⏳ Berichte werden geladen...</p>';
    
    try {
        const response = await fetch(`${scriptURL}?action=getReports&schicht=${currentFilter}`);
        const data = await response.json();
        
        if(!data || data.length === 0) {
            container.innerHTML = `<p style="text-align:center; color:var(--text-muted);">📊 Keine Berichte für Schicht ${currentFilter}</p>`;
            return;
        }
        
        container.innerHTML = data.map(item => `
            <div class="report-box">
                <span class="badge-origin">${item.Anlage} ${item.Formträger ? '('+item.Formträger+')' : ''}</span>
                <div class="report-date">📅 ${item.Datum} | 👤 ${item.Sender}</div>
                <div class="report-artikel">📦 Art: ${item.Artikelnummer || '-'} | Gut: ${item.Stückzahl || '0'} Stk</div>
                
                <div class="report-ausschuss">❌ Ausschuss: ${item.Ausschuss || '0'} Stk (${item.Grund || '-'})</div>
                
                <div class="report-störung">⚠️ Störung: ${item.min ? item.min+' Min' : '-'} (${item.Störung || '-'})</div>
                <div class="report-workers">👥 ${item.Mitarbeiter}</div>
            </div>
        `).join('');
    } catch(err) {
        container.innerHTML = `<p style="text-align:center; color:var(--danger);">❌ Fehler beim Laden der Daten: ${err}</p>`;
    }
}
</script>
