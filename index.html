<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APG BOCHUM</title>
    <style>
        body {
            background: black;
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .card {
            max-width: 500px;
            margin: auto;
            background: #1e293b;
            padding: 20px;
            border-radius: 20px;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: none;
            font-size: 16px;
        }
        button {
            background: #38bdf8;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }
        .error {
            color: red;
            margin-top: 10px;
        }
        .success {
            color: #22c55e;
        }
    </style>
</head>
<body>

<div id="loginScreen" class="card">
    <h2>APG LOGIN</h2>
    <input type="text" id="username" placeholder="Nachname">
    <input type="password" id="password" placeholder="Passwort">
    <button onclick="checkLogin()">ANMELDEN</button>
    <div id="loginError" class="error"></div>
</div>

<div id="mainApp" class="card" style="display:none;">
    <h2>Willkommen, <span id="userName"></span></h2>
    <p>✅ Erfolgreich eingeloggt!</p>
    <p id="infoText"></p>
    <button onclick="logout()">ABMELDEN</button>
</div>

<script>
    // ============================================
    // BASIT LOGIN SISTEMI
    // ============================================
    
    // Kullanicilar (Nachname + Sifre)
    const USERS = {
        "Keskin": "517",
        "Uzun": "1433",
        "Kunert": "502",
        "Aldirmaz": "577",
        "Beher": "510"
    };
    
    let currentUser = "";
    
    function checkLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorDiv = document.getElementById('loginError');
        
        if (USERS[username] && USERS[username] === password) {
            currentUser = username;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('userName').innerText = username;
            document.getElementById('infoText').innerHTML = `Du bist eingeloggt als: <strong>${username}</strong><br>
            Schicht: ${getUserSchicht(username)}`;
        } else {
            errorDiv.innerText = "❌ Falscher Benutzername oder Passwort!";
        }
    }
    
    function getUserSchicht(username) {
        const schichtA = ["Kunert", "Karali", "Mikuczynski", "Türkmen"];
        const schichtB = ["Keskin", "Aldirmaz", "Anderwald", "Bayrakli"];
        const schichtC = ["Beher", "Rafo", "Gertz", "Schönborn"];
        
        if (schichtA.includes(username)) return "A";
        if (schichtB.includes(username)) return "B";
        if (schichtC.includes(username)) return "C";
        return "Admin";
    }
    
    function logout() {
        document.getElementById('loginScreen').style.display = 'block';
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        document.getElementById('loginError').innerText = '';
    }
</script>

</body>
</html>
