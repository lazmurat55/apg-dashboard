<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitarbeiter Dashboard & Login</title>
    <style>
        /* 🎨 GENEL STİLLER */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 🚪 GİRİŞ EKRANI STİLLERİ */
        #loginPage {
            background: #ffffff;
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
            color: #666;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #0056b3;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:hover { background: #004085; }
        .error-text { color: #d9534f; font-size: 13px; margin-top: 15px; display: none; }

        /* 📊 ADMİN PANELİ (DASHBOARD) STİLLERİ */
        #adminDashboard {
            display: none; /* İlk başta gizli, giriş yapılınca açılacak */
            width: 90%;
            max-width: 1200px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin: 20px auto;
        }

        /* 🚨 ŞİFRE DEĞİŞTİRME PENCERESİ (MODAL) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 340px;
            text-align: center;
        }

        .modal-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #cccccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .btn-success { background: #28a745; }
        .btn-success:hover { background: #218838; }
    </style>
</head>
<body>

    <div id="loginPage">
        <h2>Mitarbeiter Login</h2>
        <div class="input-group">
            <label>Name (İsim)</label>
            <input type="text" id="username" placeholder="z.B. Uzun">
        </div>
        <div class="input-group">
            <label>Passwort / Personalnummer</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button class="btn" onclick="handleLogin()">Einloggen</button>
        <p id="mainLoginError" class="error-text"></p>
    </div>


    <div id="adminDashboard">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px;">
            <h2>Admin Dashboard</h2>
            <button class="btn" style="width: auto; background: #dc3545;" onclick="logout()">Ausloggen</button>
        </div>
        
        <p>Willkommen! Die Daten werden unten geladen.</p>
        
        <div id="dashboardContent" style="margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 5px;">
            Veriler yükleniyor veya manuel yenileme bekleniyor...
        </div>
    </div>


    <div id="passwordChangeModal" class="modal-overlay">
        <div class="modal-box">
            <h3 style="color: #d9534f; margin-top: 0;">Sicherheitshinweis!</h3>
            <p>Da dies Ihr erster Login ist, müssen Sie Ihr Passwort ändern.</p>
            
            <input type="password" id="newPasswordInput" placeholder="Neues Passwort (Min. 4 Zeichen)">
            <input type="password" id="newPasswordConfirmInput" placeholder="Passwort wiederholen">
            
            <button class="btn btn-success" onclick="submitNewPassword()">Speichern & Login</button>
            <p id="modalPasswordError" class="error-text"></p>
        </div>
    </div>


    <script>
        // ⚠️ BURAYA KENDİ GOOGLE APPS SCRIPT WEB APP URL ADRESİNİ YAZMALISIN!
        const webAppUrl = "https://script.google.com/macros/s/AKfycbwaCXvhOLYbzjqGY5Te2TL3kdU6SEim5VNKwI1rM2vvv9R9tCjy9PhFxA3xkEjm8LzpkA/exec"; 
        
        let currentLoggingInUser = ""; 
        let autoRefreshInterval = null;

        // [GİRİŞ KONTROLÜ]
        function handleLogin() {
            const usernameInput = document.getElementById("username").value.trim();
            const passwordInput = document.getElementById("password").value.trim();
            const mainError = document.getElementById("mainLoginError");

            if (!usernameInput || !passwordInput) {
                mainError.textContent = "Bitte alle Felder ausfüllen!";
                mainError.style.display = "block";
                return;
            }

            mainError.style.display = "none";
            currentLoggingInUser = usernameInput;

            fetch(webAppUrl, {
                method: "POST",
                body: JSON.stringify({
                    action: "loginCheck",
                    username: usernameInput,
                    password: passwordInput
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    if (data.firstLogin === "Evet") {
                        // İlk giriş ise şifre değiştirme penceresini aç
                        document.getElementById("passwordChangeModal").style.display = "flex";
                    } else {
                        // Normal giriş ise direkt uygulamaya al
                        enterApp();
                    }
                } else {
                    mainError.textContent = data.message;
                    mainError.style.display = "block";
                }
            })
            .catch(err => {
                console.error("Fehler:", err);
                mainError.textContent = "Verbindungsfehler zum Server.";
                mainError.style.display = "block";
            });
        }

        // [ŞİFRE DEĞİŞTİRME VE EXCEL'E YAZMA]
        function submitNewPassword() {
            const newPass = document.getElementById("newPasswordInput").value.trim();
            const newPassConfirm = document.getElementById("newPasswordConfirmInput").value.trim();
            const modalError = document.getElementById("modalPasswordError");

            if (newPass.length < 4) {
                modalError.textContent = "Das Passwort muss mindestens 4 Zeichen lang sein!";
                modalError.style.display = "block";
                return;
            }
            if (newPass !== newPassConfirm) {
                modalError.textContent = "Passwörter stimmen nicht überein!";
                modalError.style.display = "block";
                return;
            }

            modalError.style.display = "none";

            fetch(webAppUrl, {
                method: "POST",
                body: JSON.stringify({
                    action: "changePassword",
                    username: currentLoggingInUser,
                    newPassword: newPass
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.result === "success") {
                    alert("Passwort erfolgreich geändert!");
                    document.getElementById("passwordChangeModal").style.display = "none";
                    enterApp(); // Şifre değişti, içeri al
                } else {
                    modalError.textContent = data.message;
                    modalError.style.display = "block";
                }
            })
            .catch(err => {
                modalError.textContent = "Fehler beim Speichern des Passworts.";
                modalError.style.display = "block";
            });
        }

        // [UYGULAMAYA GİRİŞ VE İLK VERİ YÜKLEME]
        function enterApp() {
            // Giriş ekranını gizle, Dashboard'u aç
            document.getElementById("loginPage").style.display = "none";
            document.getElementById("adminDashboard").style.display = "block";
            document.body.style.alignItems = "flex-start"; // Sayfa düzenini panele göre ayarla
            
            // Sayfa ilk açıldığında SAAT KAÇ OLURSA OLSUN veriyi bir kere yükle (Senin istediğin Manuel F5/Yenileme mantığı)
            loadAdminDashboard(); 
            
            // Arka plandaki saat kontrollü otomatik yenilemeyi başlat
            startAutoRefresh();
        }

        // [EXCEL'DEN VERİ ÇEKEN GERÇEK FONKSİYONUN]
        function loadAdminDashboard() {
            console.log("Veriler Excel'den güncelleniyor...");
            // Buraya mevcut verilerini ekrana basan fetch/kod yapını entegre edebilirsin
            document.getElementById("dashboardContent").innerHTML = "<b>Veriler Başarıyla Güncellendi!</b><br>Son Güncelleme: " + new Date().toLocaleTimeString();
        }

        // [🔄 SAAT ARALIKLI OTOMATİK LIVE-CHECK MANTIĞI]
        function startAutoRefresh() {
            if(autoRefreshInterval) clearInterval(autoRefreshInterval);
            
            // Her 10 saniyede bir saati kontrol et
            autoRefreshInterval = setInterval(() => {
                const now = new Date();
                const hrs = now.getHours();
                const mins = now.getMinutes();
                const currentTimeNum = (hrs * 100) + mins;
                
                // İstediğin kritik vardiya zaman aralıkları:
                const isVardiya1 = (currentTimeNum >= 1330 && currentTimeNum <= 1410); // 13:30 - 14:10
                const isVardiya2 = (currentTimeNum >= 2130 && currentTimeNum <= 2210); // 21:30 - 22:10
                const isVardiya3 = (currentTimeNum >= 530  && currentTimeNum <= 610);  // 05:30 - 06:10

                // Eğer bu saat aralıklarından birindeysek otomatik yenileme tetiklensin
                if (isVardiya1 || isVardiya2 || isVardiya3) {
                    // Sunucuyu yormamak için en son otomatik yenilemenin üzerinden en az 90 saniye geçmiş mi bak
                    if (!window.lastRefreshTime || (now - window.lastRefreshTime >= 90000)) {
                        window.lastRefreshTime = now;
                        loadAdminDashboard(); 
                    }
                } else {
                    // Bu saatlerin dışındaysak arka planda asla otomatik istek atmaz! (Sadece sayfa yenilenirse veri gelir)
                    console.log("Kritik saat aralığı dışı: Otomatik yenileme kapalı.");
                }
            }, 10000); 
        }

        // [OTURUMU KAPATMA]
        function logout() {
            if(autoRefreshInterval) clearInterval(autoRefreshInterval);
            document.getElementById("adminDashboard").style.display = "none";
            document.getElementById("loginPage").style.display = "block";
            document.body.style.alignItems = "center";
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
        }
    </script>
</body>
</html>
