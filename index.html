<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APG BOCHUM</title>
    <style>
        body {
            background: black;
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .card, .login-card {
            max-width: 500px;
            margin: auto;
            background: #1e293b;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #38bdf8;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: none;
            font-size: 16px;
        }
        button {
            background: #38bdf8;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }
        .error {
            color: red;
            margin-top: 10px;
        }
        .success {
            color: #22c55e;
        }
        .header {
            text-align: center;
            border-bottom: 2px solid #38bdf8;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }
        .schicht-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 10px 0;
        }
        .schicht-btn {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 12px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }
        .schicht-btn.active {
            background: #38bdf8;
            color: black;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        label {
            display: block;
            margin: 10px 0 5px;
            color: #38bdf8;
            font-weight: bold;
            font-size: 12px;
        }
        select {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            color: white;
            border: 1px solid #334155;
            border-radius: 10px;
        }
        .main-btn {
            background: #38bdf8;
            padding: 15px;
            font-size: 16px;
            margin-top: 20px;
        }
        .add-btn {
            background: transparent;
            border: 2px dashed #38bdf8;
            color: #38bdf8;
        }
        .selected-worker {
            background: rgba(56,189,248,0.1);
            padding: 10px;
            border-radius: 10px;
            margin-top: 5px;
            border: 1px solid #38bdf8;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<!-- LOGIN EKRANI -->
<div id="loginScreen" class="login-card">
    <h2 style="color:#38bdf8;">APG LOGIN</h2>
    <input type="text" id="username" placeholder="Nachname">
    <input type="password" id="password" placeholder="Passwort">
    <button onclick="checkLogin()">ANMELDEN</button>
    <div id="loginError" class="error"></div>
</div>

<!-- ANA UYGULAMA -->
<div id="mainApp" class="card" style="display:none;">
    <div class="header">
        <h1>Adler Pelzer Group</h1>
        <p id="userDisplay" class="success"></p>
    </div>

    <label>SCHICHT</label>
    <div class="schicht-group">
        <button class="schicht-btn" onclick="setSchicht('A')">A</button>
        <button class="schicht-btn" onclick="setSchicht('B')">B</button>
        <button class="schicht-btn" onclick="setSchicht('C')">C</button>
    </div>

    <label>MITARBEITER</label>
    <div id="workerList"></div>
    <button class="add-btn" onclick="addTestWorker()">+ Test Mitarbeiter</button>

    <label>ANLAGE</label>
    <select id="anlage">
        <option value="">Wählen...</option>
        <option value="PUR1">PUR 1</option>
        <option value="PUR2">PUR 2</option>
        <option value="IM1">IM 1</option>
        <option value="COM">Compound</option>
    </select>

    <label>ARTIKEL</label>
    <input type="text" id="artikel" placeholder="Artikelnummer">

    <div class="grid-2">
        <div><label>GUTTEILE</label><input type="number" id="gut" placeholder="Stückzahl"></div>
        <div><label>AUSSCHUSS</label><input type="number" id="aus" placeholder="Stückzahl"></div>
    </div>

    <button id="sendBtn" class="main-btn" onclick="sendReport()">📤 RAPORT SENDEN</button>
    <button onclick="logout()" style="background:#475569; margin-top:10px;">ABMELDEN</button>
</div>

<script>
    // Kullanicilar
    const USERS = {
        "Keskin": "517",
        "Uzun": "1433"
    };
    
    let currentUser = "";
    let currentSchicht = "B";
    let selectedWorkers = [];
    
    function checkLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorDiv = document.getElementById('loginError');
        
        if (USERS[username] && USERS[username] === password) {
            currentUser = username;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('userDisplay').innerHTML = "Angemeldet: " + username;
            setSchicht('B');
        } else {
            errorDiv.innerText = "❌ Falscher Benutzername oder Passwort!";
        }
    }
    
    function setSchicht(schicht) {
        currentSchicht = schicht;
        document.querySelectorAll('.schicht-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.innerText === schicht) btn.classList.add('active');
        });
        
        // Schicht'e göre test çalışanları
        const workers = {
            "A": ["Kunert M.", "Karali O.", "Mikuczynski K."],
            "B": ["Keskin Mur.", "Aldirmaz P.", "Anderwald R."],
            "C": ["Beher T.", "Keskin Mustafa", "Kantaroglu Ö."]
        };
        
        selectedWorkers = [];
        document.getElementById('workerList').innerHTML = workers[schicht].map(w => `
            <div class="selected-worker">
                <span>${w}</span>
                <span onclick="removeWorker('${w}')" style="color:red; cursor:pointer;">✕</span>
            </div>
        `).join('');
    }
    
    function addTestWorker() {
        const name = "Test " + (selectedWorkers.length + 1);
        selectedWorkers.push(name);
        updateWorkerDisplay();
    }
    
    function removeWorker(name) {
        selectedWorkers = selectedWorkers.filter(w => w !== name);
        updateWorkerDisplay();
    }
    
    function updateWorkerDisplay() {
        if (selectedWorkers.length === 0) {
            document.getElementById('workerList').innerHTML = '<div class="selected-worker" style="color:#94a3b8;">Keine Mitarbeiter</div>';
        } else {
            document.getElementById('workerList').innerHTML = selectedWorkers.map(w => `
                <div class="selected-worker">
                    <span>${w}</span>
                    <span onclick="removeWorker('${w}')" style="color:red; cursor:pointer;">✕</span>
                </div>
            `).join('');
        }
    }
    
    function sendReport() {
        const anlage = document.getElementById('anlage').value;
        const artikel = document.getElementById('artikel').value;
        const gut = document.getElementById('gut').value;
        const aus = document.getElementById('aus').value;
        
        if (!anlage) {
            alert("Bitte Anlage wählen!");
            return;
        }
        if (selectedWorkers.length === 0) {
            alert("Bitte Mitarbeiter hinzufügen!");
            return;
        }
        
        const report = {
            user: currentUser,
            schicht: currentSchicht,
            workers: selectedWorkers,
            anlage: anlage,
            artikel: artikel,
            gut: gut,
            aus: aus,
            date: new Date().toLocaleString()
        };
        
        console.log("Raport:", report);
        alert("✅ Raport gesendet!\n\n" + JSON.stringify(report, null, 2));
        
        // Temizle
        document.getElementById('anlage').value = "";
        document.getElementById('artikel').value = "";
        document.getElementById('gut').value = "";
        document.getElementById('aus').value = "";
        selectedWorkers = [];
        updateWorkerDisplay();
    }
    
    function logout() {
        document.getElementById('loginScreen').style.display = 'block';
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        document.getElementById('loginError').innerText = '';
        currentUser = "";
        selectedWorkers = [];
    }
</script>

</body>
</html>
