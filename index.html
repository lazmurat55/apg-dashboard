<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APG Bochum - Betriebsdatenerfassung</title>
    <style>
        :root {
            --bg-main: #0f172a;        /* Gözü yormayan modern koyu arka plan */
            --bg-card: #1e293b;        /* Kartlar için hafif açık, net ayrışan ton */
            --bg-input: #0f172a;       /* Giriş alanları arka planı */
            --border-color: #334155;   /* Yumuşak sınır çizgileri */
            --primary: #3b82f6;        /* Standart mavi */
            --primary-hover: #1d4ed8;  /* Koyu mavi hover */
            --success: #10b981;        /* Başarılı / Gutteile yeşili */
            --danger: #f43f5e;         /* Hata / Genel kırmızı */
            --orange-bright: #f59e0b;  /* Admin / Uyarı turuncusu */
            --text-main: #f8fafc;      /* Parlak beyaz yerine mat beyaz (göz dostu) */
            --text-muted: #94a3b8;     /* İkinci derece yazılar için gri ton */
            
            /* Yenilenen Parlak Kırmızı - Dashboard için */
            --dash-danger: #ff4d6d;    
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        .container { width: 100%; max-width: 1100px; background: transparent; transition: max-width 0.3s ease; }
        /* Admin paneli açıldığında ekranı genişletiyoruz ki 3'lü yan yana düzen rahat sığsın */
        .container.wide { max-width: 1200px; }
        .app-wrapper { max-width: 620px; margin: 0 auto; }
        
        /* Kart Yapısı */
        .form-card { background: var(--bg-card); border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2), 0 2px 4px -2px rgba(0,0,0,0.2); border: 1px solid var(--border-color); }
        
        h2 { text-align: center; margin-bottom: 24px; color: #fff; font-weight: 700; letter-spacing: 0.5px; }
        h3 { margin-bottom: 16px; color: #fff; font-weight: 600; font-size: 18px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        h4 { color: #fff; font-weight: 600; margin-bottom: 15px; }
        
        label { display: block; margin: 12px 0 6px; font-size: 14px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, select, button { width: 100%; padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-input); color: #fff; font-size: 15px; outline: none; transition: all 0.2s ease; }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,130,246,0.25); }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 10px; }
        
        /* Buton Stilleri */
        button { font-weight: 600; cursor: pointer; border: none; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 2px 4px rgba(59,130,246,0.2); }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-primary:disabled { background: #334155; color: var(--text-muted); cursor: not-allowed; box-shadow: none; }
        
        /* Seçim Grupları */
        .schicht-group, .type-group { display: flex; gap: 8px; margin-bottom: 12px; }
        .schicht-btn, .type-btn { flex: 1; background: var(--bg-input); border: 1px solid var(--border-color); padding: 12px; border-radius: 8px; color: var(--text-muted); font-size: 14px; }
        .schicht-btn.active, .type-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .active-filter { background: var(--orange-bright) !important; color: white !important; border-color: var(--orange-bright) !important; }
        
        /* Personel Etiketleri */
        .worker-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; min-height: 44px; border: 1px dashed var(--border-color); padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.1); }
        .selected-worker { background: rgba(59,130,246,0.15); border: 1px solid var(--primary); color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 13px; display: flex; align-items: center; gap: 8px; font-weight: 500; }
        
        /* Formträger Seçimi */
        .ft-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .ft-btn { background: var(--bg-input); border: 1px solid var(--border-color); padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-muted); }
        .ft-btn.active { background: var(--success); color: white; border-color: var(--success); }
        
        /* Hesap Takip Kutusu */
        .com-tracker-box { display: none; background: rgba(59, 130, 246, 0.1); border: 1px dashed var(--primary); border-radius: 8px; padding: 14px; margin: 15px 0; font-size: 14px; font-weight: 600; text-align: center; color: #fff; }
        
        /* Dinamik Kart Alanları */
        .artikel-row { background: rgba(15, 23, 42, 0.4); border: 1px solid var(--border-color); padding: 20px; border-radius: 10px; margin-bottom: 16px; position: relative; }
        .code-row { background: rgba(15, 23, 42, 0.6); padding: 14px; border-radius: 8px; margin-top: 12px; border-left: 4px solid var(--primary); }
        .code-row.err-border { border-left-color: var(--danger) !important; }
        
        .code-row-inputs { display: flex; gap: 10px; align-items: center; width: 100%; }
        .code-row-inputs select { flex: 7; min-width: 0; padding: 10px; font-size: 14px; }
        .code-row-inputs input { flex: 2.5; min-width: 0; padding: 10px; font-size: 14px; text-align: center; font-weight: 600; }
        .code-row-inputs .remove-row-btn { flex: 0.5; background: none; color: var(--text-muted); border: none; font-size: 18px; padding: 0; width: auto; cursor: pointer; display: flex; justify-content: center; }
        .code-row-inputs .remove-row-btn:hover { color: var(--danger); }
        
        .sonstige-input { display: none; margin-top: 8px; font-size: 14px; padding: 10px; width: 100%; background: var(--bg-card); }
        
        .sub-btn { background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); color: var(--text-main); padding: 10px 16px; font-size: 13px; border-radius: 8px; width: auto; margin-top: 10px; font-weight: 500; }
        .sub-btn:hover { background: rgba(255,255,255,0.08); border-color: var(--text-muted); }
        
        /* Pop-up Overlay */
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.8); display:none; justify-content:center; align-items:center; z-index:100; padding:15px; backdrop-filter: blur(4px); }
        .overlay-content { background:var(--bg-card); width:100%; max-width:420px; padding:24px; border-radius:12px; border:1px solid var(--border-color); max-height:85vh; display:flex; flex-direction:column; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
        .worker-list { overflow-y:auto; flex:1; margin:15px 0; display:flex; flex-direction:column; gap:6px; padding-right:4px; }
        .worker-opt { padding:12px; background:var(--bg-input); border:1px solid var(--border-color); border-radius:8px; cursor:pointer; font-weight: 500; transition: all 0.2s; }
        .worker-opt:hover { border-color: var(--primary); background: rgba(59,130,246,0.05); }
        
        /* Yönetim Paneli Alanları */
        .management-box { display: none; background: rgba(245, 158, 11, 0.05); border: 1px dashed var(--orange-bright); border-radius: 10px; padding: 16px; margin-top: 10px; margin-bottom: 20px; }
        .managers-list { margin-top: 12px; font-size: 13px; color: var(--text-main); padding: 10px; background: var(--bg-input); border-radius: 8px; border: 1px solid var(--border-color); }
        .delete-manager-btn { color: var(--danger); font-weight: bold; margin-left: 10px; cursor: pointer; }
        
        .admin-action-btn { background: var(--border-color); color: var(--text-main); width: auto; padding: 8px 14px; font-size: 13px; border-radius: 8px; }
        .admin-action-btn:hover { background: var(--primary); }
        
        .refresh-btn { background: #334155; color: #fff; border: 1px solid var(--border-color); border-radius: 8px; padding: 10px 18px; font-size: 13px; width: auto; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 16px; }
        .refresh-btn:hover { background: var(--success); border-color: var(--success); }
        
        /* ---------------------------------------------------- */
        /* 👑 YENİ DASHBOARD GRİD DÜZENİ VE BÜYÜK YAZI STİLLERİ */
        /* ---------------------------------------------------- */
        #reportsContainer { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); /* Yan yana 3 kare */
            gap: 16px; 
            max-height: 650px; 
            overflow-y: auto; 
            padding-right: 4px; 
            margin-top: 15px; 
        }
        
        @media (max-width: 900px) {
            #reportsContainer { grid-template-columns: repeat(2, 1fr); } /* Orta ekranlarda 2'li */
        }
        @media (max-width: 650px) {
            #reportsContainer { grid-template-columns: 1fr; } /* Mobilde tekli */
        }

        .report-box { 
            background: var(--bg-input); 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            padding: 18px; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); 
            min-height: 190px; /* Kare formunu korur */
        }
        
        .badge-origin { 
            position: absolute; 
            right: 12px; 
            top: 12px; 
            background: var(--primary); 
            padding: 4px 12px; 
            border-radius: 6px; 
            font-size: 14px; 
            font-weight: 700; 
            color: #fff; 
        }
        
        .report-box .report-date { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
        .report-box .report-title { font-size: 17px; font-weight: 700; color: #fff; margin: 6px 0; line-height: 1.4; }
        
        /* Parlak yüksek kontrastlı ve büyük kırmızı */
        .report-box .report-danger { font-size: 15px; color: var(--dash-danger) !important; font-weight: 700; margin: 4px 0; line-height: 1.4; }
        .report-box .report-warning { font-size: 14px; color: var(--orange-bright); font-weight: 600; margin: 4px 0; }
        
        .report-box .report-user { 
            font-size: 13px; 
            color: var(--success); 
            margin-top: 8px; 
            font-weight: 600; 
            border-top: 1px solid var(--border-color); 
            padding-top: 8px; 
        }
        /* ---------------------------------------------------- */

        #loginScreen { display: block; max-width: 400px; margin: 60px auto 0; }
        #mainApp, #adminPanel { display: none; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div id="loginScreen" class="form-card">
        <h2>APG BOCHUM LOGIN</h2>
        <label>Benutzername</label>
        <input type="text" id="userInp" placeholder="Name eingeben...">
        <label>Passwort</label>
        <input type="password" id="passInp" placeholder="******">
        <button class="btn-primary" style="margin-top:24px; padding: 14px;" onclick="checkLogin()">ANMELDEN</button>
        <div id="loginError" style="color:var(--danger); text-align:center; margin-top:14px; display:none; font-size:14px; font-weight: 600;"></div>
    </div>

    <div id="mainApp" class="app-wrapper">
        <div class="form-card" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; padding: 14px 20px;">
            <span id="currentUserDisplay" style="font-weight:700; color:var(--success);"></span>
            <button onclick="location.reload()" style="width:auto; padding:6px 14px; font-size:13px; background:var(--border-color); border-radius: 6px;">Abmelden</button>
        </div>
        
        <div class="form-card">
            <h3>Vardiya Bilgileri / Schicht</h3>
            <label>Schicht</label>
            <div class="schicht-group">
                <button class="schicht-btn" id="mSchichtA" onclick="setSchicht('A')">Schicht A</button>
                <button class="schicht-btn active" id="mSchichtB" onclick="setSchicht('B')">Schicht B</button>
                <button class="schicht-btn" id="mSchichtC" onclick="setSchicht('C')">Schicht C</button>
            </div>

            <div class="type-group">
                <button class="type-btn" id="tFrueh" onclick="setSchichtType('Frühschicht')">Frühschicht</button>
                <button class="type-btn active" id="tSpaet" onclick="setSchichtType('Spätschicht')">Spätschicht</button>
                <button class="type-btn" id="tNacht" onclick="setSchichtType('Nachtschicht')">Nachtschicht</button>
            </div>

            <label>Datum</label>
            <input type="date" id="datum">
        </div>

        <div class="form-card">
            <h3>Personal / Mitarbeiter</h3>
            <label>Mitarbeiter an der Anlage</label>
            <button class="sub-btn" style="width:100%; padding:12px; background: rgba(59,130,246,0.05); border-color: var(--primary);" onclick="openWorkerOverlay()">+ Mitarbeiter auswählen</button>
            <div class="worker-container" id="workerDisplayContainer"></div>
        </div>

        <div class="form-card">
            <h3>Anlage / Maschine</h3>
            <label>Anlage wählen</label>
            <select id="anlage" onchange="onAnlageChange(this.value)">
                <option value="">-- Bitte wählen --</option>
                <option value="PUR1">PUR 1</option>
                <option value="PUR2">PUR 2</option>
                <option value="PUR3">PUR 3</option>
                <option value="PUR4">PUR 4</option>
                <option value="PUR5">PUR 5</option>
                <option value="PUR6">PUR 6</option>
                <option value="PUR7">PUR 7</option>
                <option value="PUR8">PUR 8</option>
                <option value="PUR9">PUR 9</option>
                <option value="CIM1">CIM 1</option>
                <option value="IM1">IM 1</option>
                <option value="IM2">IM 2</option>
                <option value="IM3">IM 3</option>
                <option value="IM4">IM 4</option>
                <option value="IM5">IM 5</option>
                <option value="COM">COM</option>
            </select>

            <div id="comTracker" class="com-tracker-box">⏱️ COM Schichtzeit-Konto: 0 / 480 Min</div>

            <div id="ftBox" style="display:none; margin-top: 15px;">
                <label>Formträger (Mehrfachauswahl möglich)</label>
                <div class="ft-grid">
                    <div class="ft-btn" onclick="this.classList.toggle('active')">FT1</div>
                    <div class="ft-btn" onclick="this.classList.toggle('active')">FT2</div>
                    <div class="ft-btn" onclick="this.classList.toggle('active')">FT3</div>
                    <div class="ft-btn" onclick="this.classList.toggle('active')">FT4</div>
                    <div class="ft-btn" onclick="this.classList.toggle('active')">FT5</div>
                    <div class="ft-btn" onclick="this.classList.toggle('active')">FT6</div>
                </div>
            </div>
        </div>

        <div class="form-card">
            <h3>Produktion & Fehlererfassung</h3>
            <div id="artikelContainer"></div>
            
            <button id="addArtikelBtn" class="sub-btn" style="width:100%; padding:12px; margin-bottom:10px; font-weight: 600;" onclick="addArtikel()" disabled>+ Artikel / Produktion hinzufügen</button>
        </div>
        
        <button id="mainSendBtn" class="btn-primary" style="padding:16px; font-size:16px; border-radius: 10px;" onclick="processReport()" disabled>⚠️ Bitte Formular ausfüllen</button>
    </div>

    <div id="adminPanel" class="form-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px;">
            <span id="adminUserDisplay" style="font-weight:700; color:var(--orange-bright); font-size: 16px;"></span>
            <div style="display:flex; gap:8px;">
                <button id="toggleRightsBtn" class="admin-action-btn" onclick="toggleRightsPanel()" style="display:none;">⚙️ Admin-Optionen</button>
                <button onclick="location.reload()" style="width:auto; padding:6px 14px; font-size:13px; background:var(--danger); border-radius:6px;">Abmelden</button>
            </div>
        </div>
        
        <div id="rightsManagementBox" class="management-box">
            <h4>⚙️ Rechteverwaltung (Schichtleiter)</h4>
            <label>Mitarbeiter auswählen</label>
            <select id="rightsSelect" onchange="handleRightsSelectChange(this.value)"></select>
            
            <label>Zugewiesene Schicht</label>
            <select id="assignedSchichtSelect">
                <option value="A">Schicht A</option>
                <option value="B" selected>Schicht B</option>
                <option value="C">Schicht C</option>
            </select>
            
            <button class="btn-primary" style="margin-top:14px; padding:10px; background:var(--success);" onclick="grantSchichtleiterRights()">✓ Berechtigung Speichern</button>
            
            <div class="managers-list" id="currentManagersList">Aktiv: Keine Leiter zugewiesen</div>
        </div>

        <h3 style="font-size: 20px; margin-bottom: 20px;">Schichtleiter Dashboard</h3>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <button id="manualRefreshBtn" class="refresh-btn" onclick="manualRefreshDashboard()">🔄 Aktualisieren</button>
            <span id="refreshStatus" style="font-size: 13px; color: var(--text-muted);"></span>
        </div>
        
        <div id="adminFilterGroup" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; margin-bottom:16px;">
            <button class="schicht-btn filter-btn" id="fltA" onclick="filterSchicht('A')">Schicht A</button>
            <button class="schicht-btn filter-btn" id="fltB" onclick="filterSchicht('B')">Schicht B</button>
            <button class="schicht-btn filter-btn" id="fltC" onclick="filterSchicht('C')">Schicht C</button>
        </div>

        <div id="reportsContainer"></div>
    </div>
</div>

<div class="overlay" id="workerOverlay">
    <div class="overlay-content">
        <h4>Personal auswählen</h4>
        <div class="worker-list" id="workerList"></div>
        <input type="text" id="manualWorker" placeholder="Name manuell schreiben..." style="margin-bottom:12px;">
        <button class="btn-primary" onclick="addManualWorker()" style="padding:10px; margin-bottom:8px;">Manuell hinzufügen</button>
        <button class="sub-btn" onclick="closeOverlay()">Schließen</button>
    </div>
</div>

function setInitialTodayDate() {
    const today = new Date();
    document.getElementById('datum').value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
}

function scrollToBottom() {

}

async function checkLogin() {
    const u = document.getElementById('userInp').value.trim();
    const p = document.getElementById('passInp').value.trim();
    const errorDiv = document.getElementById('loginError');
    
    if(!u || !p) {
        errorDiv.innerText = "❌ Bitte Name und Passwort eingeben!";
        errorDiv.style.display = 'block';
        return;
    }
    
    errorDiv.innerText = "⏳ Prüfe Login...";
    errorDiv.style.display = 'block';
    errorDiv.style.color = "var(--primary)";

    if (!navigator.onLine) {
        if (u === superAdmin || schichtLeiterDb[u]) {
            errorDiv.style.display = 'none';
            enterApp(u);
            return;
        }
        errorDiv.style.color = "var(--danger)";
        errorDiv.innerText = "❌ Keine Netzverbindung!";
        return;
    }

    try {
        const response = await fetch(`${scriptURL}?action=verifyLogin&user=${encodeURIComponent(u)}&pass=${encodeURIComponent(p)}&_cb=${Date.now()}`);
        const result = await response.json();
        
        if(result.success) {
            errorDiv.style.display = 'none';
            enterApp(u);
        } else {
            errorDiv.style.color = "var(--danger)";
            errorDiv.innerText = "❌ Falscher Benutzername oder Passwort!";
        }
    } catch(e) {
        enterApp(u);
    }
}

function enterApp(u) {
    loggedInUser = u;
    document.getElementById('loginScreen').style.display = 'none';
    setInitialTodayDate();
    
    if (u === superAdmin) {
        document.getElementById('mainContainer').classList.add('wide'); // Ekranı genişlet
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminUserDisplay').innerHTML = "👑 Admin: " + u;
        document.getElementById('toggleRightsBtn').style.display = 'inline-block';
        loadUserSelect();
        updateManagersList();
        filterSchicht('B');
        startAutoRefresh();
    } 
    else if (schichtLeiterDb[u]) {
        const assignedSchicht = schichtLeiterDb[u];
        document.getElementById('mainContainer').classList.add('wide'); // Ekranı genişlet
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminUserDisplay').innerHTML = `🏃 Leiter: ${u} (Schicht ${assignedSchicht})`;
        document.getElementById('toggleRightsBtn').style.display = 'none'; 
        document.getElementById('rightsManagementBox').style.display = 'none';
        
        document.querySelectorAll('.filter-btn').forEach(btn => btn.style.display = 'none');
        const targetBtn = document.getElementById('flt' + assignedSchicht);
        if(targetBtn) {
            targetBtn.style.display = 'inline-block';
            targetBtn.classList.add('active-filter');
        }
        filterSchicht(assignedSchicht);
        startAutoRefresh();
    } 
    else {
        document.getElementById('mainContainer').classList.remove('wide');
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('currentUserDisplay').innerHTML = "👤 Angemeldet: " + u;
        setSchicht('B');
    }
    
    window.addEventListener('online', checkOfflinePuffer);
    checkOfflinePuffer();
}

function startAutoRefresh() {
    if(autoRefreshInterval) clearInterval(autoRefreshInterval);
    autoRefreshInterval = setInterval(() => { loadAdminDashboard(true); }, 300000); 
}

async function manualRefreshDashboard() {
    const btn = document.getElementById('manualRefreshBtn');
    const status = document.getElementById('refreshStatus');
    btn.disabled = true;
    btn.innerHTML = "⏳ Lädt...";
    status.innerText = "Wird aktualisiert...";
    await loadAdminDashboard(false);
    btn.disabled = false;
    btn.innerHTML = "🔄 Aktualisieren";
    const now = new Date();
    status.innerText = `Zuletzt: ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}

function toggleRightsPanel() {
    const panel = document.getElementById('rightsManagementBox');
    const btn = document.getElementById('toggleRightsBtn');
    if (panel.style.display === 'block') {
        panel.style.display = 'none';
        btn.style.background = 'var(--border-color)';
    } else {
        panel.style.display = 'block';
        btn.style.background = 'var(--primary)';
    }
}

function loadUserSelect() {
    const select = document.getElementById('rightsSelect');
    if(!select) return;
    const allUsers = Object.keys(workerData).flatMap(k => workerData[k]).filter((v, i, a) => a.indexOf(v) === i);
    select.innerHTML = '<option value="">-- Name wählen --</option>' + 
                       '<option value="_CLEAR_ALL_" style="color:var(--danger); font-weight:bold;">⚠️ Alle Berechtigungen löschen</option>' +
                       allUsers.map(u => `<option value="${u}">${u}</option>`).join('');
}

function handleRightsSelectChange(value) {
    if (value === "_CLEAR_ALL_") {
        if (confirm("Möchten Sie wirklich ALLE Berechtigungen löschen?")) {
            schichtLeiterDb = {};
            localStorage.setItem('apg_schichtleiter_db', JSON.stringify(schichtLeiterDb));
            updateManagersList();
            alert("🗑️ Alle Berechtigungen gelöscht.");
        }
        document.getElementById('rightsSelect').value = "";
    }
}

function grantSchichtleiterRights() {
    const name = document.getElementById('rightsSelect').value;
    const schicht = document.getElementById('assignedSchichtSelect').value;
    if(!name) { alert("Bitte einen Mitarbeiter auswählen!"); return; }
    schichtLeiterDb[name] = schicht;
    localStorage.setItem('apg_schichtleiter_db', JSON.stringify(schichtLeiterDb));
    updateManagersList();
    alert(`✅ ${name} autorisiert für Schicht ${schicht}.`);
}

function removeSchichtleiterRight(name) {
    if (confirm(`Möchten Sie die Berechtigung für ${name} löschen?`)) {
        delete schichtLeiterDb[name];
        localStorage.setItem('apg_schichtleiter_db', JSON.stringify(schichtLeiterDb));
        updateManagersList();
        alert(`❌ Berechtigung für ${name} entfernt.`);
    }
}

function updateManagersList() {
    const target = document.getElementById('currentManagersList');
    if(!target) return;
    const entries = Object.entries(schichtLeiterDb);
    if(entries.length === 0) {
        target.innerHTML = "Aktiv: Keine Leiter zugewiesen";
        return;
    }
    target.innerHTML = "Aktiv: " + entries.map(([name, schicht]) => `<b>${name}</b> (${schicht})<span class="delete-manager-btn" onclick="removeSchichtleiterRight('${name}')">✕</span>`).join(', ');
}

function setSchicht(s) {
    currentSchicht = s;
    document.querySelectorAll('.schicht-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById('mSchicht' + s)?.classList.add('active');
    selectedStaff = [];
    renderStaff();
    if (s === "A") setSchichtType('Frühschicht');
    if (s === "B") setSchichtType('Spätschicht');
    if (s === "C") setSchichtType('Nachtschicht');
}

function setSchichtType(t) {
    currentSchichtType = t;
    document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
    if(t === 'Frühschicht') document.getElementById('tFrueh')?.classList.add('active');
    if(t === 'Spätschicht') document.getElementById('tSpaet')?.classList.add('active');
    if(t === 'Nachtschicht') document.getElementById('tNacht')?.classList.add('active');
}

function openWorkerOverlay() {
    document.getElementById('workerList').innerHTML = workerData[currentSchicht].map(w => `<div class="worker-opt" onclick="addStaff('${w}')">${w}</div>`).join("");
    document.getElementById('workerOverlay').style.display = 'flex';
}
function addStaff(n) { if(!selectedStaff.includes(n)) selectedStaff.push(n); closeOverlay(); renderStaff(); }
function addManualWorker() { const v = document.getElementById('manualWorker').value.trim(); if(v) { selectedStaff.push(v); document.getElementById('manualWorker').value=""; closeOverlay(); renderStaff(); } }
function closeOverlay() { document.getElementById('workerOverlay').style.display = 'none'; }
function renderStaff() { document.getElementById('workerDisplayContainer').innerHTML = selectedStaff.map(s => `<div class="selected-worker"><span>${s}</span><span onclick="removeStaff('${s}')" style="color:var(--danger); cursor:pointer;">✕</span></div>`).join(""); liveCheck(); }
function removeStaff(n) { selectedStaff = selectedStaff.filter(x => x !== n); renderStaff(); }

function onAnlageChange(v) {
    document.getElementById('ftBox').style.display = v.startsWith("PUR") ? "block" : "none";
    
    const tracker = document.getElementById('comTracker');
    if(v === "COM") {
        tracker.style.display = "block";
        tracker.style.background = "rgba(59, 130, 246, 0.08)";
        tracker.style.borderColor = "var(--primary)";
        tracker.innerText = "⏱️ COM Schichtzeit-Konto: 0 / 480 Min (Noch 480 Min offen)";
    } else {
        tracker.style.display = "none";
    }

    document.getElementById('artikelContainer').innerHTML = "";
    document.getElementById('addArtikelBtn').disabled = v === "";
    liveCheck();
    setTimeout(scrollToBottom, 50);
}

let artikelCounter = 0;
function addArtikel() {
    const id = Date.now() + "_" + artikelCounter++;
    const div = document.createElement('div'); div.className = "artikel-row"; div.id = `art_${id}`;
    const anl = document.getElementById('anlage').value;
    
    const labelGut = anl === "COM" ? "✅ Gutteile (Kg)" : "✅ Gutteile (Stk)";
    const labelAus = anl === "COM" ? "❌ Ausschuss (Kg)" : "❌ Ausschuss (Gesamt)";
    const placeholderUnit = anl === "COM" ? "Kg" : "Stk";

    let dauerFieldHtml = "";
    if (anl === "COM") {
        dauerFieldHtml = `
            <div>
                <label>⏱️ Dauer (Min)</label>
                <input type="number" class="art-dauer" placeholder="z.B. 120" oninput="liveCheck()">
            </div>
        `;
    }

    div.innerHTML = `<button onclick="this.parentElement.remove(); liveCheck();" style="position:absolute; right:12px; top:12px; background:var(--danger); color:white; border:none; border-radius:6px; width:24px; height:24px; cursor:pointer; font-weight:700;">✕</button>
        
        <div class="grid-2" style="margin-top: 10px;">
            <div>
                <label>📌 Artikelnummer</label>
                <input type="text" class="art-name" placeholder="z.B. 123456">
            </div>
            ${dauerFieldHtml}
        </div>
        
        <div class="grid-2">
            <div>
                <label>${labelGut}</label>
                <input type="number" class="art-gut" placeholder="${placeholderUnit}" oninput="liveCheck()">
            </div>
            <div>
                <label>${labelAus}</label>
                <input type="number" class="art-total-aus" placeholder="${placeholderUnit}" value="0" oninput="liveCheck()">
            </div>
        </div>
        
        <div id="rows_${id}"></div>
        <div style="display:flex; gap:10px; margin-top:14px; border-top: 1px solid var(--border-color); padding-top: 10px;">
            <button class="sub-btn" style="flex:1;" onclick="addRow('${id}','aus')">+ Ausschuss-Grund</button>
            <button class="sub-btn" style="flex:1;" onclick="addRow('${id}','stoer')">+ Störung</button>
        </div>`;
        
    document.getElementById('artikelContainer').appendChild(div);
    liveCheck();
    setTimeout(scrollToBottom, 50);
}

function addRow(artId, type) {
    const anl = document.getElementById('anlage').value;
    const cat = anl === 'COM' ? 'COM' : (anl.startsWith("PUR") ? 'PUR' : 'Spritz');
    const div = document.createElement('div'); div.className = "code-row";
    
    const valPlaceholder = type === 'aus' ? (anl === 'COM' ? 'Kg' : 'Stk') : 'Min';
    
    div.innerHTML = `<div class="code-row-inputs">
        <select class="${type}-select">
            ${codeData[cat][type].map(c => `<option value="${c}">${c}</option>`).join("")}
        </select>
        <input type="number" class="${type}-value" placeholder="${valPlaceholder}" oninput="liveCheck()">
        <span class="remove-row-btn" onclick="this.parentElement.parentElement.remove(); liveCheck();">✕</span>
    </div>
    <input type="text" class="sonstige-input" placeholder="Grund manuell...">`;
    
    document.getElementById(`rows_${artId}`).appendChild(div);
    const select = div.querySelector(`.${type}-select`);
    const sonstInput = div.querySelector('.sonstige-input');
    select.onchange = () => { sonstInput.style.display = select.value === 'Sonstige' ? 'block' : 'none'; };
    
    liveCheck();
    setTimeout(scrollToBottom, 50);
}

function liveCheck() {
    const sendBtn = document.getElementById('mainSendBtn');
    const anlage = document.getElementById('anlage').value;
    const hasWorkers = selectedStaff.length > 0;
    const hasAnlage = anlage !== "";
    const artikelRows = document.querySelectorAll('.artikel-row');
    const tracker = document.getElementById('comTracker');
    
    if(!hasWorkers) { sendBtn.disabled = true; sendBtn.innerText = "⚠️ Bitte Mitarbeiter hinzufügen"; return; }
    if(!hasAnlage) { sendBtn.disabled = true; sendBtn.innerText = "⚠️ Bitte Anlage auswählen"; return; }
    if(artikelRows.length === 0) { sendBtn.disabled = true; sendBtn.innerText = "⚠️ Bitte Artikel hinzufügen"; return; }
    
    let totalComMinutes = 0;
    let validationFailed = false;
    let reasonMessage = "🚀 SPEICHERN & SENDEN";

    artikelRows.forEach(row => {
        const totalAusRequired = parseFloat(row.querySelector('.art-total-aus').value) || 0;
        
        if (anlage === "COM") {
            const dauerInput = row.querySelector('.art-dauer');
            if (dauerInput) {
                totalComMinutes += parseInt(dauerInput.value) || 0;
            }
        }

        let sumOfAusReasons = 0;
        row.querySelectorAll('.code-row').forEach(codeRow => {
            const ausVal = codeRow.querySelector('.aus-value');
            if (ausVal) sumOfAusReasons += parseFloat(ausVal.value) || 0;
        });

        if (Math.abs(totalAusRequired - sumOfAusReasons) > 0.01) {
            validationFailed = true;
            reasonMessage = "⚠️ Ausschuss-Summe stimmt nicht überein!";
            row.querySelectorAll('.code-row').forEach(cr => { if(cr.querySelector('.aus-value')) cr.classList.add('err-border'); });
        } else {
            row.querySelectorAll('.code-row').forEach(cr => cr.classList.remove('err-border'));
        }
    });

    if (anlage === "COM") {
        if (totalComMinutes === 480) {
            tracker.style.background = "rgba(16, 185, 129, 0.1)";
            tracker.style.borderColor = "var(--success)";
            tracker.style.color = "var(--success)";
            tracker.innerText = `⏱️ COM Schichtzeit-Konto: ${totalComMinutes} / 480 Min - Perfekt!`;
        } 
        else if (totalComMinutes < 480) {
            let diff = 480 - totalComMinutes;
            tracker.style.background = "rgba(59, 130, 246, 0.08)";
            tracker.style.borderColor = "var(--primary)";
            tracker.style.color = "#fff";
            tracker.innerText = `⏱️ COM Schichtzeit-Konto: ${totalComMinutes} / 480 Min (Noch ${diff} Min offen)`;
            
            validationFailed = true;
            reasonMessage = `⚠️ Fehlende Zeit! Bitte noch ${diff} Min buchen.`;
        } 
        else {
            let diff = totalComMinutes - 480;
            tracker.style.background = "rgba(244, 63, 94, 0.1)";
            tracker.style.borderColor = "var(--danger)";
            tracker.style.color = "var(--danger)";
            tracker.innerText = `⚠️ COM Schichtzeit-Konto: ${totalComMinutes} / 480 Min (+ ${diff} Min zu viel!)`;
            
            validationFailed = true;
            reasonMessage = `⚠️ Limit überschritten! Max. 480 Min.`;
        }
    }

    if(validationFailed) {
        sendBtn.disabled = true;
        sendBtn.innerText = reasonMessage;
        sendBtn.style.background = "var(--danger)";
    } else {
        sendBtn.disabled = false;
        sendBtn.innerText = "🚀 SPEICHERN & SENDEN";
        sendBtn.style.background = "var(--primary)";
    }
}

async function processReport() {
    const sendBtn = document.getElementById('mainSendBtn');
    sendBtn.disabled = true;
    sendBtn.innerText = "⏳ Bitte warten...";

    const n = new Date();
    const localTimestamp = `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;

    const payload = {
        id: "rep_" + Date.now() + "_" + Math.random().toString(36).substr(2, 5),
        timestamp: localTimestamp,
        datum: document.getElementById('datum').value,
        sender: loggedInUser,
        anlage: document.getElementById('anlage').value,
        schicht: currentSchicht,
        schichtArt: currentSchichtType,
        mitarbeiter: selectedStaff.join(", "),
        formTraeger: "",
        artikel: []
    };

    if (document.getElementById('ftBox').style.display !== 'none') {
        payload.formTraeger = Array.from(document.querySelectorAll('.ft-btn.active')).map(btn => btn.innerText).join(", ");
    }

    document.querySelectorAll('.artikel-row').forEach(row => {
        const artNum = row.querySelector('.art-name').value.trim() || "Unbekannt";
        const gutteile = parseFloat(row.querySelector('.art-gut').value) || 0;
        
        let durationVal = 0;
        if (payload.anlage === 'COM') {
            const dauerInput = row.querySelector('.art-dauer');
            durationVal = dauerInput ? (parseInt(dauerInput.value) || 0) : 0;
        }
        
        let hatEintrag = false;

        row.querySelectorAll('.code-row').forEach(codeRow => {
            const ausSelect = codeRow.querySelector('.aus-select');
            const ausVal = codeRow.querySelector('.aus-value');
            const stoerSelect = codeRow.querySelector('.stoer-select');
            const stoerVal = codeRow.querySelector('.stoer-value');
            const sonstInput = codeRow.querySelector('.sonstige-input');

            let code_aus = "Keine", wert_aus = 0;
            let code_stoer = "Keine", wert_stoer = "";

            if (ausSelect && ausVal && parseFloat(ausVal.value) > 0) {
                code_aus = ausSelect.value === 'Sonstige' ? "Sonstige: " + sonstInput.value.trim() : ausSelect.value;
                wert_aus = parseFloat(ausVal.value);
                hatEintrag = true;
            }

            if (stoerSelect && stoerVal && parseInt(stoerVal.value) > 0) {
                code_stoer = stoerSelect.value === 'Sonstige' ? "Sonstige: " + sonstInput.value.trim() : stoerSelect.value;
                wert_stoer = parseInt(stoerVal.value);
                hatEintrag = true;
            }

            if (hatEintrag) {
                payload.artikel.push({
                    artikelNummer: artNum,
                    gutteile: gutteile,
                    duration: durationVal,
                    wert_aus: wert_aus,
                    code_aus: code_aus,
                    code_stoer: code_stoer,
                    wert_stoer: wert_stoer
                });
            }
        });

        if (!hatEintrag) {
            payload.artikel.push({
                artikelNummer: artNum,
                gutteile: gutteile,
                duration: durationVal,
                wert_aus: 0,
                code_aus: "Keine",
                code_stoer: "Keine",
                wert_stoer: ""
            });
        }
    });

    pufferReport(payload);
}

function pufferReport(data) {
    let puffer = [];
    if(localStorage.getItem('apg_offline_puffer')) {
        try { puffer = JSON.parse(localStorage.getItem('apg_offline_puffer')); } catch(e){}
    }
    if(!puffer.some(x => x.id === data.id)) {
        puffer.push(data);
        localStorage.setItem('apg_offline_puffer', JSON.stringify(puffer));
    }
    alert("Gesendet! Vielen Dank, dass Sie dieses System nutzen.");
    clearForm();
    liveCheck();
    checkOfflinePuffer();
}

async function checkOfflinePuffer() {
    if(!localStorage.getItem('apg_offline_puffer')) return;
    if(!navigator.onLine) return;

    let puffer = [];
    try { puffer = JSON.parse(localStorage.getItem('apg_offline_puffer')); } catch(e){}
    if(puffer.length === 0) return;

    let activePuffer = [...puffer];

    for(let i = 0; i < activePuffer.length; i++) {
        const currentReport = activePuffer[i];
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000);

            const response = await fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify({ action: "insertReport", data: currentReport }),
                signal: controller.signal
            });
            
            clearTimeout(timeoutId);
            const res = await response.json();
            
            if(res.success) {
                puffer = puffer.filter(x => x.id !== currentReport.id);
                localStorage.setItem('apg_offline_puffer', JSON.stringify(puffer));
            }
        } catch(e) {
            break; 
        }
    }
}

function clearForm() {
    document.getElementById('artikelContainer').innerHTML = "";
    document.querySelectorAll('.ft-btn').forEach(b => b.classList.remove('active'));
    selectedStaff = [];
    renderStaff();
    document.getElementById('anlage').value = "";
    onAnlageChange("");
}

async function loadAdminDashboard(isAuto) {
    try {
        // 1. Verileri Google Script'ten çek
        const response = await fetch(`${scriptURL}?action=getReports&_cb=${Date.now()}`);
        let reports = await response.json();

        // 2. Tarihe göre sıralama (En güncel en üstte)
        reports.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

        // 3. Filtreleme (Seçili vardiyaya göre)
        const filtered = reports.filter(r => r.schicht === activeFilterSchicht);

        // 4. HTML'e basma
        const container = document.getElementById('reportsContainer');
        container.innerHTML = filtered.map(r => `
            <div class="report-box">
                <span class="badge-origin">${r.anlage}</span>
                <div class="report-date">${new Date(r.timestamp).toLocaleString()}</div>
                <div class="report-title">Art-Nr: ${r.artikel} | ${r.menge} Stk</div>
                <div class="report-danger">❌ Ausschuss: ${r.ausschuss}</div>
                <div class="report-warning">⚠️ ${r.hataKodu || 'Keine'}</div>
                <div class="report-warning">⏱️ Störung: ${r.stoerung || 'Keine'}</div>
                <div class="report-user">👤 ${r.mitarbeiter}</div>
            </div>
        `).join('');
    } catch(e) {
        console.error("Dashboard yüklenemedi:", e);
    }
}
function filterSchicht(schicht) {
    activeFilterSchicht = schicht;
    document.querySelectorAll('.filter-btn').forEach(btn => {
        if(btn.id === 'flt' + schicht) btn.classList.add('active-filter');
        else btn.classList.remove('active-filter');
    });
    loadAdminDashboard();
}
