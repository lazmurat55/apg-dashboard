<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APG Bochum - Betriebsdatenerfassung</title>
    <style>
        :root {
            --bg-main: #0f172a;        
            --bg-card: #1e293b;        
            --bg-input: #0f172a;       
            --border-color: #334155;   
            --primary: #3b82f6;        
            --primary-hover: #1d4ed8;  
            --success: #10b981;        
            --danger: #f43f5e;         
            --orange-bright: #f59e0b;  
            --text-main: #f8fafc;      
            --text-muted: #94a3b8;     
            --dash-danger: #ff4d6d;    
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        .container { width: 100%; max-width: 1100px; background: transparent; transition: max-width 0.3s ease; }
        .container.wide { max-width: 1200px; }
        .app-wrapper { max-width: 620px; margin: 0 auto; }
        
        .form-card { background: var(--bg-card); border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2), 0 2px 4px -2px rgba(0,0,0,0.2); border: 1px solid var(--border-color); }
        
        h2 { text-align: center; margin-bottom: 24px; color: #fff; font-weight: 700; letter-spacing: 0.5px; }
        h3 { margin-bottom: 16px; color: #fff; font-weight: 600; font-size: 18px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        h4 { color: #fff; font-weight: 600; margin-bottom: 15px; }
        
        label { display: block; margin: 12px 0 6px; font-size: 13px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, select, button { width: 100%; padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-input); color: #fff; font-size: 15px; outline: none; transition: all 0.2s ease; }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,130,246,0.25); }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 10px; }
        
        button { font-weight: 600; cursor: pointer; border: none; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 2px 4px rgba(59,130,246,0.2); }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-primary:disabled { background: #334155; color: var(--text-muted); cursor: not-allowed; box-shadow: none; }
        
        .schicht-group, .type-group { display: flex; gap: 8px; margin-bottom: 12px; }
        .schicht-btn, .type-btn { flex: 1; background: var(--bg-input); border: 1px solid var(--border-color); padding: 12px; border-radius: 8px; color: var(--text-muted); font-size: 14px; }
        .schicht-btn.active, .type-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .active-filter { background: var(--orange-bright) !important; color: white !important; border-color: var(--orange-bright) !important; }
        
        .worker-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; min-height: 44px; border: 1px dashed var(--border-color); padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.1); }
        .selected-worker { background: rgba(59,130,246,0.15); border: 1px solid var(--primary); color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 13px; display: flex; align-items: center; gap: 8px; font-weight: 500; }
        
        .ft-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .ft-btn { background: var(--bg-input); border: 1px solid var(--border-color); padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-muted); }
        .ft-btn.active { background: var(--success); color: white; border-color: var(--success); }
        
        .com-tracker-box { display: none; background: rgba(59, 130, 246, 0.1); border: 1px dashed var(--primary); border-radius: 8px; padding: 14px; margin: 15px 0; font-size: 14px; font-weight: 600; text-align: center; color: #fff; }
        
        /* Orijinal İkinci Resimdeki Stilize Kart Yapısı */
        .artikel-row { background: rgba(15, 23, 42, 0.4); border: 1px solid var(--border-color); padding: 20px; border-radius: 12px; margin-bottom: 20px; position: relative; }
        
        .code-row-container { background: rgba(15, 23, 42, 0.6); padding: 12px; border-radius: 8px; margin-top: 12px; border: 1px solid var(--border-color); }
        .code-row { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; width: 100%; }
        .code-row:last-child { margin-bottom: 0; }
        .code-row select { flex: 7; min-width: 0; padding: 10px; font-size: 14px; }
        .code-row input { flex: 2.5; min-width: 0; padding: 10px; font-size: 14px; text-align: center; font-weight: 600; }
        .code-row .remove-row-btn { flex: 0.5; background: none; color: var(--text-muted); border: none; font-size: 18px; padding: 0; width: auto; cursor: pointer; display: flex; justify-content: center; }
        .code-row .remove-row-btn:hover { color: var(--danger); }
        
        .sonstige-input { display: none; margin-top: -4px; margin-bottom: 8px; font-size: 14px; padding: 10px; width: 100%; background: var(--bg-card); }
        
        /* Onay Rozeti - Badge */
        .status-badge { display: inline-flex; align-items: center; gap: 4px; background: var(--danger); color: white; font-size: 13px; font-weight: 700; padding: 4px 10px; border-radius: 20px; margin-top: 5px; margin-bottom: 8px; }
        .status-badge.ok { background: var(--success); }

        /* Alt ikili buton grubu */
        .code-action-group { display: flex; gap: 10px; margin-top: 12px; }
        .code-action-group button { flex: 1; padding: 10px; font-size: 13px; font-weight: 600; border-radius: 8px; }
        .btn-add-aus { background: #2563eb; color: white; }
        .btn-add-aus:hover { background: #1d4ed8; }
        .btn-add-stoer { background: #1e3a8a; color: white; border: 1px solid #3b82f6; }
        .btn-add-stoer:hover { background: #172554; }

        .add-artikel-dash-btn { background: transparent; border: 2px dashed #334155; color: #38bdf8; padding: 14px; border-radius: 10px; font-weight: 600; width: 100%; margin-top: 10px; }
        .add-artikel-dash-btn:hover { border-color: #38bdf8; background: rgba(56, 189, 248, 0.02); }

        .sub-btn { background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); color: var(--text-main); padding: 10px 16px; font-size: 13px; border-radius: 8px; width: auto; margin-top: 10px; font-weight: 500; }
        .sub-btn:hover { background: rgba(255,255,255,0.08); border-color: var(--text-muted); }
        
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.8); display:none; justify-content:center; align-items:center; z-index:100; padding:15px; backdrop-filter: blur(4px); }
        .overlay-content { background:var(--bg-card); width:100%; max-width:420px; padding:24px; border-radius:12px; border:1px solid var(--border-color); max-height:85vh; display:flex; flex-direction:column; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
        .worker-list { overflow-y:auto; flex:1; margin:15px 0; display:flex; flex-direction:column; gap:6px; padding-right:4px; }
        .worker-opt { padding:12px; background:var(--bg-input); border:1px solid var(--border-color); border-radius:8px; cursor:pointer; font-weight: 500; transition: all 0.2s; }
        .worker-opt:hover { border-color: var(--primary); background: rgba(59,130,246,0.05); }
        
        .management-box { display: none; background: rgba(245, 158, 11, 0.05); border: 1px dashed var(--orange-bright); border-radius: 10px; padding: 16px; margin-top: 10px; margin-bottom: 20px; }
        .managers-list { margin-top: 12px; font-size: 13px; color: var(--text-main); padding: 10px; background: var(--bg-input); border-radius: 8px; border: 1px solid var(--border-color); }
        .delete-manager-btn { color: var(--danger); font-weight: bold; margin-left: 10px; cursor: pointer; }
        
        .admin-action-btn { background: var(--border-color); color: var(--text-main); width: auto; padding: 8px 14px; font-size: 13px; border-radius: 8px; }
        .admin-action-btn:hover { background: var(--primary); }
        
        .refresh-btn { background: #334155; color: #fff; border: 1px solid var(--border-color); border-radius: 8px; padding: 10px 18px; font-size: 13px; width: auto; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 16px; }
        .refresh-btn:hover { background: var(--success); border-color: var(--success); }
        
        #reportsContainer { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; max-height: 650px; overflow-y: auto; padding-right: 4px; margin-top: 15px; }
        @media (max-width: 900px) { #reportsContainer { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 650px) { #reportsContainer { grid-template-columns: 1fr; } }

        .report-box { background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 12px; padding: 18px; position: relative; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); min-height: 190px; }
        .badge-origin { position: absolute; right: 12px; top: 12px; background: var(--primary); padding: 4px 12px; border-radius: 6px; font-size: 14px; font-weight: 700; color: #fff; }
        .report-box .report-date { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
        .report-box .report-title { font-size: 17px; font-weight: 700; color: #fff; margin: 6px 0; line-height: 1.4; }
        .report-box .report-danger { font-size: 15px; color: var(--dash-danger) !important; font-weight: 700; margin: 4px 0; line-height: 1.4; }
        .report-box .report-warning { font-size: 14px; color: var(--orange-bright); font-weight: 600; margin: 4px 0; }
        .report-box .report-user { font-size: 13px; color: var(--success); margin-top: 8px; font-weight: 600; border-top: 1px solid var(--border-color); padding-top: 8px; }

        #loginScreen { display: block; max-width: 400px; margin: 60px auto 0; }
        #mainApp, #adminPanel { display: none; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div id="loginScreen" class="form-card">
        <h2>APG BOCHUM LOGIN</h2>
        <label>Benutzername</label>
        <input type="text" id="userInp" placeholder="Name eingeben...">
        <label>Passwort</label>
        <input type="password" id="passInp" placeholder="******">
        <button class="btn-primary" style="margin-top:24px; padding: 14px;" onclick="checkLogin()">ANMELDEN</button>
        <div id="loginError" style="color:var(--danger); text-align:center; margin-top:14px; display:none; font-size:14px; font-weight: 600;"></div>
    </div>

    <div id="mainApp" class="app-wrapper">
        <div class="form-card" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; padding: 14px 20px;">
            <span id="currentUserDisplay" style="font-weight:700; color:var(--success);"></span>
            <button onclick="location.reload()" style="width:auto; padding:6px 14px; font-size:13px; background:var(--border-color); border-radius: 6px;">Abmelden</button>
        </div>
        
        <div class="form-card">
            <h3>Schichtinformationen / Schicht</h3>
            <label>Schicht</label>
            <div class="schicht-group">
                <button class="schicht-btn" id="mSchichtA" onclick="setSchicht('A')">Schicht A</button>
                <button class="schicht-btn active" id="mSchichtB" onclick="setSchicht('B')">Schicht B</button>
                <button class="schicht-btn" id="mSchichtC" onclick="setSchicht('C')">Schicht C</button>
            </div>

            <div class="type-group">
                <button class="type-btn" id="tFrueh" onclick="setSchichtType('Frühschicht')">Frühschicht</button>
                <button class="type-btn active" id="tSpaet" onclick="setSchichtType('Spätschicht')">Spätschicht</button>
                <button class="type-btn" id="tNacht" onclick="setSchichtType('Nachtschicht')">Nachtschicht</button>
            </div>

            <label>Datum</label>
            <input type="date" id="datum">
        </div>

        <div class="form-card">
            <h3>Personal / Mitarbeiter</h3>
            <label>Mitarbeiter an der Anlage</label>
            <button class="sub-btn" style="width:100%; padding:12px; background: rgba(59,130,246,0.05); border-color: var(--primary);" onclick="openWorkerOverlay()">+ Mitarbeiter auswählen</button>
            <div class="worker-container" id="workerDisplayContainer"></div>
        </div>

        <div class="form-card">
            <h3>Anlage / Maschine</h3>
            <label>Anlage wählen</label>
            <select id="anlage" onchange="onAnlageChange(this.value)">
                <option value="">-- Bitte wählen --</option>
                <option value="PUR1">PUR 1</option>
                <option value="PUR2">PUR 2</option>
                <option value="PUR3">PUR 3</option>
                <option value="PUR4">PUR 4</option>
                <option value="PUR5">PUR 5</option>
                <option value="PUR6">PUR 6</option>
                <option value="PUR7">PUR 7</option>
                <option value="PUR8">PUR 8</option>
                <option value="PUR9">PUR 9</option>
                <option value="CIM1">CIM 1</option>
                <option value="IM1">IM 1</option>
                <option value="IM2">IM 2</option>
                <option value="IM3">IM 3</option>
                <option value="IM4">IM 4</option>
                <option value="IM5">IM 5</option>
                <option value="COM">COM</option>
            </select>

            <div id="comTracker" class="com-tracker-box">⏱️ COM Schichtzeit-Konto: 0 / 480 Min</div>

            <div id="ftBox" style="display:none; margin-top: 15px;">
                <label>Formträger (Mehrfachauswahl möglich)</label>
                <div class="ft-grid">
                    <div class="ft-btn" onclick="this.classList.toggle('active'); liveCheck();">FT1</div>
                    <div class="ft-btn" onclick="this.classList.toggle('active'); liveCheck();">FT2</div>
                    <div class="ft-btn" onclick="this.classList.toggle('active'); liveCheck();">FT3</div>
                    <div class="ft-btn" onclick="this.classList.toggle('active'); liveCheck();">FT4</div>
                    <div class="ft-btn" onclick="this.classList.toggle('active'); liveCheck();">FT5</div>
                    <div class="ft-btn" onclick="this.classList.toggle('active'); liveCheck();">FT6</div>
                </div>
            </div>
        </div>

        <div class="form-card">
            <h3>Produktion & Fehlererfassung</h3>
            <div id="artikelContainer"></div>
            
            <button id="addArtikelBtn" class="add-artikel-dash-btn" onclick="addArtikel()" disabled>+ Artikel hinzufügen</button>
        </div>
        
        <button id="mainSendBtn" class="btn-primary" style="padding:16px; font-size:16px; border-radius: 10px;" onclick="processReport()" disabled>⚠️ Bitte Formular ausfüllen</button>
    </div>

    <div id="adminPanel" class="form-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px;">
            <span id="adminUserDisplay" style="font-weight:700; color:var(--orange-bright); font-size: 16px;"></span>
            <div style="display:flex; gap:8px;">
                <button id="toggleRightsBtn" class="admin-action-btn" onclick="toggleRightsPanel()" style="display:none;">⚙️ Admin-Optionen</button>
                <button onclick="location.reload()" style="width:auto; padding:6px 14px; font-size:13px; background:var(--danger); border-radius:6px;">Abmelden</button>
            </div>
        </div>
        
        <div id="rightsManagementBox" class="management-box">
            <h4>⚙️ Rechteverwaltung (Schichtleiter)</h4>
            <label>Mitarbeiter auswählen</label>
            <select id="rightsSelect" onchange="handleRightsSelectChange(this.value)"></select>
            
            <label>Zugewiesene Schicht</label>
            <select id="assignedSchichtSelect">
                <option value="A">Schicht A</option>
                <option value="B" selected>Schicht B</option>
                <option value="C">Schicht C</option>
            </select>
            
            <button class="btn-primary" style="margin-top:14px; padding:10px; background:var(--success);" onclick="grantSchichtleiterRights()">✓ Berechtigung Speichern</button>
            
            <div class="managers-list" id="currentManagersList">Aktiv: Keine Leiter zugewiesen</div>
        </div>

        <h3 style="font-size: 20px; margin-bottom: 20px;">Schichtleiter Dashboard</h3>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <button id="manualRefreshBtn" class="refresh-btn" onclick="manualRefreshDashboard()">🔄 Aktualisieren</button>
            <span id="refreshStatus" style="font-size: 13px; color: var(--text-muted);"></span>
        </div>
        
        <div id="adminFilterGroup" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; margin-bottom:16px;">
            <button class="schicht-btn filter-btn" id="fltA" onclick="filterSchicht('A')">Schicht A</button>
            <button class="schicht-btn filter-btn" id="fltB" onclick="filterSchicht('B')">Schicht B</button>
            <button class="schicht-btn filter-btn" id="fltC" onclick="filterSchicht('C')">Schicht C</button>
        </div>

        <div id="reportsContainer"></div>
    </div>
</div>

<div class="overlay" id="workerOverlay">
    <div class="overlay-content">
        <h4>Personal auswählen</h4>
        <div class="worker-list" id="workerList"></div>
        <input type="text" id="manualWorker" placeholder="Name manuell schreiben..." style="margin-bottom:12px;">
        <button class="btn-primary" onclick="addManualWorker()" style="padding:10px; margin-bottom:8px;">Manuell hinzufügen</button>
        <button class="sub-btn" onclick="closeOverlay()">Schließen</button>
    </div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbymekHauHN-LjNtYeuWjlLjSgB-x65fklMahH6aJFoVoc8T2_L5qEUkrhHZzddzt2HbsQ/exec";

let currentSchicht = "B";
let currentSchichtType = "Spätschicht";
let selectedStaff = [];
let loggedInUser = "";
let superAdmin = "Keskin"; 
let schichtLeiterDb = {}; 
let activeFilterSchicht = "B";
let autoRefreshInterval = null;

if(localStorage.getItem('apg_schichtleiter_db')) {
    try { schichtLeiterDb = JSON.parse(localStorage.getItem('apg_schichtleiter_db')); } catch(e){}
}

const workerData = {
    "A": ["Kunert M.", "Karali O.", "Mikuczynski K.", "Türkmen E.", "Amrouch M.", "Stania D.", "Kantaroglu A.", "Krancioch A.", "Held D.", "Berisha I.", "Neji M.", "Mulugeta G.", "Udezue P.", "Jansen M.", "Aksoy O.", "Yildirim S.", "Brand N.", "Louze A.", "Blanquez Romero V.", "Diallo M.D.", "Sener E.", "Klomrit", "Garcia"],
    "B": ["Keskin Mur.", "Aldirmaz P.", "Anderwald R.", "Bayrakli F.", "Kilic D.", "Maafi T.", "Besche T.", "Eickhoff P.", "Toth Renata", "Gibba n.", "Helf A.", "Isbir J.", "Jeyakumar S.", "Kalisch T.", "Kowarsch R.", "Nowak M.", "Pähler D.", "Patarcsity V.", "Pulendran K.", "Sahin E.", "Savas S.", "Schiavitelli", "Uluyüz B.", "Uzun S.", "Klomrit", "Garcia"],
    "C": ["Beher T.", "Keskin Mustafa", "Kantaroglu Ö.", "Savas R.", "Rafo S.", "Gertz Kevin", "Gertz S.", "Schönborn Ch.", "Fortes Ch.", "Sakaguchi M.", "Mercan M.", "Krämer Ch.", "Juretzka T.", "Kumbara E.", "Skupio D.", "Skrago T.", "Bah A.", "Kaya A.", "Jdea A.", "Toure A.", "Schneider D.", "Tchaleu Bertrand", "Keskinmus", "Klomrit", "Garcia"]
};

const codeData = {
    PUR: {
        aus: ["6-2-01 Temperatur zu niedrig", "6-2-02 Schaum haftet nicht am Bauteil", "6-2-03 Einlegefehler", "6-2-04 Schussabbruch", "6-2-05 CIM nicht voll ausgeschäumt", "6-2-06 Lippe gerissen", "6-2-07 CIM gerissen", "7-2-01 Nacharbeit am Bauteil (Entgraten, Nachkleben etc.)", "Sonstige"],
        stoer: ["3-01 WZ-Wechsel", "3-02 Mat-Umst.", "4-2-01 Ungepl. Inst. WZ", "4-2-02 Ungepl. Inst. Masch", "4-2-03 Poly/Iso Überdruck", "4-2-04 Mischkopf nio", "4-2-05 Fehler Lichtschr.", "4-2-06 Trennmittelpist.", "4-2-07 Formträger Prob.", "4-2-08 Reinigung WZ", "4-2-09 Not Aus", "5-2-01 Logistik Mangel", "5-2-02 Keine Teile IM/CIM", "5-2-04 Wartezeit Einrichter", "5-2-10 Poly/Iso leer", "Sonstige"]
    },
    Spritz: {
        aus: ["6-1-01 Anfahrschrott", "6-1-02 Mat-Umst.", "6-1-03 CIM n.voll", "6-1-04 CIM gerissen", "6-1-06 Einfallstellen", "6-1-07 Brandstellen", "6-1-08 Silberstreifen", "Sonstige"],
        stoer: ["3-01 WZ-Wechsel", "3-02 Mat-Umst.", "4-1-01 Ungepl. Inst. WZ", "4-1-02 Ungepl. Inst. Masch", "4-1-03 Mat-Förderung Prob.", "4-1-04 Probleme Dosier.", "4-1-05 Probleme Schließeinh.", "4-1-06 Teileentnahme Prob.", "4-1-07 Probleme WZ-Heizung", "4-1-08 Probleme Beflamm.", "5-1-01 Mat-Mangel", "5-1-03 Wartezeit Einrichter", "Sonstige"]
    },
    COM: {
        aus: ["6-3-01 Anfahrschrott", "6-3-02 Mat-Fehler", "Sonstige"],
        stoer: ["3-01 WZ-Wechsel", "3-02 Mat-Umst.", "4-3-01 Messer schleifen", "4-3-02 Ungepl. Inst. Masch", "4-3-04 Silowechsel", "5-3-01 Mat-Mangel", "5-3-05 Feueralarm", "Sonstige"]
    }
};

function setInitialTodayDate() {
    const today = new Date();
    document.getElementById('datum').value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
}

function scrollToBottom() {
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

async function checkLogin() {
    const u = document.getElementById('userInp').value.trim();
    const p = document.getElementById('passInp').value.trim();
    const errorDiv = document.getElementById('loginError');
    
    if(!u || !p) {
        errorDiv.innerText = "❌ Bitte Name und Passwort eingeben!";
        errorDiv.style.display = 'block';
        return;
    }
    
    errorDiv.innerText = "⏳ Prüfe Login...";
    errorDiv.style.display = 'block';
    errorDiv.style.color = "var(--primary)";

    if (!navigator.onLine) {
        if (u === superAdmin || schichtLeiterDb[u]) {
            errorDiv.style.display = 'none';
            enterApp(u);
            return;
        }
        errorDiv.style.color = "var(--danger)";
        errorDiv.innerText = "❌ Keine Netzverbindung!";
        return;
    }

    try {
        const response = await fetch(`${scriptURL}?action=verifyLogin&user=${encodeURIComponent(u)}&pass=${encodeURIComponent(p)}&_cb=${Date.now()}`);
        const result = await response.json();
        
        if(result.success) {
            errorDiv.style.display = 'none';
            enterApp(u);
        } else {
            errorDiv.style.color = "var(--danger)";
            errorDiv.innerText = "❌ Falscher Benutzername oder Passwort!";
        }
    } catch(e) {
        enterApp(u);
    }
}

function enterApp(u) {
    loggedInUser = u;
    document.getElementById('loginScreen').style.display = 'none';
    setInitialTodayDate();
    
    if (u === superAdmin) {
        document.getElementById('mainContainer').classList.add('wide');
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminUserDisplay').innerHTML = "👑 Admin: " + u;
        document.getElementById('toggleRightsBtn').style.display = 'inline-block';
        loadUserSelect();
        updateManagersList();
        filterSchicht('B');
        startAutoRefresh();
    } 
    else if (schichtLeiterDb[u]) {
        const assignedSchicht = schichtLeiterDb[u];
        document.getElementById('mainContainer').classList.add('wide');
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminUserDisplay').innerHTML = `🏃 Leiter: ${u} (Schicht ${assignedSchicht})`;
        document.getElementById('toggleRightsBtn').style.display = 'none'; 
        document.getElementById('rightsManagementBox').style.display = 'none';
        
        document.querySelectorAll('.filter-btn').forEach(btn => btn.style.display = 'none');
        const targetBtn = document.getElementById('flt' + assignedSchicht);
        if(targetBtn) {
            targetBtn.style.display = 'inline-block';
            targetBtn.classList.add('active-filter');
        }
        filterSchicht(assignedSchicht);
        startAutoRefresh();
    } 
    else {
        document.getElementById('mainContainer').classList.remove('wide');
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('currentUserDisplay').innerHTML = "👤 Angemeldet: " + u;
        setSchicht('B');
    }
    
    window.addEventListener('online', checkOfflinePuffer);
    checkOfflinePuffer();
}

function startAutoRefresh() {
    if(autoRefreshInterval) clearInterval(autoRefreshInterval);
    
    // İlk açılışta hemen bir kontrol yapıp doğru tempoyu ayarlasın
    checkAndSetDynamicRefresh();
    
    // Her 60 saniyede bir saati kontrol edip modu güncelleyen ana motor
    autoRefreshInterval = setInterval(() => {
        checkAndSetDynamicRefresh();
    }, 60000); 
}

let currentRefreshTempo = null; // Mevcut tempoyu hafızada tutmak için
let dashboardExecutionInterval = null;

function checkAndSetDynamicRefresh() {
    const now = new Date();
    const hours = now.getHours();
    const minutes = now.getMinutes();
    const currentTimeInMinutes = (hours * 60) + minutes;

    // Hedef Zaman Aralıklarının Dakika Cinsinden Hesabı:
    // 13:30 - 14:10 aralığı (810 - 850. dakika)
    // 21:30 - 22:10 aralığı (1290 - 1330. dakika)
    // 05:30 - 06:10 aralığı (330 - 370. dakika)
    
    const isYoğunSaat = 
        (currentTimeInMinutes >= 810 && currentTimeInMinutes <= 850) || 
        (currentTimeInMinutes >= 1290 && currentTimeInMinutes <= 1330) || 
        (currentTimeInMinutes >= 330 && currentTimeInMinutes <= 370);

    let targetTempo = isYoğunSaat ? "hizli" : "sakin";

    // Eğer tempo değiştiyse veya ilk defa kuruluyorsa tetikle
    if (currentRefreshTempo !== targetTempo) {
        currentRefreshTempo = targetTempo;
        if(dashboardExecutionInterval) clearInterval(dashboardExecutionInterval);
        
        if (targetTempo === "hizli") {
            // Rapor yoğunluğu var -> 90 saniyede bir (90000 ms) yenile
            loadAdminDashboard(true);
            dashboardExecutionInterval = setInterval(() => { loadAdminDashboard(true); }, 90000);
            document.getElementById('refreshStatus').innerText = "Modus: Live (90s)";
        } else {
            // Sakin zaman -> 30 dakikada bir (1800000 ms) yenile
            loadAdminDashboard(true);
            dashboardExecutionInterval = setInterval(() => { loadAdminDashboard(true); }, 1800000);
            document.getElementById('refreshStatus').innerText = "Modus: Eco (30m)";
        }
    }
}

async function manualRefreshDashboard() {
    const btn = document.getElementById('manualRefreshBtn');
    const status = document.getElementById('refreshStatus');

}

function addSpecificCodeRow(artIdx, category) {
    const wrapper = document.getElementById(`codeWrapper_${artIdx}`);
    wrapper.style.display = "block"; // İlk eleman eklendiğinde kapsayıcıyı görünür yap
    
    const codeIdx = wrapper.children.length;
    const anlage = document.getElementById('anlage').value;
    
    let typeKey = "PUR";
    if(anlage.startsWith("IM") || anlage.startsWith("CIM")) typeKey = "Spritz";
    if(anlage === "COM") typeKey = "COM";
    
    const div = document.createElement('div');
    div.className = `code-row ${category === 'aus' ? 'aus-type' : 'stoer-type'}`;
    div.id = `codeRow_${artIdx}_${codeIdx}`;
    
    let optionsHtml = "";
    if(category === 'aus') {
        optionsHtml = codeData[typeKey].aus.map(x => `<option value="${x}">${x}</option>`).join('');
    } else {
        optionsHtml = codeData[typeKey].stoer.map(x => `<option value="${x}">${x}</option>`).join('');
    }
    
    div.innerHTML = `
        <select class="code-select" onchange="handleCodeSelectChange(${artIdx}, ${codeIdx}, this.value)">
            <option value="">-- Code wählen --</option>
            ${optionsHtml}
        </select>
        <input type="number" class="code-wert" placeholder="${category === 'aus' ? 'Menge' : 'Min'}" oninput="liveCheck();">
        <span class="remove-row-btn" onclick="removeCodeRow(${artIdx}, ${codeIdx})">❌</span>
    `;

    const sonstigeInp = document.createElement('input');
    sonstigeInp.type = "text";
    sonstigeInp.className = "sonstige-input";
    sonstigeInp.id = `sonstige_${artIdx}_${codeIdx}`;
    sonstigeInp.placeholder = "Grund manuell beschreiben...";

    wrapper.appendChild(div);
    wrapper.appendChild(sonstigeInp);
    liveCheck();
}

function trackComTime() {
    const anlage = document.getElementById('anlage').value;
    if(anlage !== "COM") return;
    
    let totalVerbrauch = 0;
    document.querySelectorAll('.art-verbrauch').forEach(inp => {
        totalVerbrauch += parseFloat(inp.value) || 0;
    });
    
    const calculatedMinutes = Math.round(totalVerbrauch * 1.5);
    const tracker = document.getElementById('comTracker');
    
    if(calculatedMinutes > 480) {
        tracker.style.background = "rgba(244, 63, 94, 0.15)";
        tracker.style.borderColor = "var(--danger)";
        tracker.innerHTML = `⚠️ COM Schichtzeit-Konto: ${calculatedMinutes} / 480 Min (Zeit überschritten!)`;
    } else {
        tracker.style.background = "rgba(16, 185, 129, 0.15)";
        tracker.style.borderColor = "var(--success)";
        tracker.innerHTML = `⏱️ COM Schichtzeit-Konto: ${calculatedMinutes} / 480 Min`;
    }
}

function liveCheck() {
    const anlage = document.getElementById('anlage').value;
    const datum = document.getElementById('datum').value;
    const mainSendBtn = document.getElementById('mainSendBtn');
    
    let formValid = true;
    if(!datum || !anlage || selectedStaff.length === 0) formValid = false;

    const artikelRows = document.querySelectorAll('.artikel-row');
    if(artikelRows.length === 0) formValid = false;

    artikelRows.forEach((row, rIdx) => {
        const name = row.querySelector('.art-name').value.trim();
        const gutteile = parseFloat(row.querySelector('.art-gutteile').value) || 0;
        const ausschuss = parseFloat(row.querySelector('.art-ausschuss').value) || 0;
        const verbrauch = parseFloat(row.querySelector('.art-verbrauch').value) || 0;
        const ausschussKg = parseFloat(row.querySelector('.art-ausschuss-kg').value) || 0;
        const badgeArea = document.getElementById(`badgeArea_${rIdx}`);

        if(!name) formValid = false;

        const targetAusschuss = (anlage === "COM") ? ausschussKg : ausschuss;

        // Kodları say ve topla
        const codeRows = row.querySelectorAll('.code-row.aus-type');
        let totalCodeMenge = 0;
        let hasEmptyCode = false;

        row.querySelectorAll('.code-row').forEach(cRow => {
            const select = cRow.querySelector('.code-select').value;
            const wert = parseFloat(cRow.querySelector('.code-wert').value) || 0;
            if(!select || wert <= 0) hasEmptyCode = true;
        });

        codeRows.forEach(cRow => {
            const wert = parseFloat(cRow.querySelector('.code-wert').value) || 0;
            totalCodeMenge += wert;
        });

        if(hasEmptyCode) formValid = false;

        // Görsel 2'deki o meşhur yeşil ve kırmızı durum rozet sistemi
        if(targetAusschuss > 0) {
            badgeArea.style.display = "block";
            if(totalCodeMenge === targetAusschuss) {
                badgeArea.innerHTML = `<div class="status-badge ok">✅ OK: ${totalCodeMenge}/${targetAusschuss}</div>`;
            } else {
                formValid = false;
                badgeArea.innerHTML = `<div class="status-badge">⚠️ Fehler: ${totalCodeMenge}/${targetAusschuss} (Codes abgleichen)</div>`;
            }
        } else {
            badgeArea.innerHTML = "";
            badgeArea.style.display = "none";
        }
    });

    if(formValid) {
        mainSendBtn.removeAttribute('disabled');
        mainSendBtn.style.background = "var(--success)";
        mainSendBtn.innerHTML = "✓ Daten absenden";
    } else {
        mainSendBtn.setAttribute('disabled', 'true');
        mainSendBtn.style.background = "#334155";
        mainSendBtn.innerHTML = "⚠️ Bitte Formular korrekt ausfüllen";
    }
}

async function checkOfflinePuffer() {
    if(!navigator.onLine) return;
    let puffer = [];
    try { puffer = JSON.parse(localStorage.getItem('apg_offline_puffer')) || []; }catch(e){}
    if(puffer.length === 0) return;

    for(let item of puffer) {
        try {
            await fetch(scriptURL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(item.content)
            });
            puffer = puffer.filter(x => x.id !== item.id);
        } catch(e) { break; }
    }
    localStorage.setItem('apg_offline_puffer', JSON.stringify(puffer));
}

function filterSchicht(schicht) {
    activeFilterSchicht = schicht;
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active-filter'));
    document.getElementById('flt' + schicht)?.classList.add('active-filter');
    loadAdminDashboard(false);
}

async function loadAdminDashboard(isSilent) {
    const container = document.getElementById('reportsContainer');
    if(!isSilent) container.innerHTML = "<div style='color:var(--text-muted); grid-column: 1/-1; text-align:center;'>Berichte werden geladen...</div>";
    
    if(!navigator.onLine) {
        container.innerHTML = "<div style='color:var(--danger); grid-column: 1/-1; text-align:center;'>Keine Internetverbindung!</div>";
        return;
    }

    try {
        const res = await fetch(`${scriptURL}?action=getDashboardData&schicht=${activeFilterSchicht}&_cb=${Date.now()}`);
        const list = await res.json();
        
        if(!list || list.length === 0) {
            container.innerHTML = `<div style='color:var(--text-muted); grid-column:1/-1; text-align:center;'>Keine Berichte für Schicht ${activeFilterSchicht} heute gefunden.</div>`;
            return;
        }
        
        container.innerHTML = list.map(item => {
            let errorStyleClass = item.hasError ? "report-danger" : "report-warning";
            let formattedFehlerText = item.fehlerDet ? item.fehlerDet.replace(/\n/g, '<br>') : 'Keine';
            
            return `
                <div class="report-box">
                    <span class="badge-origin">${item.anlage || 'N/A'}</span>
                    <div>
                        <div class="report-date">${item.zeit || ''} - ${item.schichtType || ''}</div>
                        <div class="report-title">${item.artikelInfo || 'Kein Artikel'}</div>
                        <div class="${errorStyleClass}">⚠️ Ausschuss/Fehler:<br>${formattedFehlerText}</div>
                    </div>
                    <div class="report-user">👤 Erstellt von: ${item.user || 'Unbekannt'}</div>
                </div>
            `;
        }).join('');
    } catch(e) {
        if(!isSilent) container.innerHTML = "<div style='color:var(--danger); grid-column:1/-1; text-align:center;'>Fehler beim Laden des Dashboards.</div>";
    }
}
</script>
</body>
</html>
