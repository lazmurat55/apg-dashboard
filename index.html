<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APG BOCHUM SECURE PRO</title>
    <style>
        :root { --bg-gradient: linear-gradient(135deg, #0f172a, #1e293b); --card: #1e293b; --card-inner: #334155; --primary: #38bdf8; --text: #f8fafc; --danger: #f43f5e; --border: #475569; }
        body { background: var(--bg-gradient); color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; min-height: 100vh; }
        #loginScreen, #setPassScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-gradient); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-card { background: var(--card); padding: 30px; border-radius: 20px; border: 2px solid var(--primary); width: 95%; max-width: 400px; text-align: center; }
        .card { display: none; width: 100%; max-width: 700px; background: var(--card); padding: 20px; border-radius: 20px; margin: auto; border: 1px solid var(--border); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--border); background: var(--card-inner); color: white; box-sizing: border-box; }
        .main-btn { width: 100%; padding: 16px; background: var(--primary); color: #0f172a; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <h2 style="color:var(--primary);">⚡ APG LOGIN</h2>
        <input type="number" id="userInp" placeholder="Personalnummer">
        <input type="password" id="passInp" placeholder="Passwort">
        <button class="main-btn" onclick="checkLogin()">ANMELDEN</button>
        <p id="loginError" style="color:var(--danger); display:none;"></p>
    </div>
</div>

<div id="setPassScreen" style="display:none;">
    <div class="login-card">
        <h3 style="color:var(--primary);">📌 ERSTES LOGIN</h3>
        <input type="password" id="newPass1" placeholder="Neues Passwort">
        <input type="password" id="newPass2" placeholder="Wiederholen">
        <button class="main-btn" onclick="saveNewPassword()">PASSWORT AKTIVIEREN</button>
    </div>
</div>

<div class="card" id="mainApp">
    <h1>Adler Pelzer Group</h1>
    <p id="currentUserDisplay"></p>
    <label>📌 Schicht</label>
    <div class="schicht-group" style="display:flex; gap:10px;">
        <button class="schicht-btn" onclick="setSchicht('A')">A</button>
        <button class="schicht-btn" onclick="setSchicht('B')">B</button>
        <button class="schicht-btn" onclick="setSchicht('C')">C</button>
    </div>
    <div id="contentArea"></div>
</div>

<script>
// KONFİGÜRASYON
const scriptURL = "https://script.google.com/macros/s/AKfycbxeoKPdn3gdbFDIpchQok02Qu_fLdTEw_W4eSHQuuhkQ34Zv8jxS4J-CJW4jD4qsXeqSA/exec";
let currentPNr = "";

// GİRİŞ KONTROLÜ
async function checkLogin() {
    const pNr = document.getElementById('userInp').value.trim();
    const pass = document.getElementById('passInp').value.trim();
    const res = await fetch(scriptURL + `?action=checkLogin&pNr=${pNr}&pass=${pass}`);
    const data = await res.json();
    
    if (data.status === "success") {
        currentPNr = pNr;
        if (data.firstLogin === "Evet") {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('setPassScreen').style.display = 'flex';
        } else {
            enterApp(data.name);
        }
    } else {
        document.getElementById('loginError').innerText = data.message;
        document.getElementById('loginError').style.display = 'block';
    }
}

// ŞİFRE DEĞİŞTİRME
async function saveNewPassword() {
    const p1 = document.getElementById('newPass1').value.trim();
    const p2 = document.getElementById('newPass2').value.trim();
    if (p1 !== p2) { alert("Şifreler eşleşmiyor!"); return; }
    await fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify({action: "updatePass", personalNr: currentPNr, newPass: p1})
    });
    alert("Şifre güncellendi!");
    location.reload();
}

function enterApp(u) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('setPassScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('currentUserDisplay').innerText = "Angemeldet: " + u;
}

const workerData = {

    "B": ["Keskin Mur.", "Aldirmaz P.", "Anderwald R.", "Bayrakli F.", "Kilic D.", "Maafi T.", "Besche T.", "Eickhoff P.", "Toth Renata", "Gibba n.", "Helf A.", "Isbir J.", "Jeyakumar S.", "Kalisch T.", "Kowarsch R.", "Nowak M.", "Pähler D.", "Patarcsity V.", "Pulendran K.", "Sahin E.", "Savas S.", "Schiavitelli", "Uluyüz B.", "Uzun S.", "Klomrit", "Garcia"],
    "C": ["Beher T.", "Keskin Mustafa", "Kantaroglu Ö.", "Savas R.", "Rafo S.", "Gertz Kevin", "Gertz S.", "Schönborn Ch.", "Fortes Ch.", "Sakaguchi M.", "Mercan M.", "Krämer Ch.", "Juretzka T.", "Kumbara E.", "Skupio D.", "Skrago T.", "Bah A.", "Kaya A.", "Jdea A.", "Toure A.", "Schneider D.", "Tchaleu Bertrand", "Keskinmus", "Klomrit", "Garcia"]
};
</script>
</body>
</html>
