<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APG BOCHUM SECURE PRO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f172a;
            color: #f1f5f9;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 16px;
            min-height: 100vh;
        }
        #loginScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f172a;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background: #1e293b;
            padding: 32px 24px;
            border-radius: 32px;
            border: 1px solid #38bdf8;
            width: 95%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.5);
        }
        input, button {
            width: 100%;
            padding: 14px;
            border-radius: 20px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 1rem;
            margin-top: 12px;
        }
        button {
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        .main-btn {
            background: #38bdf8;
            padding: 16px;
            font-size: 1.1rem;
        }
        .error {
            color: #ef4444;
            margin-top: 12px;
        }
        h2 {
            color: #38bdf8;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

<!-- LOGIN EKRANI (SADECE GİRİŞ, TEST YOK) -->
<div id="loginScreen">
    <div class="login-card">
        <h2>⚡ APG BOCHUM</h2>
        <p style="margin-bottom: 10px;">Nachname & Personalnummer</p>
        <input type="text" id="userInp" placeholder="Nachname">
        <input type="password" id="passInp" placeholder="Passwort">
        <button class="main-btn" onclick="checkLogin()">🔐 ANMELDEN</button>
        <p id="loginError" class="error" style="display: none;"></p>
    </div>
</div>

<script>
    // ============================================================
    // BASİT LOGIN – SADECE KONTROL İÇİN, TEST YAPMA
    // ============================================================
    
    // KULLANICILAR (sadece 3 test kullanıcısı)
    const USERS = {
        "Keskin": "517",
        "Uzun": "1433",
        "Kunert": "502"
    };
    
    window.checkLogin = function() {
        let username = document.getElementById('userInp').value.trim();
        let password = document.getElementById('passInp').value.trim();
        let errorDiv = document.getElementById('loginError');
        
        if (USERS[username] && USERS[username] === password) {
            // BAŞARILI GİRİŞ – SADECE UYARI, BAŞKA HİÇBİR ŞEY YAPMA
            alert("✅ Login erfolgreich! (Demo)\n\nBenutzer: " + username);
            errorDiv.style.display = 'none';
            // Burada ana uygulama açılmayacak – SADECE HATA KONTROLÜ İÇİN
        } else {
            errorDiv.style.display = 'block';
            errorDiv.innerText = "❌ Falscher Benutzername oder Passwort!";
        }
    };
</script>

</body>
</html>
