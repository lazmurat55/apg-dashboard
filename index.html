<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APG BOCHUM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f172a;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background: #1e293b;
            padding: 40px 30px;
            border-radius: 32px;
            border: 2px solid #38bdf8;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #38bdf8; margin-bottom: 20px; font-size: 28px; }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 24px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            border-radius: 24px;
            border: none;
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }
        .error { color: #ef4444; margin-top: 15px; }
        .success { color: #22c55e; margin-top: 15px; }
        .card {
            background: #1e293b;
            border-radius: 32px;
            padding: 24px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            border: 1px solid #38bdf8;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

<!-- LOGIN EKRANI -->
<div id="loginScreen" class="login-card">
    <h2>⚡ APG LOGIN</h2>
    <input type="text" id="username" placeholder="Nachname">
    <input type="password" id="password" placeholder="Passwort">
    <button onclick="login()">ANMELDEN</button>
    <div id="loginMessage"></div>
</div>

<!-- ANA EKRAN -->
<div id="mainScreen" class="card hidden">
    <h2 style="color:#38bdf8;">APG Bochum</h2>
    <p id="welcomeText" style="margin: 20px 0; color: #22c55e;"></p>
    <p style="margin: 20px 0;">✅ Sie sind erfolgreich eingeloggt!</p>
    <button onclick="logout()">ABMELDEN</button>
</div>

<script>
    // KULLANICILAR (Nachname : Passwort)
    const USERS = {
        "Keskin": "517",
        "Uzun": "1433",
        "Kunert": "502",
        "Aldirmaz": "577",
        "Beher": "510",
        "Brand": "1722",
        "Keskin Mur.": "518",
        "Naumann": "999",
        "Schönborn": "1361"
    };

    function login() {
        let username = document.getElementById('username').value.trim();
        let password = document.getElementById('password').value.trim();
        let msgDiv = document.getElementById('loginMessage');
        
        if (USERS[username] && USERS[username] === password) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainScreen').classList.remove('hidden');
            document.getElementById('welcomeText').innerHTML = "👤 Willkommen, " + username;
            msgDiv.innerHTML = '';
        } else {
            msgDiv.innerHTML = '<span class="error">❌ Falscher Benutzername oder Passwort!</span>';
        }
    }

    function logout() {
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('mainScreen').classList.add('hidden');
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        document.getElementById('loginMessage').innerHTML = '';
    }
</script>

</body>
</html>
