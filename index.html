<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APG Bochum - Betriebsdatenerfassung</title>
    <style>
        :root {
            --bg-main: #0f172a;        
            --bg-card: #1e293b;        
            --bg-input: #0f172a;       
            --border-color: #334155;   
            --primary: #3b82f6;        
            --primary-hover: #1d4ed8;  
            --success: #10b981;        
            --danger: #f43f5e;         
            --orange-bright: #f59e0b;  
            --text-main: #f8fafc;      
            --text-muted: #94a3b8;     
            --dash-danger: #ff4d6d;    
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; flex-direction: column; }
        
        .container { width: 100%; max-width: 1100px; margin: 0 auto; background: transparent; transition: max-width 0.3s ease; }
        .container.wide { max-width: 1200px; }
        .app-wrapper { max-width: 620px; margin: 0 auto; width: 100%; }
        
        .form-card { background: var(--bg-card); border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2), 0 2px 4px -2px rgba(0,0,0,0.2); border: 1px solid var(--border-color); }
        
        h2 { text-align: center; margin-bottom: 24px; color: #fff; font-weight: 700; letter-spacing: 0.5px; }
        h3 { margin-bottom: 16px; color: #fff; font-weight: 600; font-size: 18px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        h4 { color: #fff; font-weight: 600; margin-bottom: 15px; }
        
        label { display: block; margin: 12px 0 6px; font-size: 13px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, select, button { width: 100%; padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-input); color: #fff; font-size: 15px; outline: none; transition: all 0.2s ease; }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,130,246,0.25); }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 10px; }
        .grid-3 { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 14px; margin-bottom: 10px; }
        
        button { font-weight: 600; cursor: pointer; border: none; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 2px 4px rgba(59,130,246,0.2); }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-primary:disabled { background: #334155; color: var(--text-muted); cursor: not-allowed; box-shadow: none; }
        
        .schicht-group, .type-group { display: flex; gap: 8px; margin-bottom: 12px; }
        .schicht-btn, .type-btn { flex: 1; background: var(--bg-input); border: 1px solid var(--border-color); padding: 12px; border-radius: 8px; color: var(--text-muted); font-size: 14px; }
        .schicht-btn.active, .type-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .active-filter { background: var(--orange-bright) !important; color: white !important; border-color: var(--orange-bright) !important; }
        
        .worker-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; min-height: 44px; border: 1px dashed var(--border-color); padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.1); }
        .selected-worker { background: rgba(59,130,246,0.15); border: 1px solid var(--primary); color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 13px; display: flex; align-items: center; gap: 8px; font-weight: 500; }
        .remove-worker { cursor: pointer; color: var(--danger); font-weight: bold; }
        
        .ft-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .ft-btn { background: var(--bg-input); border: 1px solid var(--border-color); padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-muted); }
        .ft-btn.active { background: var(--success); color: white; border-color: var(--success); }
        
        .com-tracker-box { display: none; background: rgba(59, 130, 246, 0.1); border: 1px dashed var(--primary); border-radius: 8px; padding: 14px; margin: 15px 0; font-size: 14px; font-weight: 600; text-align: center; color: #fff; }
        
        .artikel-row { background: rgba(15, 23, 42, 0.4); border: 1px solid var(--border-color); padding: 20px; border-radius: 12px; margin-bottom: 20px; position: relative; }
        .remove-artikel-btn { position: absolute; right: 12px; top: 12px; background: none; color: var(--text-muted); border: none; width: auto; padding: 0; cursor: pointer; font-size: 14px; }
        .remove-artikel-btn:hover { color: var(--danger); }
        
        .code-row-container { background: rgba(15, 23, 42, 0.6); padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid var(--border-color); }
        .code-row-container h4 { font-size: 14px; color: var(--text-main); margin-bottom: 10px; border-left: 3px solid var(--primary); padding-left: 6px; }
        .code-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; width: 100%; }
        .code-row:last-child { margin-bottom: 0; }
        .code-row select { flex: 7; min-width: 0; padding: 10px; font-size: 14px; background: var(--bg-input); color: #fff; border: 1px solid var(--border-color); border-radius: 6px; }
        .code-row input { flex: 2.5; min-width: 0; padding: 10px; font-size: 14px; text-align: center; font-weight: 600; background: var(--bg-input); color: #fff; border: 1px solid var(--border-color); border-radius: 6px; }
        .code-row .remove-row-btn { flex: 0.5; background: none; color: var(--text-muted); border: none; font-size: 18px; padding: 0; width: auto; cursor: pointer; display: flex; justify-content: center; }
        .code-row .remove-row-btn:hover { color: var(--danger); }
        
        .code-action-group { display: flex; gap: 10px; margin-top: 12px; }
        .code-action-group button { flex: 1; padding: 10px; font-size: 13px; font-weight: 600; border-radius: 8px; cursor: pointer; }
        .btn-add-aus { background: #2563eb; color: white; }
        .btn-add-aus:hover { background: #1d4ed8; }
        .btn-add-stoer { background: #1e3a8a; color: white; border: 1px solid #3b82f6; }
        .btn-add-stoer:hover { background: #172554; }

        .add-artikel-dash-btn { background: transparent; border: 2px dashed #334155; color: #38bdf8; padding: 14px; border-radius: 10px; font-weight: 600; width: 100%; margin-top: 10px; cursor: pointer; }
        .add-artikel-dash-btn:hover { border-color: #38bdf8; background: rgba(56, 189, 248, 0.02); }

        .sub-btn { background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); color: var(--text-main); padding: 10px 16px; font-size: 13px; border-radius: 8px; width: auto; margin-top: 10px; font-weight: 500; cursor: pointer; }
        .sub-btn:hover { background: rgba(255,255,255,0.08); border-color: var(--text-muted); }
        
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.8); display:none; justify-content:center; align-items:center; z-index:100; padding:15px; backdrop-filter: blur(4px); }
        .overlay-content { background:var(--bg-card); width:100%; max-width:420px; padding:24px; border-radius:12px; border:1px solid var(--border-color); max-height:85vh; display:flex; flex-direction:column; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
        .worker-list { overflow-y:auto; flex:1; margin:15px 0; display:flex; flex-direction:column; gap:6px; padding-right:4px; }
        .worker-opt { padding:12px; background:var(--bg-input); border:1px solid var(--border-color); border-radius:8px; cursor:pointer; font-weight: 500; transition: all 0.2s; }
        .worker-opt:hover { border-color: var(--primary); background: rgba(59,130,246,0.05); }
        
        .refresh-btn { background: #334155; color: #fff; border: 1px solid var(--border-color); border-radius: 8px; padding: 10px 18px; font-size: 13px; width: auto; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 16px; cursor: pointer; }
        .refresh-btn:hover { background: var(--success); border-color: var(--success); }
        
        #reportsDashboardContainer { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; max-height: 650px; overflow-y: auto; padding-right: 4px; margin-top: 15px; }
        @media (max-width: 900px) { #reportsDashboardContainer { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 650px) { #reportsDashboardContainer { grid-template-columns: 1fr; } }

        .report-box { background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 12px; padding: 18px; position: relative; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); min-height: 190px; }
        .badge-origin { position: absolute; right: 12px; top: 12px; background: var(--primary); padding: 4px 12px; border-radius: 6px; font-size: 14px; font-weight: 700; color: #fff; }
        .report-box .report-date { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
        .report-box .report-title { font-size: 17px; font-weight: 700; color: #fff; margin: 6px 0; line-height: 1.4; }
        .report-box .report-details-list { list-style: none; padding: 0; margin: 8px 0; border-top: 1px dashed var(--border-color); padding-top: 8px; }
        .report-box .report-danger { font-size: 14px; color: var(--dash-danger) !important; font-weight: 600; margin: 4px 0; }
        .report-box .report-warning { font-size: 14px; color: var(--orange-bright); font-weight: 600; margin: 4px 0; }
        .report-box .report-user { font-size: 13px; color: var(--success); margin-top: 8px; font-weight: 600; border-top: 1px solid var(--border-color); padding-top: 8px; }

        #loginScreen { display: block; max-width: 400px; margin: 60px auto 0; }
        #mainApp, #adminPanel { display: none; }
        .thank-you-footer { width: 100%; max-width: 1100px; margin: 20px auto 0; text-align: center; font-size: 14px; color: var(--text-muted); padding: 15px; border-top: 1px solid var(--border-color); }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div id="loginScreen" class="form-card">
        <h2>APG BOCHUM LOGIN</h2>
        <label>Benutzername</label>
        <input type="text" id="userInp" placeholder="Name eingeben...">
        <label>Passwort</label>
        <input type="password" id="passInp" placeholder="******">
        <button id="loginBtn" class="btn-primary" style="margin-top:24px; padding: 14px;" onclick="checkLogin()">ANMELDEN</button>
        <div id="loginError" style="color:var(--danger); text-align:center; margin-top:14px; display:none; font-size:14px; font-weight: 600;"></div>
    </div>

    <div id="mainApp" class="app-wrapper">
        <div class="form-card" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; padding: 14px 20px;">
            <span id="currentUserDisplay" style="font-weight:700; color:var(--success);"></span>
            <button onclick="location.reload()" style="width:auto; padding:6px 14px; font-size:13px; background:var(--border-color); border-radius: 6px;">Abmelden</button>

        <div class="form-card">

            <div class="type-group">

            <label>Datum</label>

                <option value="PUR4">PUR 4</option>
                <option value="PUR5">PUR 5</option>

                <option value="PUR7">PUR 7</option>
                <option value="PUR8">PUR 8</option>
                <option value="PUR9">PUR 9</option>
                <option value="CIM1">CIM 1</option>

                <option value="IM4">IM 4</option>

            </select>

            <div id="comTracker" class="com-tracker-box">⏱️ COM Schichtzeit-Konto: 0 / 480 Min</div>

            <div id="ftBox" style="display:none; margin-top: 15px;">
                <label>Formträger (Mehrfachauswahl möglich)</label>
                <div class="ft-grid">
                    <div class="ft-btn" onclick="this.classList.toggle('active'); liveCheck();">FT1</div>
                    <div class="ft-btn" onclick="this.classList.toggle('active'); liveCheck();">FT2</div>
                    <div class="ft-btn" onclick="this.classList.toggle('active'); liveCheck();">FT3</div>
                    <div class="ft-btn" onclick="this.classList.toggle('active'); liveCheck();">FT4</div>
                    <div class="ft-btn" onclick="this.classList.toggle('active'); liveCheck();">FT5</div>
                    <div class="ft-btn" onclick="this.classList.toggle('active'); liveCheck();">FT6</div>
                </div>
            </div>
        </div>

        <div class="form-card">
            <h3>Produktion & Fehlererfassung</h3>
            <div id="artikelContainer"></div>
            
            <button id="addArtikelBtn" class="add-artikel-dash-btn" onclick="addArtikel()" disabled>+ Artikel hinzufügen</button>
        </div>
        
        <button id="mainSendBtn" class="btn-primary" style="padding:16px; font-size:16px; border-radius: 10px;" onclick="processReport()" disabled>⚠️ Bitte Formular ausfüllen</button>
    </div>

    <div id="adminPanel" class="form-card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px;">
        <span id="adminUserDisplay" style="font-weight:700; color:var(--orange-bright); font-size: 16px;"></span>
        <button onclick="location.reload()" style="width:auto; padding:6px 14px; font-size:13px; background:var(--danger); border-radius:6px;">Abmelden</button>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
        <h3 style="font-size: 20px; margin-bottom: 0; border-bottom: none; padding-bottom: 0;">Schichtleiter Dashboard</h3>
        
        <div style="display: inline-flex; align-items: center; gap: 8px;">
            <label style="margin: 0; font-size: 12px; white-space: nowrap;">Vardiya Seçin:</label>
            <select id="schichtleiterSelect" onchange="filterSchicht(this.value)" style="width: auto; padding: 6px 30px 6px 12px; font-size: 14px; font-weight: 600; background: var(--bg-input); border: 1px solid var(--orange-bright); border-radius: 6px; cursor: pointer; color: var(--orange-bright);">
                <option value="A">Schicht A</option>
                <option value="B" selected>Schicht B</option>
                <option value="C">Schicht C</option>

        </div>
    </div>
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <button id="manualRefreshBtn" class="refresh-btn" onclick="manualRefreshDashboard()">🔄 Aktualisieren</button>
        <span id="refreshStatus" style="font-size: 13px; color: var(--text-muted);"></span>
    </div>

    <div id="reportsDashboardContainer"></div>
</div>
</div>

<div class="overlay" id="workerOverlay">
    <div class="overlay-content">
        <h4>Personal auswählen</h4>
        <div class="worker-list" id="workerList"></div>
        <input type="text" id="manualWorker" placeholder="Name manuell schreiben..." style="margin-bottom:12px;">

</div>

<div class="thank-you-footer">
    Vielen Dank, dass Sie dieses System nutzen!
</div>

<script>

let currentSchichtType = "Spätschicht";
let selectedStaff = [];
let loggedInUser = "";
let superAdmin = "Keskin"; 
let activeFilterSchicht = "B";
let autoRefreshInterval = null;
let cachedDashboardData = [];
let artikelCounter = 0;

const workerData = {

    "C": ["Beher T.", "Keskin Mustafa", "Kantaroglu Ö.", "Savas R.", "Rafo S.", "Gertz Kevin", "Gertz S.", "Schönborn Ch.", "Fortes Ch.", "Sakaguchi M.", "Mercan M.", "Krämer Ch.", "Juretzka T.", "Kumbara E.", "Skupio D.", "Skrago T.", "Bah A.", "Kaya A.", "Jdea A.", "Toure A.", "Schneider D.", "Tchaleu Bertrand", "Keskinmus", "Klomrit", "Garcia"]

const codeData = {

    }

async function checkLogin() {
    const userInp = document.getElementById('userInp').value.trim();
    const passInp = document.getElementById('passInp').value;
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');

    if (!userInp || !passInp) {
        loginError.style.display = "block";
        loginError.innerText = "Bitte Name und Passwort eingeben!";
        return;
    }

    loginBtn.disabled = true;
    loginBtn.innerHTML = "⏳ DB-Check...";
    loginError.style.display = "none";

    try {
        const response = await fetch(`${scriptURL}?action=verifyLogin&user=${encodeURIComponent(userInp)}&pass=${encodeURIComponent(passInp)}`);
        const result = await response.json();
        
        if (result.success) {
            enterApp(userInp);
        } else {
            loginBtn.disabled = false;
            loginBtn.innerHTML = "ANMELDEN";
            loginError.style.display = "block";
            loginError.innerText = "Falscher Benutzername oder Passwort (laut Sifreler Tablosu)!";
        }
    } catch(err) {
        loginBtn.disabled = false;
        loginBtn.innerHTML = "ANMELDEN";
        loginError.style.display = "block";
        loginError.innerText = "Verbindungsfehler zur Google Sheets DB!";
    }
}

function setInitialTodayDate() {
    const today = new Date();
    document.getElementById('datum').value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
}

function addArtikel() {
    artikelCounter++;
    const container = document.getElementById('artikelContainer');
    
    const div = document.createElement('div');
    div.className = 'artikel-row';
    div.id = `artikelRow_${artikelCounter}`;
    
    div.innerHTML = `
        <button class="remove-artikel-btn" onclick="removeArtikel(${artikelCounter})">✕ Entfernen</button>
        
        <div style="margin-bottom: 12px;">
            <label>Artikelnummer</label>
            <input type="text" class="art-num-inp" placeholder="z.B. BMW G60 Lippe" oninput="liveCheck()">
        </div>
        
        <div class="grid-3">
            <div>
                <label>Gutteile (Stk)</label>
                <input type="number" class="art-gut-inp" placeholder="0" oninput="liveCheck()">
            </div>
            <div>
                <label>Ausschuss Ges.</label>
                <input type="number" class="art-aus-gesamt-inp" placeholder="0" oninput="liveCheck()">
            </div>
            <div>
                <label style="color:var(--orange-bright);">Arbeitszeit (Min)</label>
                <input type="number" class="art-zeit-inp" placeholder="Minuten" style="border-color:var(--orange-bright);" oninput="liveCheck()">
            </div>
        </div>
        
        <div class="code-row-container">
            <h4>Ausschuss-Details</h4>
            <div id="ausCodesContainer_${artikelCounter}"></div>
            <div class="code-action-group">
                <button class="btn-add-aus" onclick="addCodeRow(${artikelCounter}, 'aus')">+ Ausschuss-Code</button>
            </div>
        </div>
        
        <div class="code-row-container">
            <h4>Störungen</h4>
            <div id="stoerCodesContainer_${artikelCounter}"></div>
            <div class="code-action-group">
                <button class="btn-add-stoer" onclick="addCodeRow(${artikelCounter}, 'stoer')">+ Störung (Min)</button>
            </div>
        </div>
    `;
    
    container.appendChild(div);
    liveCheck();
}

function addCodeRow(artId, type) {
    const container = document.getElementById(`${type}CodesContainer_${artId}`);
    const anlageVal = document.getElementById('anlage').value;
    const cat = getAnlageType(anlageVal);
    const options = codeData[cat] ? codeData[cat][type] : [];
    
    const row = document.createElement('div');
    row.className = 'code-row';
    
    let selectOpts = `<option value="">-- ${type === 'aus' ? 'Fehlercode' : 'Störungscode'} --</option>`;
    options.forEach(o => { selectOpts += `<option value="${o}">${o}</option>`; });
    
    row.innerHTML = `
        <select class="code-select" onchange="liveCheck()">
            ${selectOpts}
        </select>
        <input type="number" class="code-val-inp" placeholder="${type === 'aus' ? 'Stk' : 'Min'}" oninput="liveCheck()">
        <button class="remove-row-btn" onclick="this.parentElement.remove(); liveCheck();">✕</button>
    `;
    
    container.appendChild(row);
    liveCheck();
}

function removeArtikel(id) {
    document.getElementById(`artikelRow_${id}`)?.remove();
    liveCheck();
}

function getAnlageType(val) {
    if(!val) return "";
    if(val === "COM") return "COM";
    if(val.startsWith("PUR") || val === "CIM1") return "PUR";
    if(val.startsWith("IM")) return "Spritz";
    return "";
}

function onAnlageChange(val) {
    const ftBox = document.getElementById('ftBox');
    const comTracker = document.getElementById('comTracker');
    const addBtn = document.getElementById('addArtikelBtn');
    
    document.getElementById('artikelContainer').innerHTML = "";
    
    if(val.startsWith("PUR")) {
        ftBox.style.display = "block";
    } else {
        ftBox.style.display = "none";
        document.querySelectorAll('.ft-btn').forEach(b => b.classList.remove('active'));
    }
    
    if(val === "COM") {
        comTracker.style.display = "block";
    } else {
        comTracker.style.display = "none";
    }
    
    if(val) { addBtn.disabled = false; } else { addBtn.disabled = true; }
    liveCheck();
}

function liveCheck() {
    const anlage = document.getElementById('anlage').value;
    const datum = document.getElementById('datum').value;
    const sendBtn = document.getElementById('mainSendBtn');
    const comTracker = document.getElementById('comTracker');
    
    let isValid = true;
    let statusText = "⚠️ Bitte Formular ausfüllen";
    
    if(!anlage || !datum || selectedStaff.length === 0) isValid = false;
    
    if(anlage.startsWith("PUR")) {
        const activeFTs = document.querySelectorAll('.ft-btn.active').length;
        if(activeFTs === 0) isValid = false;
    }
    
    const artikelRows = document.querySelectorAll('.artikel-row');
    if(artikelRows.length === 0) isValid = false;
    
    let totalArbeitszeit = 0;
    
    artikelRows.forEach(row => {
        const artNum = row.querySelector('.art-num-inp').value.trim();
        const gutteile = row.querySelector('.art-gut-inp').value.trim();
        const ausGesamtInp = row.querySelector('.art-aus-gesamt-inp').value.trim();
        const artZeitInp = row.querySelector('.art-zeit-inp').value.trim();
        
        if(!artNum || !gutteile || !ausGesamtInp || !artZeitInp) isValid = false;
        
        const ausGesamt = parseInt(ausGesamtInp) || 0;
        const artZeit = parseInt(artZeitInp) || 0;
        totalArbeitszeit += artZeit;
        
        let subAusTotal = 0;
        const subAusRows = row.querySelectorAll('[id^="ausCodesContainer_"] .code-row');
        subAusRows.forEach(subRow => {
            const sel = subRow.querySelector('.code-select').value;
            const val = parseInt(subRow.querySelector('.code-val-inp').value) || 0;
            if(!sel || val <= 0) isValid = false;
            subAusTotal += val;
        });
        
        if(subAusRows.length > 0 && subAusTotal !== ausGesamt) {
            isValid = false;
            statusText = `❌ Fehler: Ausschuss-Details Summe (${subAusTotal}) ≠ Gesamt (${ausGesamt})!`;
        }
    });
    
    if(anlage === "COM") {
        comTracker.innerText = `⏱️ COM Schichtzeit-Konto: ${totalArbeitszeit} / 480 Min`;
        if(totalArbeitszeit > 480) {
            isValid = false;
            statusText = `❌ Azami süre aşıldı! Toplam İşçi Zamanı (${totalArbeitszeit} Min) > 480 Min!`;
        }
    } else {
        if(totalArbeitszeit > 480) {
            isValid = false;
            statusText = `❌ Fehler: Gesamte Arbeitszeit (${totalArbeitszeit} Min) > 480 Min!`;
        }
    }
    
    if(isValid) {
        sendBtn.disabled = false;
        sendBtn.innerHTML = "🚀 Daten an Google Sheets senden";
        sendBtn.style.background = "var(--success)";
    } else {
        sendBtn.disabled = true;
        sendBtn.innerHTML = statusText;
        sendBtn.style.background = "var(--primary)";
    }
}

function setSchicht(s) {
    currentSchicht = s;
    document.querySelectorAll('.schicht-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('mSchicht' + s)?.classList.add('active');
    liveCheck();
}

function setSchichtType(t) {
    currentSchichtType = t;
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    if(t === 'Frühschicht') document.getElementById('tFrueh').classList.add('active');
    if(t === 'Spätschicht') document.getElementById('tSpaet').classList.add('active');
    if(t === 'Nachtschicht') document.getElementById('tNacht').classList.add('active');
    liveCheck();
}

function openWorkerOverlay() {
    const container = document.getElementById('workerList');
    container.innerHTML = "";
    const staff = workerData[currentSchicht] || [];
    
    staff.forEach(w => {
        const d = document.createElement('div');
        d.className = 'worker-opt';
        d.innerText = w;
        d.onclick = () => selectWorker(w);
        container.appendChild(d);
    });
    
    document.getElementById('workerOverlay').style.display = 'flex';
}

function closeOverlay() { document.getElementById('workerOverlay').style.display = 'none'; }

function selectWorker(name) {
    if(!selectedStaff.includes(name)) {
        selectedStaff.push(name);
        updateWorkerDisplay();
    }
    closeOverlay();
}

function addManualWorker() {
    const inp = document.getElementById('manualWorker');
    const name = inp.value.trim();
    if(name && !selectedStaff.includes(name)) {
        selectedStaff.push(name);
        updateWorkerDisplay();
        inp.value = "";
    }
    closeOverlay();
}

function removeWorker(name) {
    selectedStaff = selectedStaff.filter(w => w !== name);
    updateWorkerDisplay();
}

function updateWorkerDisplay() {
    const container = document.getElementById('workerDisplayContainer');
    container.innerHTML = selectedStaff.map(w => `
        <div class="selected-worker">
            ${w} <span class="remove-worker" onclick="removeWorker('${w}')">✕</span>
        </div>
    `).join('');
    liveCheck();
}

function enterApp(u) {
    loggedInUser = u;
    document.getElementById('loginScreen').style.display = 'none';
    setInitialTodayDate();
    
    if (u.toLowerCase() === superAdmin.toLowerCase()) {
        document.getElementById('mainContainer').classList.add('wide');
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminUserDisplay').innerHTML = "👑 Admin-Dashboard: " + u;
        filterSchicht('B');
        startAutoRefresh();
    } else {
        document.getElementById('mainContainer').classList.remove('wide');
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('currentUserDisplay').innerHTML = "👤 Angemeldet: " + u;
        setSchicht('B');
    }
}

function startAutoRefresh() {
    loadAdminDashboard(true);
    if(autoRefreshInterval) clearInterval(autoRefreshInterval);
    autoRefreshInterval = setInterval(() => { loadAdminDashboard(true); }, 120000); // 2 Dakikada bir oto yenileme
}

async function manualRefreshDashboard() {
    const btn = document.getElementById('manualRefreshBtn');
    btn.disabled = true;
    btn.innerHTML = "⏳ Lädt...";
    await loadAdminDashboard(false);
    btn.disabled = false;
    btn.innerHTML = "🔄 Aktualisieren";
}

async function loadAdminDashboard(isBackground) {
    try {
        const response = await fetch(`${scriptURL}?action=getDashboardData&_cb=${Date.now()}`);
        const data = await response.json();
        cachedDashboardData = data.reports || [];
        renderDashboard();
    } catch(e) {
        console.error("Dashboard-Fehler", e);
    }
}

function renderDashboard() {
    const container = document.getElementById('reportsDashboardContainer');
    if(!container) return;
    
    const filtered = cachedDashboardData.filter(r => r.schicht === activeFilterSchicht);
    if(filtered.length === 0) {
        container.innerHTML = `<div style='text-align:center; color:var(--text-muted); padding:20px;'>Keine Berichte für Schicht ${activeFilterSchicht} vorhanden.</div>`;
        return;
    }

    container.innerHTML = filtered.map(r => `
        <div class="report-box">
            <span class="badge-origin">${r.anlage || 'Anlage'}</span>
            <div class="report-date">${r.datum || ''} - ${r.schichtType || ''}</div>
            <div class="report-title">Mitarbeiteranzahl: ${r.personalCount || 0}</div>
            <ul class="report-details-list">
                <li>Gutteile: <b>${r.totalGut || 0} Stk</b></li>
                <li class="report-danger">Ausschuss: <b>${r.totalAus || 0} Stk</b></li>
                <li class="report-warning">Störungen: <b>${r.totalStoer || 0} Min</b></li>
            </ul>
            <div class="report-user">Sender: ${r.user}</div>
        </div>
    `).join('');
}

function filterSchicht(s) {
    activeFilterSchicht = s;
    // Dropdown değerini güncelle (Eğer dışarıdan tetiklenirse)
    const selectMenu = document.getElementById('schichtleiterSelect');
    if(selectMenu) {
        selectMenu.value = s;
    }
    renderDashboard();
}

async function processReport() {
    const sendBtn = document.getElementById('mainSendBtn');
    sendBtn.disabled = true;
    sendBtn.innerHTML = "⏳ Senden...";

    let selectedFTs = [];
    document.querySelectorAll('.ft-btn.active').forEach(btn => { selectedFTs.push(btn.innerText); });

    let artikelData = [];
    document.querySelectorAll('.artikel-row').forEach(row => {
        const artNum = row.querySelector('.art-num-inp').value.trim();
        const gutteile = parseInt(row.querySelector('.art-gut-inp').value) || 0;
        const ausGesamt = parseInt(row.querySelector('.art-aus-gesamt-inp').value) || 0;
        const arbeitszeit = parseInt(row.querySelector('.art-zeit-inp').value) || 0;
        
        let ausDetails = [];
        row.querySelectorAll('[id^="ausCodesContainer_"] .code-row').forEach(subRow => {
            const code = subRow.querySelector('.code-select').value;
            const val = parseInt(subRow.querySelector('.code-val-inp').value) || 0;
            if (code && val > 0) ausDetails.push({ code: code, pieces: val });
        });

        let stoerDetails = [];
        row.querySelectorAll('[id^="stoerCodesContainer_"] .code-row').forEach(subRow => {
            const code = subRow.querySelector('.code-select').value;
            const val = parseInt(subRow.querySelector('.code-val-inp').value) || 0;
            if (code && val > 0) stoerDetails.push({ code: code, minutes: val });
        });

        artikelData.push({
            artikelnummer: artNum,
            gutteile: gutteile,
            ausschussGesamt: ausGesamt,
            arbeitszeitMinuten: arbeitszeit,
            ausschussDetails: ausDetails,
            stoerungen: stoerDetails
        });
    });

    const payload = {
        schicht: currentSchicht,
        schichtType: currentSchichtType,
        datum: document.getElementById('datum').value,
        anlage: document.getElementById('anlage').value,
        formtraeger: selectedFTs,
        personal: selectedStaff,
        user: loggedInUser,
        artikel: artikelData
    };

    try {
        const response = await fetch(scriptURL, {
            method: "POST",
            headers: { "Content-Type": "text/plain" }, // CORS hatalarını önlemek için text/plain en güvenlisidir
            body: JSON.stringify(payload)
        });

        alert("✅ Daten erfolgreich an Google Sheets übertragen!");
        
        document.getElementById('artikelContainer').innerHTML = "";
        selectedStaff = [];
        updateWorkerDisplay();
        document.getElementById('anlage').value = "";
        onAnlageChange("");
        
    } catch (error) {
        console.error(error);
        alert("❌ Fehler beim Senden!");
    } finally {
        liveCheck();
    }
}
</script>
