<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APG BOCHUM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a4a6e, #0d2a3a);
            font-family: 'Segoe UI', sans-serif;
            padding: 16px;
            min-height: 100vh;
        }
        .login-card, .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 32px;
            border: 2px solid #38bdf8;
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }
        .dashboard-card {
            background: #1a2a3a;
            border: 1px solid #38bdf8;
            border-radius: 32px;
            padding: 25px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            display: none;
        }
        h2, h3 { color: #38bdf8; margin-bottom: 20px; }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 24px;
            border: 1px solid #38bdf8;
            background: #0f172a;
            color: white;
            font-size: 14px;
        }
        button {
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        button:disabled { background: #475569; cursor: not-allowed; }
        .hidden { display: none; }
        .error { color: #ef4444; margin-top: 10px; }
        .success { color: #22c55e; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .schicht-group, .ft-grid { display: flex; gap: 10px; margin: 10px 0; flex-wrap: wrap; }
        .schicht-btn, .type-btn, .ft-btn, .filter-btn {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 10px 16px;
            border-radius: 30px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
        }
        .schicht-btn.active, .type-btn.active, .ft-btn.active, .filter-btn.active-filter {
            background: #7dd3fc;
            color: #0f172a;
        }
        .selected-worker {
            background: rgba(56, 189, 248, 0.25);
            padding: 12px;
            border-radius: 20px;
            margin-top: 8px;
            border: 1px solid #38bdf8;
            display: flex;
            justify-content: space-between;
            color: white;
        }
        .selected-worker span:last-child { color: #ff8888; cursor: pointer; font-size: 18px; }
        .add-btn { background: transparent; border: 2px dashed #38bdf8; color: #38bdf8; }
        .sub-btn { background: #1e40af; padding: 8px 16px; width: auto; display: inline-block; margin: 5px; color: white; border-radius: 30px; cursor: pointer; }
        .section-card { background: rgba(15, 23, 42, 0.7); padding: 15px; border-radius: 24px; margin-top: 15px; position: relative; }
        .code-row { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 20px; margin-top: 10px; }
        .code-row-inputs { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .code-row-inputs select { flex: 2; background: #0f172a; border: 1px solid #38bdf8; border-radius: 20px; padding: 8px; }
        .code-row-inputs input { flex: 1; }
        .sonstige-input { margin-top: 8px; display: none; width: 100%; padding: 8px; border-radius: 20px; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; margin-top: 8px; }
        .status-ok { background: #22c55e; color: black; }
        .status-error { background: #ef4444; color: white; }
        .reports-grid { display: grid; gap: 20px; margin-top: 20px; }
        @media (min-width: 800px) { .reports-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1200px) { .reports-grid { grid-template-columns: repeat(3, 1fr); } }
        .report-box { background: #1e3a4a; padding: 18px; border-radius: 24px; border-left: 5px solid #38bdf8; color: #f1f5f9; }
        .filter-group { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
        #workerOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        .overlay-content {
            background: #1e293b;
            width: 90%;
            max-width: 400px;
            max-height: 70vh;
            overflow-y: auto;
            border-radius: 28px;
            padding: 20px;
            border: 1px solid #38bdf8;
        }
        .worker-opt { padding: 12px; border-bottom: 1px solid #334155; cursor: pointer; color: white; }
        .worker-opt:hover { background: #38bdf8; color: #0f172a; border-radius: 20px; }
        label { display: block; margin: 10px 0 5px; color: #7dd3fc; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-card">
    <h2>⚡ APG LOGIN</h2>
    <input type="text" id="username" placeholder="Nachname">
    <input type="password" id="password" placeholder="Passwort">
    <button onclick="login()">ANMELDEN</button>
    <div id="loginError" class="error"></div>
</div>

<!-- ANA UYGULAMA -->
<div id="mainApp" class="card hidden">
    <h2>📋 APG Produktion</h2>
    <p id="userDisplay" class="success"></p>
    <button onclick="logout()" style="margin-top:5px; background:#475569; padding:8px; font-size:12px;">ABMELDEN</button>
    <p style="margin-top:20px;">✅ Sie sind erfolgreich eingeloggt!</p>
</div>

<script>
// KULLANICILAR
const USERS = {
    "Keskin": "517",
    "Kunert": "502"
};

function login() {
    let username = document.getElementById('username').value.trim();
    let password = document.getElementById('password').value.trim();
    let errorDiv = document.getElementById('loginError');
    
    if (USERS[username] && USERS[username] === password) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('userDisplay').innerHTML = "👤 Angemeldet: " + username;
        errorDiv.innerHTML = "";
    } else {
        errorDiv.innerHTML = "❌ Falscher Benutzername oder Passwort!";
    }
}

function logout() {
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('mainApp').classList.add('hidden');
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    document.getElementById('loginError').innerHTML = '';
}
</script>

</body>
</html>
