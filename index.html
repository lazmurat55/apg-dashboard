<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APG BOCHUM</title>
    <style>
        body { background: black; color: white; font-family: Arial, sans-serif; padding: 20px; }
        .card, .login-card { max-width: 500px; margin: auto; background: #1e293b; padding: 20px; border-radius: 20px; border: 2px solid #38bdf8; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; font-size: 16px; }
        button { background: #38bdf8; color: black; font-weight: bold; cursor: pointer; }
        .error { color: red; margin-top: 10px; }
        .success { color: #22c55e; }
        label { display: block; margin: 10px 0 5px; color: #38bdf8; font-weight: bold; }
        select { width: 100%; padding: 12px; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 10px; }
        .schicht-group { display: flex; gap: 10px; margin: 10px 0; }
        .schicht-btn { background: #0f172a; border: 1px solid #334155; }
        .schicht-btn.active { background: #38bdf8; color: black; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .main-btn { background: #38bdf8; padding: 15px; font-size: 16px; margin-top: 20px; }
        .add-btn { background: transparent; border: 2px dashed #38bdf8; color: #38bdf8; }
        .selected-worker { background: rgba(56,189,248,0.1); padding: 10px; border-radius: 10px; margin-top: 5px; border: 1px solid #38bdf8; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-card">
    <h2 style="color:#38bdf8;">APG LOGIN</h2>
    <input type="text" id="username" placeholder="Nachname">
    <input type="password" id="password" placeholder="Passwort">
    <button onclick="checkLogin()">ANMELDEN</button>
    <div id="loginError" class="error"></div>
</div>

<!-- ANA UYGULAMA -->
<div id="mainApp" class="card" style="display:none;">
    <h2>Adler Pelzer Group</h2>
    <p id="userDisplay" class="success"></p>

    <label>SCHICHT</label>
    <div class="schicht-group">
        <button class="schicht-btn" onclick="setSchicht('A')">A</button>
        <button class="schicht-btn" onclick="setSchicht('B')">B</button>
        <button class="schicht-btn" onclick="setSchicht('C')">C</button>
    </div>

    <label>MITARBEITER</label>
    <div id="workerListArea"></div>
    <button class="add-btn" onclick="addTestWorker()">+ Mitarbeiter hinzufügen</button>

    <div class="grid-2">
        <div><label>ANLAGE</label><select id="anlage"><option value="">Wählen...</option><option value="PUR1">PUR 1</option><option value="PUR2">PUR 2</option><option value="IM1">IM 1</option><option value="COM">Compound</option></select></div>
        <div><label>ARTIKEL</label><input type="text" id="artikel" placeholder="Nummer"></div>
    </div>

    <div class="grid-2">
        <div><label>GUTTEILE</label><input type="number" id="gut" placeholder="Stückzahl"></div>
        <div><label>AUSSCHUSS</label><input type="number" id="aus" placeholder="Stückzahl"></div>
    </div>

    <button class="main-btn" onclick="sendReport()">📤 RAPORT SENDEN</button>
    <button onclick="logout()" style="background:#475569; margin-top:10px;">ABMELDEN</button>
</div>

<script>
// KULLANICILAR
const USERS = {
    "Keskin": "517",
    "Uzun": "1433",
    "Kunert": "502",
    "Aldirmaz": "577",
    "Beher": "510"
};

// ÇALIŞANLAR
const WORKERS = {
    "A": ["Kunert M.", "Karali O.", "Mikuczynski K.", "Türkmen E."],
    "B": ["Keskin Mur.", "Aldirmaz P.", "Anderwald R.", "Bayrakli F."],
    "C": ["Beher T.", "Keskin Mustafa", "Kantaroglu Ö.", "Savas R."]
};

let currentUser = "";
let currentSchicht = "B";
let selectedWorkers = [];

function checkLogin() {
    let username = document.getElementById('username').value.trim();
    let password = document.getElementById('password').value.trim();
    let errorDiv = document.getElementById('loginError');
    
    if (USERS[username] && USERS[username] === password) {
        currentUser = username;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('userDisplay').innerHTML = "Angemeldet: " + username;
        setSchicht('B');
    } else {
        errorDiv.innerText = "❌ Falscher Benutzername oder Passwort!";
    }
}

function setSchicht(schicht) {
    currentSchicht = schicht;
    document.querySelectorAll('.schicht-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.innerText === schicht) btn.classList.add('active');
    });
    selectedWorkers = [];
    updateWorkerDisplay();
}

function addTestWorker() {
    let workers = WORKERS[currentSchicht] || [];
    if (workers.length > 0) {
        let newWorker = workers[Math.floor(Math.random() * workers.length)];
        if (!selectedWorkers.includes(newWorker)) {
            selectedWorkers.push(newWorker);
        } else {
            selectedWorkers.push(workers[0]);
        }
    } else {
        selectedWorkers.push("Test " + (selectedWorkers.length + 1));
    }
    updateWorkerDisplay();
}

function removeWorker(name) {
    selectedWorkers = selectedWorkers.filter(w => w !== name);
    updateWorkerDisplay();
}

function updateWorkerDisplay() {
    let container = document.getElementById('workerListArea');
    if (selectedWorkers.length === 0) {
        container.innerHTML = '<div class="selected-worker" style="color:#94a3b8;">Keine Mitarbeiter</div>';
    } else {
        container.innerHTML = selectedWorkers.map(w => `
            <div class="selected-worker">
                <span>${w}</span>
                <span onclick="removeWorker('${w}')" style="color:red; cursor:pointer;">✕</span>
            </div>
        `).join('');
    }
}

function sendReport() {
    let anlage = document.getElementById('anlage').value;
    let artikel = document.getElementById('artikel').value;
    let gut = document.getElementById('gut').value;
    let aus = document.getElementById('aus').value;
    
    if (!anlage) { alert("Bitte Anlage wählen!"); return; }
    if (selectedWorkers.length === 0) { alert("Bitte Mitarbeiter hinzufügen!"); return; }
    
    let report = {
        user: currentUser,
        schicht: currentSchicht,
        workers: selectedWorkers,
        anlage: anlage,
        artikel: artikel,
        gut: gut,
        aus: aus,
        date: new Date().toLocaleString()
    };
    
    console.log("Raport:", report);
    alert("✅ Raport gesendet!\n\n" + JSON.stringify(report, null, 2));
    
    // Temizle
    document.getElementById('anlage').value = "";
    document.getElementById('artikel').value = "";
    document.getElementById('gut').value = "";
    document.getElementById('aus').value = "";
    selectedWorkers = [];
    updateWorkerDisplay();
}

function logout() {
    document.getElementById('loginScreen').style.display = 'block';
    document.getElementById('mainApp').style.display = 'none';
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    document.getElementById('loginError').innerText = '';
    currentUser = "";
    selectedWorkers = [];
}
</script>

</body>
</html>
