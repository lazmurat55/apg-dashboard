<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APG BOCHUM SECURE PRO</title>
    <style>
        :root {
            --bg: #000000;
            --card: #1e293b;
            --primary: #38bdf8;
            --blue-dark: #1e40af;
            --text: #f1f5f9;
            --danger: #ef4444;
            --success: #22c55e;
            --border: #334155;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
        }
        
        .login-card, .card {
            max-width: 500px;
            margin: auto;
            background: var(--card);
            padding: 30px 20px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            text-align: center;
        }
        
        .dashboard-card {
            background: #000000;
            border: 1px solid var(--primary);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            display: none;
            box-sizing: border-box;
        }
        
        input, select, button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #0f172a;
            color: white;
            font-size: 16px;
        }
        
        button {
            background: var(--primary);
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        
        button:disabled {
            background: #475569;
            cursor: not-allowed;
        }
        
        .main-btn {
            background: var(--primary);
            padding: 18px;
            font-size: 18px;
            margin-top: 20px;
        }
        
        .add-btn {
            background: transparent;
            border: 2px dashed var(--primary);
            color: var(--primary);
        }
        
        .schicht-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 10px 0;
        }
        
        .schicht-btn, .type-btn, .ft-btn {
            background: #0f172a;
            border: 1px solid var(--border);
        }
        
        .schicht-btn.active, .type-btn.active, .ft-btn.active {
            background: var(--primary);
            color: #0f172a;
        }
        
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .ft-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        
        .selected-worker {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: rgba(56,189,248,0.1);
            border-radius: 10px;
            margin-top: 6px;
            border: 1px solid var(--primary);
        }
        
        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 8px;
        }
        
        .status-ok { background: var(--success); color: black; }
        .status-error { background: var(--danger); color: white; }
        
        .section-card {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 15px;
            margin-top: 15px;
            position: relative;
        }
        
        .code-row {
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
        }
        
        .code-row-inputs {
            display: flex;
            gap: 8px;
        }
        
        .code-row-inputs select { flex: 3; margin: 0; }
        .code-row-inputs input { flex: 1; margin: 0; }
        
        .sonstige-input { display: none; margin-top: 8px; }
        
        .reports-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        
        @media (min-width: 768px) {
            .reports-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (min-width: 1200px) {
            .reports-grid { grid-template-columns: repeat(3, 1fr); }
        }
        
        .report-box {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 18px;
        }
        
        .filter-btn {
            padding: 12px;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }
        
        .filter-btn.active-filter {
            background: var(--primary);
            color: #0f172a;
        }
        
        #workerOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .overlay-content {
            background: var(--card);
            width: 95%;
            max-width: 450px;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--primary);
        }
        
        .worker-opt {
            padding: 14px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        
        .worker-opt:hover { background: rgba(56,189,248,0.1); }
        
        label {
            display: block;
            margin: 15px 0 5px;
            color: var(--primary);
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
        }
        
        .header {
            text-align: center;
            border-bottom: 3px solid var(--primary);
            margin-bottom: 20px;
            padding-bottom: 10px;
        }
        
        .error { color: var(--danger); margin-top: 10px; }
        .success { color: var(--success); }
        
        @media (max-width: 600px) {
            .grid-2 { grid-template-columns: 1fr; gap: 5px; }
            body { padding: 5px; }
        }
    </style>
</head>
<body>

<!-- LOGIN EKRANI -->
<div id="loginScreen" class="login-card">
    <h2 style="color:var(--primary);">APG LOGIN</h2>
    <input type="text" id="userInp" placeholder="Nachname">
    <input type="password" id="passInp" placeholder="Passwort">
    <button id="loginBtn">ANMELDEN</button>
    <div id="loginError" class="error"></div>
</div>

<!-- ŞİFRE DEĞİŞTİRME -->
<div id="setPassScreen" style="display:none;" class="login-card">
    <h3 style="color:var(--primary);">ERSTES LOGIN</h3>
    <input type="password" id="newPass1" placeholder="Neues Passwort (min. 4 Zeichen)">
    <input type="password" id="newPass2" placeholder="Wiederholen">
    <button id="savePassBtn">PASSWORT AKTIVIEREN</button>
</div>

<!-- ANA UYGULAMA -->
<div id="mainApp" class="card" style="display:none;">
    <div class="header">
        <h1>Adler Pelzer Group</h1>
        <p id="currentUserDisplay" style="color:var(--success);"></p>
    </div>
    
    <div class="grid-2">
        <div>
            <label>Schicht</label>
            <div class="schicht-group">
                <button class="schicht-btn" data-schicht="A">A</button>
                <button class="schicht-btn" data-schicht="B">B</button>
                <button class="schicht-btn" data-schicht="C">C</button>
            </div>
        </div>
        <div>
            <label>Schichtart</label>
            <div class="schicht-group">
                <button class="type-btn" data-type="Frühschicht">Früh</button>
                <button class="type-btn" data-type="Spätschicht">Spät</button>
                <button class="type-btn" data-type="Nachtschicht">Nacht</button>
            </div>
        </div>
    </div>
    
    <div id="workerDisplayContainer"></div>
    <button class="add-btn" id="openWorkerBtn">+ Mitarbeiter hinzufügen</button>
    
    <div class="grid-2">
        <div><label>Datum</label><input type="date" id="datum"></div>
        <div>
            <label>Anlage</label>
            <select id="anlage">
                <option value="">Wählen...</option>
                <optgroup label="PUR">
                    <option value="PUR1">PUR 1</option><option value="PUR2">PUR 2</option>
                    <option value="PUR3">PUR 3</option><option value="PUR4">PUR 4</option>
                    <option value="PUR5">PUR 5</option><option value="PUR6">PUR 6</option>
                    <option value="PUR7">PUR 7</option><option value="PUR8">PUR 8</option>
                    <option value="PUR9">PUR 9</option>
                </optgroup>
                <optgroup label="Spritzguss">
                    <option value="IM1">IM 1</option><option value="IM2">IM 2</option>
                    <option value="IM3">IM 3</option><option value="IM4">IM 4</option>
                    <option value="IM5">IM 5</option><option value="CIM1">CIM 1</option>
                </optgroup>
                <option value="COM">Compound</option>
            </select>
        </div>
    </div>
    
    <div id="ftBox" style="display:none;">
        <label>Formträger (FT)</label>
        <div class="ft-grid">
            <button class="ft-btn" data-ft="FT1">FT1</button>
            <button class="ft-btn" data-ft="FT2">FT2</button>
            <button class="ft-btn" data-ft="FT3">FT3</button>
            <button class="ft-btn" data-ft="FT4">FT4</button>
            <button class="ft-btn" data-ft="FT5">FT5</button>
            <button class="ft-btn" data-ft="FT6">FT6</button>
        </div>
    </div>
    
    <div id="comTimeBox" style="display:none; text-align:center; background:rgba(56,189,248,0.1); padding:10px; border-radius:10px; margin-top:10px;">
        Compound: <span id="comTotal">0</span> / 480 Min
    </div>
    
    <div id="artikelContainer"></div>
    <button class="add-btn" id="addArtikelBtn" disabled>+ Artikel hinzufügen</button>
    <button id="mainSendBtn" class="main-btn" disabled>🚀 SPEICHERN & SENDEN</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="dashboard-card">
    <div class="header">
        <h1>APG Live Dashboard</h1>
        <p id="adminUserDisplay"></p>
        <div class="schicht-group" style="max-width:400px; margin:15px auto;">
            <button class="filter-btn" data-filter-schicht="A">🔵 Schicht A</button>
            <button class="filter-btn active-filter" data-filter-schicht="B">🟢 Schicht B</button>
            <button class="filter-btn" data-filter-schicht="C">🟠 Schicht C</button>
        </div>
        <button id="refreshDashboardBtn" class="main-btn" style="max-width:300px; margin:auto;">🔄 Aktualisieren</button>
    </div>
    <div id="reportsContainer" class="reports-grid"></div>
</div>

<!-- ÇALIŞAN SEÇME -->
<div id="workerOverlay">
    <div class="overlay-content">
        <h3>Mitarbeiter wählen</h3>
        <div id="workerList"></div>
        <input type="text" id="manualWorker" placeholder="Name manuell...">
        <button id="addManualBtn" class="add-btn">Hinzufügen</button>
        <button id="closeOverlayBtn" class="main-btn">Schließen</button>
    </div>
</div>

<script>
    // ============================================
    // KONFIGÜRASYON
    // ============================================
    
    const SCRIPT_URL = "";
    const WHATSAPP_ACTIVE = false;
    
    // Kullanicilar
    const INITIAL_DB = {
        "Keskin": "517",
        "Uzun": "1433"
    };
    
    // Calisan listeleri
    const WORKER_DATA = {
        "A": ["Kunert M.", "Karali O.", "Mikuczynski K.", "Türkmen E.", "Amrouch M.", "Stania D."],
        "B": ["Keskin Mur.", "Aldirmaz P.", "Anderwald R.", "Bayrakli F.", "Kilic D.", "Maafi T."],
        "C": ["Beher T.", "Keskin Mustafa", "Kantaroglu Ö.", "Savas R.", "Rafo S.", "Gertz Kevin"]
    };
    
    // Kodlar
    const CODE_DATA = {
        PUR: {
            aus: ["6-2-01 Temperatur zu niedrig", "6-2-02 Schaum haftet nicht", "Sonstige"],
            stoer: ["3-01 WZ-Wechsel", "3-02 Mat-Umst.", "4-2-01 Ungepl. Inst. WZ", "Sonstige"]
        },
        Spritz: {
            aus: ["6-1-01 Anfahrschrott", "6-1-02 Mat-Umst.", "Sonstige"],
            stoer: ["3-01 WZ-Wechsel", "3-02 Mat-Umst.", "4-1-01 Ungepl. Inst. WZ", "Sonstige"]
        },
        COM: {
            aus: ["6-3-01 Anfahrschrott", "6-3-02 Mat-Fehler", "Sonstige"],
            stoer: ["3-01 WZ-Wechsel", "3-02 Mat-Umst.", "4-3-01 Messer schleifen", "Sonstige"]
        }
    };
    
    let SUPER_MANAGERS = ["Keskin", "Uzun"];
    
    // ============================================
    // ANA UYGULAMA
    // ============================================
    
    let currentSchicht = "B";
    let currentSchichtType = "Frühschicht";
    let selectedStaff = [];
    let loggedInUser = "";
    let currentSchichtFilter = "B";
    let artikelCounter = 0;
    
    document.addEventListener("DOMContentLoaded", function() {
        setInitialTodayDate();
        bindEvents();
        setSchicht("B");
        setSchichtType("Frühschicht");
    });
    
    function setInitialTodayDate() {
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        const dateInput = document.getElementById('datum');
        if (dateInput) dateInput.value = `${year}-${month}-${day}`;
    }
    
    function bindEvents() {
        document.getElementById('loginBtn').addEventListener('click', checkLogin);
        document.getElementById('savePassBtn').addEventListener('click', saveNewPassword);
        document.getElementById('openWorkerBtn').addEventListener('click', openWorkerOverlay);
        document.getElementById('addManualBtn').addEventListener('click', addManualWorker);
        document.getElementById('closeOverlayBtn').addEventListener('click', () => {
            document.getElementById('workerOverlay').style.display = 'none';
        });
        document.getElementById('addArtikelBtn').addEventListener('click', addArtikel);
        document.getElementById('mainSendBtn').addEventListener('click', processReport);
        document.getElementById('refreshDashboardBtn').addEventListener('click', loadAdminDashboard);
        
        document.querySelectorAll('.schicht-btn[data-schicht]').forEach(btn => {
            btn.addEventListener('click', () => setSchicht(btn.dataset.schicht));
        });
        
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.addEventListener('click', () => setSchichtType(btn.dataset.type));
        });
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentSchichtFilter = btn.dataset.filterSchicht;
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.remove('active-filter');
                    b.style.background = "#0f172a";
                });
                btn.classList.add('active-filter');
                btn.style.background = "#38bdf8";
                loadAdminDashboard();
            });
        });
        
        document.getElementById('anlage').addEventListener('change', (e) => onAnlageChange(e.target.value));
        
        document.querySelectorAll('.ft-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                this.classList.toggle('active');
                liveCheck();
            });
        });
    }
    
    function setSchicht(schicht) {
        currentSchicht = schicht;
        document.querySelectorAll('.schicht-btn[data-schicht]').forEach(btn => {
            btn.classList.remove('active');
            if (btn.dataset.schicht === schicht) btn.classList.add('active');
        });
        selectedStaff = [];
        renderStaff();
        if (schicht === "A") setSchichtType('Frühschicht');
        else if (schicht === "B") setSchichtType('Spätschicht');
        else if (schicht === "C") setSchichtType('Nachtschicht');
    }
    
    function setSchichtType(type) {
        currentSchichtType = type;
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.dataset.type === type) btn.classList.add('active');
        });
    }
    
    function openWorkerOverlay() {
        const workers = WORKER_DATA[currentSchicht] || [];
        document.getElementById('workerList').innerHTML = workers.map(w => 
            `<div class="worker-opt" data-worker="${w}">${w}</div>`
        ).join('');
        document.querySelectorAll('.worker-opt').forEach(opt => {
            opt.addEventListener('click', () => {
                const name = opt.dataset.worker;
                if (!selectedStaff.includes(name)) selectedStaff.push(name);
                document.getElementById('workerOverlay').style.display = 'none';
                renderStaff();
            });
        });
        document.getElementById('workerOverlay').style.display = 'flex';
    }
    
    function addManualWorker() {
        const name = document.getElementById('manualWorker').value.trim();
        if (name) {
            selectedStaff.push("✍️ " + name);
            document.getElementById('manualWorker').value = '';
            document.getElementById('workerOverlay').style.display = 'none';
            renderStaff();
        }
    }
    
    function renderStaff() {
        const container = document.getElementById('workerDisplayContainer');
        if (!container) return;
        container.innerHTML = selectedStaff.map(s => `
            <div class="selected-worker">
                <span>${s}</span>
                <span onclick="removeStaff('${s}')" style="color:red; cursor:pointer;">✕</span>
            </div>
        `).join('');
        liveCheck();
    }
    
    function removeStaff(name) {
        selectedStaff = selectedStaff.filter(x => x !== name);
        renderStaff();
    }
    
    function onAnlageChange(value) {
        document.getElementById('ftBox').style.display = value.startsWith("PUR") ? "block" : "none";
        document.getElementById('comTimeBox').style.display = value === "COM" ? "block" : "none";
        document.getElementById('artikelContainer').innerHTML = "";
        document.getElementById('addArtikelBtn').disabled = value === "";
        liveCheck();
    }
    
    function addArtikel() {
        const id = Date.now() + artikelCounter++;
        const container = document.getElementById('artikelContainer');
        const isCom = document.getElementById('anlage').value === 'COM';
        
        const div = document.createElement('div');
        div.className = "section-card artikel-row";
        div.id = `art_${id}`;
        div.innerHTML = `
            <button onclick="this.parentElement.remove(); liveCheck();" style="position:absolute; right:10px; top:10px; background:var(--danger); color:white; border:none; border-radius:5px; width:30px; height:30px; cursor:pointer;">✕</button>
            <label>Artikelnummer</label>
            <input type="text" class="art-name" placeholder="Nummer eingeben...">
            ${isCom ? '<label>Dauer (Min)</label><input type="number" class="art-duration" placeholder="Minuten..." oninput="liveCheck()">' : ''}
            <div class="grid-2">
                <div><label>Gutteile (Stk)</label><input type="number" class="art-gut" placeholder="Anzahl..."></div>
                <div><label>Aus Gesamt</label><input type="number" class="art-aus-total" placeholder="Anzahl..." oninput="liveCheck()"></div>
            </div>
            <div class="status-badge" id="badge_${id}"></div>
            <div id="rows_${id}"></div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button class="sub-btn" onclick="addRow('${id}','aus')">+ Ausschuss</button>
                <button class="sub-btn" onclick="addRow('${id}','stoer')">+ Störung</button>
            </div>
        `;
        container.appendChild(div);
    }
    
    window.addRow = function(artId, type) {
        const anlage = document.getElementById('anlage').value;
        let category = 'Spritz';
        if (anlage === 'COM') category = 'COM';
        else if (anlage.startsWith('PUR')) category = 'PUR';
        
        const codes = CODE_DATA[category][type];
        const placeholder = type === 'aus' ? 'Stk' : 'Min';
        const rowsDiv = document.getElementById(`rows_${artId}`);
        
        const rowDiv = document.createElement('div');
        rowDiv.className = "code-row";
        rowDiv.innerHTML = `
            <div class="code-row-inputs">
                <select class="${type}-select" style="flex:3;">
                    ${codes.map(c => `<option value="${c}">${c}</option>`).join('')}
                </select>
                <input type="number" class="${type}-value" style="flex:1;" placeholder="${placeholder}" oninput="liveCheck()">
                <button onclick="this.parentElement.parentElement.remove(); liveCheck();" style="color:red; background:none; border:none; font-size:20px;">✕</button>
            </div>
            <input type="text" class="sonstige-input" placeholder="Grund manuell..." style="display:none;">
        `;
        rowsDiv.appendChild(rowDiv);
        
        const select = rowDiv.querySelector(`.${type}-select`);
        const sonstInput = rowDiv.querySelector('.sonstige-input');
        select.addEventListener('change', () => {
            sonstInput.style.display = select.value === 'Sonstige' ? 'block' : 'none';
        });
        liveCheck();
    };
    
    function liveCheck() {
        let isValid = true;
        let compoundTotal = 0;
        
        document.querySelectorAll('.artikel-row').forEach(row => {
            const id = row.id.split('_')[1];
            const ausTotal = parseInt(row.querySelector('.art-aus-total')?.value) || 0;
            let sumAus = 0;
            row.querySelectorAll('.aus-value').forEach(inp => sumAus += parseInt(inp.value) || 0);
            
            const badge = document.getElementById(`badge_${id}`);
            if (badge) {
                if (ausTotal > 0 && ausTotal !== sumAus) {
                    badge.className = "status-badge status-error";
                    badge.innerText = `⚠️ Differenz: ${sumAus}/${ausTotal}`;
                    isValid = false;
                } else if (ausTotal > 0) {
                    badge.className = "status-badge status-ok";
                    badge.innerText = `✅ OK: ${sumAus}/${ausTotal}`;
                } else {
                    badge.innerText = "";
                }
            }
            compoundTotal += parseInt(row.querySelector('.art-duration')?.value) || 0;
        });
        
        if (document.getElementById('anlage').value === 'COM') {
            document.getElementById('comTotal').innerText = compoundTotal;
            if (compoundTotal !== 480) isValid = false;
        }
        
        if (selectedStaff.length === 0 || !document.getElementById('anlage').value) isValid = false;
        document.getElementById('mainSendBtn').disabled = !isValid;
    }
    
    function processReport() {
        alert("✅ Bericht wurde gesendet! (Demo Modus)");
        window.location.reload();
    }
    
    async function loadAdminDashboard() {
        const container = document.getElementById('reportsContainer');
        if (container) {
            container.innerHTML = '<p style="text-align:center;">📊 Dashboard Demo Modu<br>Google Sheets Verbindung nicht aktiv.</p>';
        }
    }
    
    // ============================================
    // LOGIN SİSTEMİ
    // ============================================
    
    async function checkLogin() {
        const username = document.getElementById('userInp').value.trim();
        const password = document.getElementById('passInp').value.trim();
        const errorDiv = document.getElementById('loginError');
        
        if (INITIAL_DB[username] && INITIAL_DB[username] === password) {
            loggedInUser = username;
            document.getElementById('loginScreen').style.display = 'none';
            
            if (SUPER_MANAGERS.includes(username)) {
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('adminUserDisplay').innerHTML = "Willkommen, " + username + " (Admin Mode)";
                loadAdminDashboard();
            } else {
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('currentUserDisplay').innerHTML = "Angemeldet: " + username;
                
                let foundSchicht = "B";
                if (WORKER_DATA["A"].some(w => w.includes(username))) foundSchicht = "A";
                if (WORKER_DATA["C"].some(w => w.includes(username))) foundSchicht = "C";
                setSchicht(foundSchicht);
            }
        } else {
            errorDiv.innerText = "❌ Falscher Benutzername oder Passwort!";
        }
    }
    
    function saveNewPassword() {
        alert("Passwort ändern (Demo)");
        enterApp(loggedInUser);
    }
    
    function enterApp(username) {
        loggedInUser = username;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('currentUserDisplay').innerHTML = "Angemeldet: " + username;
    }
    
    window.liveCheck = liveCheck;
    window.removeStaff = removeStaff;
</script>

</body>
</html>
