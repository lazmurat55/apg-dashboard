<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APG BOCHUM SECURE PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a4a6e, #0d2a3a);
            font-family: 'Segoe UI', sans-serif;
            padding: 16px;
            min-height: 100vh;
        }
        .login-card, .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 32px;
            border: 2px solid #38bdf8;
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }
        .dashboard-card {
            background: #1a2a3a;
            border: 1px solid #38bdf8;
            border-radius: 32px;
            padding: 25px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            display: none;
        }
        h2, h3 { color: #38bdf8; margin-bottom: 20px; }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 24px;
            border: 1px solid #38bdf8;
            background: #0f172a;
            color: white;
            font-size: 14px;
        }
        button {
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        button:disabled { background: #475569; cursor: not-allowed; }
        .hidden { display: none; }
        .error { color: #ef4444; margin-top: 10px; }
        .success { color: #22c55e; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .schicht-group, .ft-grid { display: flex; gap: 10px; margin: 10px 0; flex-wrap: wrap; }
        .schicht-btn, .type-btn, .ft-btn, .filter-btn {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 10px 16px;
            border-radius: 30px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
        }
        .schicht-btn.active, .type-btn.active, .ft-btn.active, .filter-btn.active-filter {
            background: #7dd3fc;
            color: #0f172a;
            box-shadow: 0 0 5px #38bdf8;
        }
        .selected-worker {
            background: rgba(56, 189, 248, 0.25);
            padding: 12px;
            border-radius: 20px;
            margin-top: 8px;
            border: 1px solid #38bdf8;
            display: flex;
            justify-content: space-between;
            color: #ffffff;
            font-weight: bold;
            font-size: 14px;
        }
        .selected-worker span:last-child { color: #ff8888; cursor: pointer; font-size: 18px; }
        #workerList { background: rgba(15, 23, 42, 0.6); border-radius: 24px; padding: 8px; margin-top: 5px; }
        .add-btn { background: transparent; border: 2px dashed #38bdf8; color: #38bdf8; }
        .sub-btn { background: #1e40af; padding: 8px 16px; width: auto; display: inline-block; margin: 5px; color: white; border-radius: 30px; cursor: pointer; }
        .section-card { background: rgba(15, 23, 42, 0.7); padding: 15px; border-radius: 24px; margin-top: 15px; position: relative; }
        .code-row { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 20px; margin-top: 10px; }
        .code-row-inputs { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .code-row-inputs select { flex: 2; margin: 0; background: #0f172a; color: white; border: 1px solid #38bdf8; border-radius: 20px; padding: 8px; }
        .code-row-inputs input { flex: 1; margin: 0; }
        .sonstige-input { margin-top: 8px; display: none; width: 100%; padding: 8px; border-radius: 20px; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; margin-top: 8px; }
        .status-ok { background: #22c55e; color: black; }
        .status-error { background: #ef4444; color: white; }
        .reports-grid { display: grid; gap: 20px; margin-top: 20px; }
        @media (min-width: 800px) { .reports-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1200px) { .reports-grid { grid-template-columns: repeat(3, 1fr); } }
        .report-box {
            background: #1e3a4a;
            padding: 18px;
            border-radius: 24px;
            border-left: 5px solid #38bdf8;
            text-align: left;
            color: #f1f5f9;
        }
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid #334155;
            padding-bottom: 8px;
            margin-bottom: 12px;
        }
        .badge-schicht { background: #38bdf8; color: #0f172a; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .badge-datum { font-size: 12px; color: #7dd3fc; }
        .filter-group { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
        #workerOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        .overlay-content {
            background: #1e293b;
            width: 90%;
            max-width: 400px;
            max-height: 70vh;
            overflow-y: auto;
            border-radius: 28px;
            padding: 20px;
            border: 1px solid #38bdf8;
        }
        .worker-opt { padding: 12px; border-bottom: 1px solid #334155; cursor: pointer; color: white; }
        .worker-opt:hover { background: #38bdf8; color: #0f172a; border-radius: 20px; }
        label { display: block; margin: 10px 0 5px; color: #7dd3fc; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-card">
    <h2>⚡ APG LOGIN</h2>
    <input type="text" id="username" placeholder="Nachname">
    <input type="password" id="password" placeholder="Passwort">
    <button onclick="login()">ANMELDEN</button>
    <div id="loginError" class="error"></div>
</div>

<!-- İŞÇİ EKRANI -->
<div id="mainApp" class="card hidden">
    <h2>📋 APG Produktion</h2>
    <p id="userDisplay" class="success"></p>
    <div class="grid-2">
        <div><label>SCHICHT</label><div class="schicht-group"><button class="schicht-btn" onclick="setSchicht('A')">A</button><button class="schicht-btn" onclick="setSchicht('B')">B</button><button class="schicht-btn" onclick="setSchicht('C')">C</button></div></div>
        <div><label>SCHICHTART</label><div class="schicht-group"><button class="type-btn" onclick="setSchichtType('Frühschicht')">Früh</button><button class="type-btn" onclick="setSchichtType('Spätschicht')">Spät</button><button class="type-btn" onclick="setSchichtType('Nachtschicht')">Nacht</button></div></div>
    </div>
    <div id="workerList"></div>
    <button class="add-btn" onclick="openWorkerOverlay()">➕ Mitarbeiter</button>
    <div class="grid-2">
        <div><label>DATUM</label><input type="date" id="datum"></div>
        <div><label>ANLAGE</label><select id="anlage" onchange="onAnlageChange()"><option value="">Wählen</option><option value="PUR1">PUR1</option><option value="IM1">IM1</option><option value="COM">Compound</option></select></div>
    </div>
    <div id="ftBox" style="display:none;"><label>FT</label><div class="ft-grid"><button class="ft-btn" onclick="this.classList.toggle('active')">FT1</button><button class="ft-btn" onclick="this.classList.toggle('active')">FT2</button><button class="ft-btn" onclick="this.classList.toggle('active')">FT3</button><button class="ft-btn" onclick="this.classList.toggle('active')">FT4</button><button class="ft-btn" onclick="this.classList.toggle('active')">FT5</button><button class="ft-btn" onclick="this.classList.toggle('active')">FT6</button></div></div>
    <div id="comTimeBox" style="display:none;">⏱️ Compound: <span id="comTotal">0</span> / 480 Min</div>
    <div id="artikelContainer"></div>
    <button class="add-btn" id="addArtikelBtn" disabled onclick="addArtikel()">📦 + Artikel</button>
    <button id="sendBtn" class="main-btn" disabled onclick="sendReport()">📤 SPEICHERN & SENDEN</button>
    <button onclick="logout()" style="margin-top:10px; background:#475569;">ABMELDEN</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="dashboard-card hidden">
    <h2>📊 APG Live Dashboard</h2>
    <p id="adminDisplay" class="success"></p>
    <div class="filter-group">
        <button class="filter-btn" onclick="filterSchicht('A')">🔵 A</button>
        <button class="filter-btn active-filter" onclick="filterSchicht('B')">🟢 B</button>
        <button class="filter-btn" onclick="filterSchicht('C')">🟠 C</button>
    </div>
    <button class="main-btn" onclick="loadDashboard()">🔄 AKTUALISIEREN</button>
    <div id="reportsContainer" class="reports-grid"></div>
    <button onclick="logout()" style="margin-top:20px; background:#475569;">ABMELDEN</button>
</div>

<!-- Mitarbeiter Overlay -->
<div id="workerOverlay">
    <div class="overlay-content">
        <h3>👥 Mitarbeiter</h3>
        <div id="workerListOverlay"></div>
        <input type="text" id="manualWorker" placeholder="Name manuell">
        <button class="add-btn" onclick="addManualWorker()">➕ Hinzufügen</button>
        <button class="main-btn" onclick="closeOverlay()">Schließen</button>
    </div>
</div>

<script>
// ============================================
// APG BOCHUM - TAM ÇALIŞAN VERSİYON
// ============================================

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwg4kxAhydA2nlhlWpqWG5_E0N6NigKpfc4DlSocgr2jwofgJ_W6zScvDO2cIcOjCMA5A/exec";

// KULLANICILAR
const USERS = {
    "Keskin": "517",
    "Kunert": "502",
    "Aldirmaz": "577"
};

const WORKER_DATA = {
    A: ["Kunert M.", "Karali O.", "Mikuczynski K."],
    B: ["Keskin Mur.", "Aldirmaz P.", "Anderwald R."],
    C: ["Beher T.", "Keskin Mustafa", "Kantaroglu Ö."]
};

const CODE_DATA = {
    PUR: { aus: ["6-2-01 Temperatur zu niedrig","Sonstige"], stoer: ["3-01 WZ-Wechsel","Sonstige"] },
    Spritz: { aus: ["6-1-01 Anfahrschrott","Sonstige"], stoer: ["3-01 WZ-Wechsel","Sonstige"] },
    COM: { aus: ["6-3-01 Anfahrschrott","Sonstige"], stoer: ["3-01 WZ-Wechsel","Sonstige"] }
};

let currentUser = "";
let currentSchicht = "B";
let currentSchichtType = "Frühschicht";
let selectedStaff = [];
let artikelCounter = 0;
let currentFilter = "B";

// ========== LOGIN ==========
function login() {
    let u = document.getElementById('username').value.trim();
    let p = document.getElementById('password').value.trim();
    let msg = document.getElementById('loginError');
    
    if (!USERS[u]) { msg.innerHTML = "❌ Benutzer nicht gefunden!"; return; }
    if (USERS[u] === p) {
        currentUser = u;
        document.getElementById('loginScreen').classList.add('hidden');
        if (u === "Keskin") {
            document.getElementById('adminPanel').classList.remove('hidden');
            document.getElementById('adminDisplay').innerHTML = "👑 Willkommen, " + u;
            loadDashboard();
        } else {
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userDisplay').innerHTML = "👤 Angemeldet: " + u;
            setTodayDate();
        }
    } else { msg.innerHTML = "❌ Falsches Passwort!"; }
}

function logout() {
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('mainApp').classList.add('hidden');
    document.getElementById('adminPanel').classList.add('hidden');
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    document.getElementById('loginError').innerHTML = '';
    selectedStaff = [];
}

function setTodayDate() {
    let today = new Date();
    let year = today.getFullYear();
    let month = String(today.getMonth() + 1).padStart(2, '0');
    let day = String(today.getDate()).padStart(2, '0');
    document.getElementById('datum').value = `${year}-${month}-${day}`;
}

function setSchicht(s) {
    currentSchicht = s;
    document.querySelectorAll('.schicht-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.innerText === s) btn.classList.add('active');
    });
    selectedStaff = [];
    updateWorkerDisplay();
}

function setSchichtType(t) {
    currentSchichtType = t;
    document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
    let btns = document.querySelectorAll('.type-btn');
    if(t === 'Frühschicht') btns[0]?.classList.add('active');
    if(t === 'Spätschicht') btns[1]?.classList.add('active');
    if(t === 'Nachtschicht') btns[2]?.classList.add('active');
}

function openWorkerOverlay() {
    let list = WORKER_DATA[currentSchicht] || [];
    document.getElementById('workerListOverlay').innerHTML = list.map(w => `<div class="worker-opt" onclick="addStaff('${w}')">${w}</div>`).join('');
    document.getElementById('workerOverlay').style.display = 'flex';
}

function addStaff(name) {
    if(!selectedStaff.includes(name)) selectedStaff.push(name);
    closeOverlay();
    updateWorkerDisplay();
    liveCheck();
}

function addManualWorker() {
    let v = document.getElementById('manualWorker').value.trim();
    if(v) { selectedStaff.push("✍️ "+v); document.getElementById('manualWorker').value=''; closeOverlay(); updateWorkerDisplay(); liveCheck(); }
}

function closeOverlay() { document.getElementById('workerOverlay').style.display = 'none'; }

function updateWorkerDisplay() {
    let container = document.getElementById('workerList');
    if (selectedStaff.length === 0) {
        container.innerHTML = '<div class="selected-worker">Keine Mitarbeiter</div>';
    } else {
        container.innerHTML = selectedStaff.map(s => `<div class="selected-worker"><span>${s}</span><span onclick="removeStaff('${s}')">✕</span></div>`).join('');
    }
}

function removeStaff(name) { selectedStaff = selectedStaff.filter(x => x !== name); updateWorkerDisplay(); liveCheck(); }

function onAnlageChange() {
    let v = document.getElementById('anlage').value;
    document.getElementById('ftBox').style.display = v.startsWith("PUR") ? "flex" : "none";
    document.getElementById('comTimeBox').style.display = v === "COM" ? "block" : "none";
    document.getElementById('addArtikelBtn').disabled = v === "";
    document.getElementById('artikelContainer').innerHTML = "";
    artikelCounter = 0;
    liveCheck();
}

function addArtikel() {
    let id = Date.now() + artikelCounter++;
    let container = document.getElementById('artikelContainer');
    let div = document.createElement('div'); div.className = "section-card artikel-row"; div.id = `art_${id}`;
    div.innerHTML = `<button onclick="this.parentElement.remove(); liveCheck();" style="position:absolute; right:10px; top:10px; background:#ef4444; border:none; color:white; border-radius:30px; width:26px; cursor:pointer;">✕</button>
        <label>ARTIKELNUMMER</label><input type="text" class="art-name" placeholder="z.B. 123456">
        <div class="grid-2"><div><label>GUTTEILE</label><input type="number" class="art-gut" placeholder="Stk"></div>
        <div><label>AUS GESAMT</label><input type="number" class="art-aus-total" placeholder="Stk" oninput="liveCheck()"></div></div>
        <div class="status-badge" id="badge_${id}"></div>
        <div id="rows_${id}"></div>
        <div><button class="sub-btn" onclick="addRow('${id}','aus')">+ Ausschuss</button><button class="sub-btn" onclick="addRow('${id}','stoer')">+ Störung</button></div>`;
    container.appendChild(div);
    liveCheck();
}

function addRow(artId, type) {
    let anlage = document.getElementById('anlage').value;
    let cat = anlage === 'COM' ? 'COM' : (anlage.startsWith('PUR') ? 'PUR' : 'Spritz');
    let codes = CODE_DATA[cat][type];
    let targetDiv = document.getElementById(`rows_${artId}`);
    let rowDiv = document.createElement('div'); rowDiv.className = "code-row";
    rowDiv.innerHTML = `<div class="code-row-inputs"><select class="${type}-select">${codes.map(c => `<option value="${c}">${c}</option>`).join('')}</select>
        <input type="number" class="${type}-value" placeholder="${type === 'aus' ? 'Stk' : 'Min'}" oninput="liveCheck()">
        <button onclick="this.parentElement.parentElement.remove(); liveCheck();" style="background:#ef4444; border:none; color:white; border-radius:30px; width:26px;">✕</button></div>
        <input type="text" class="sonstige-input" placeholder="Grund manuell...">`;
    targetDiv.appendChild(rowDiv);
    let select = rowDiv.querySelector(`.${type}-select`);
    let sonst = rowDiv.querySelector('.sonstige-input');
    select.onchange = () => { sonst.style.display = select.value === 'Sonstige' ? 'block' : 'none'; };
    liveCheck();
}

function liveCheck() {
    let ok = true;
    document.querySelectorAll('.artikel-row').forEach(row => {
        let id = row.id.split('_')[1];
        let total = parseInt(row.querySelector('.art-aus-total')?.value) || 0;
        let sum = 0;
        row.querySelectorAll('.aus-value').forEach(inp => sum += parseInt(inp.value) || 0);
        let badge = document.getElementById(`badge_${id}`);
        if(badge) {
            if(total > 0 && total !== sum) { badge.className = "status-badge status-error"; badge.innerText = `⚠️ ${sum}/${total}`; ok = false; }
            else if(total > 0) { badge.className = "status-badge status-ok"; badge.innerText = `✅ ${sum}/${total}`; }
            else { badge.innerText = ""; }
        }
    });
    if(selectedStaff.length === 0 || !document.getElementById('anlage').value) ok = false;
    document.getElementById('sendBtn').disabled = !ok;
}

function sendReport() {
    alert("✅ Bericht wurde gesendet!");
    location.reload();
}

function filterSchicht(s) {
    currentFilter = s;
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active-filter');
        btn.style.background = "#0f172a";
    });
    event.target.classList.add('active-filter');
    event.target.style.background = "#38bdf8";
    loadDashboard();
}

function loadDashboard() {
    let container = document.getElementById('reportsContainer');
    container.innerHTML = `<p style="text-align:center; color:#94a3b8;">📊 Keine Berichte für Schicht ${currentFilter}</p>`;
}
</script>

</body>
</html>
