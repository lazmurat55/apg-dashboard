<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APG BOCHUM SECURE PRO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a4a6e, #0d2a3a);
            font-family: 'Segoe UI', sans-serif;
            padding: 16px;
            min-height: 100vh;
        }
        .login-card, .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 32px;
            border: 2px solid #38bdf8;
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }
        .dashboard-card {
            background: #1e293b;
            padding: 30px;
            border-radius: 32px;
            border: 2px solid #38bdf8;
            max-width: 1400px;
            margin: 0 auto;
            text-align: center;
        }
        h2, h3 { color: #38bdf8; margin-bottom: 20px; }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 24px;
            border: 1px solid #38bdf8;
            background: #0f172a;
            color: white;
            font-size: 14px;
        }
        button {
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        button:disabled { background: #475569; cursor: not-allowed; }
        .hidden { display: none; }
        .error { color: #ef4444; margin-top: 10px; }
        .success { color: #22c55e; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .schicht-group, .ft-grid { display: flex; gap: 10px; margin: 10px 0; flex-wrap: wrap; }
        .schicht-btn, .type-btn, .ft-btn, .filter-btn {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 10px 16px;
            border-radius: 30px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
        }
        .schicht-btn.active, .type-btn.active, .ft-btn.active, .filter-btn.active-filter {
            background: #7dd3fc;
            color: #0f172a;
            box-shadow: 0 0 5px #38bdf8;
        }
        .ft-grid { display: flex; gap: 8px; flex-wrap: wrap; }
        .selected-worker {
            background: rgba(56, 189, 248, 0.25);
            padding: 12px;
            border-radius: 20px;
            margin-top: 8px;
            border: 1px solid #38bdf8;
            display: flex;
            justify-content: space-between;
            color: #ffffff;
            font-weight: bold;
            font-size: 14px;
        }
        .selected-worker span:first-child { color: #ffffff; }
        .selected-worker span:last-child { color: #ff8888; cursor: pointer; font-size: 18px; }
        #workerList {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 24px;
            padding: 8px;
            margin-top: 5px;
        }
        .add-btn { background: transparent; border: 2px dashed #38bdf8; color: #38bdf8; }
        .sub-btn { background: #1e40af; padding: 8px 16px; width: auto; display: inline-block; margin: 5px; color: white; border: none; border-radius: 30px; cursor: pointer; }
        .section-card { background: rgba(15, 23, 42, 0.7); padding: 15px; border-radius: 24px; margin-top: 15px; position: relative; }
        .code-row { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 20px; margin-top: 10px; }
        .code-row-inputs { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .code-row-inputs select { flex: 2; margin: 0; background: #0f172a; color: white; border: 1px solid #38bdf8; border-radius: 20px; padding: 8px; }
        .code-row-inputs input { flex: 1; margin: 0; }
        .sonstige-input { margin-top: 8px; display: none; width: 100%; padding: 8px; border-radius: 20px; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; margin-top: 8px; }
        .status-ok { background: #22c55e; color: black; }
        .status-error { background: #ef4444; color: white; }
        .reports-grid { display: grid; gap: 15px; margin-top: 20px; }
        @media (min-width: 800px) { .reports-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1200px) { .reports-grid { grid-template-columns: repeat(3, 1fr); } }
        .report-box { background: rgba(15, 23, 42, 0.8); padding: 15px; border-radius: 20px; border: 1px solid #38bdf8; text-align: left; }
        .filter-group { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
        .rights-box { background: rgba(56,189,248,0.1); border: 1px dashed #38bdf8; border-radius: 24px; padding: 15px; margin-bottom: 20px; }
        .inline-group { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .inline-group select, .inline-group button { width: auto; flex: 1; }
        #workerOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        .overlay-content {
            background: #1e293b;
            width: 90%;
            max-width: 400px;
            max-height: 70vh;
            overflow-y: auto;
            border-radius: 28px;
            padding: 20px;
            border: 1px solid #38bdf8;
        }
        .worker-opt { padding: 12px; border-bottom: 1px solid #334155; cursor: pointer; color: white; }
        .worker-opt:hover { background: #38bdf8; color: #0f172a; border-radius: 20px; }
        label { display: block; margin: 10px 0 5px; color: #7dd3fc; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-card">
    <h2>⚡ APG LOGIN</h2>
    <input type="text" id="username" placeholder="Nachname">
    <input type="password" id="password" placeholder="Passwort">
    <button onclick="login()">ANMELDEN</button>
    <div id="loginError" class="error"></div>
</div>

<!-- İŞÇİ EKRANI -->
<div id="mainApp" class="card hidden">
    <h2>📋 APG Produktion</h2>
    <p id="userDisplay" class="success"></p>
    
    <div class="grid-2">
        <div>
            <label>SCHICHT</label>
            <div class="schicht-group">
                <button class="schicht-btn" onclick="setSchicht('A')">A</button>
                <button class="schicht-btn" onclick="setSchicht('B')">B</button>
                <button class="schicht-btn" onclick="setSchicht('C')">C</button>
            </div>
        </div>
        <div>
            <label>SCHICHTART</label>
            <div class="schicht-group">
                <button class="type-btn" onclick="setSchichtType('Frühschicht')">Früh</button>
                <button class="type-btn" onclick="setSchichtType('Spätschicht')">Spät</button>
                <button class="type-btn" onclick="setSchichtType('Nachtschicht')">Nacht</button>
            </div>
        </div>
    </div>
    
    <div id="workerList"></div>
    <button class="add-btn" onclick="openWorkerOverlay()">➕ Mitarbeiter hinzufügen</button>
    
    <div class="grid-2">
        <div><label>DATUM</label><input type="date" id="datum"></div>
        <div><label>ANLAGE</label><select id="anlage" onchange="onAnlageChange()">
            <option value="">Wählen</option>
            <optgroup label="PUR"><option value="PUR1">PUR1</option><option value="PUR2">PUR2</option><option value="PUR3">PUR3</option><option value="PUR4">PUR4</option><option value="PUR5">PUR5</option><option value="PUR6">PUR6</option><option value="PUR7">PUR7</option><option value="PUR8">PUR8</option><option value="PUR9">PUR9</option></optgroup>
            <optgroup label="Spritzguss"><option value="IM1">IM1</option><option value="IM2">IM2</option><option value="IM3">IM3</option><option value="IM4">IM4</option><option value="IM5">IM5</option><option value="CIM1">CIM1</option></optgroup>
            <option value="COM">Compound</option>
        </select></div>
    </div>
    
    <div id="ftBox" style="display:none;">
        <label>FORMTRAEGER (FT)</label>
        <div class="ft-grid">
            <button class="ft-btn" onclick="this.classList.toggle('active')">FT1</button>
            <button class="ft-btn" onclick="this.classList.toggle('active')">FT2</button>
            <button class="ft-btn" onclick="this.classList.toggle('active')">FT3</button>
            <button class="ft-btn" onclick="this.classList.toggle('active')">FT4</button>
            <button class="ft-btn" onclick="this.classList.toggle('active')">FT5</button>
            <button class="ft-btn" onclick="this.classList.toggle('active')">FT6</button>
        </div>
    </div>
    
    <div id="comTimeBox" style="display:none; background:rgba(0,0,0,0.3); border-radius:24px; padding:10px; text-align:center; margin-top:10px;">⏱️ Compound: <span id="comTotal">0</span> / 480 Min</div>
    
    <div id="artikelContainer"></div>
    <button class="add-btn" id="addArtikelBtn" disabled onclick="addArtikel()">📦 + Artikel hinzufügen</button>
    <button id="sendBtn" class="main-btn" disabled onclick="sendReport()">📤 SPEICHERN & SENDEN</button>
    <button onclick="logout()" style="margin-top:10px; background:#475569;">ABMELDEN</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="dashboard-card hidden">
    <h2>📊 APG Live Dashboard</h2>
    <p id="adminDisplay" class="success"></p>
    <div class="filter-group">
        <button class="filter-btn" onclick="filterSchicht('A')">🔵 A</button>
        <button class="filter-btn active-filter" onclick="filterSchicht('B')">🟢 B</button>
        <button class="filter-btn" onclick="filterSchicht('C')">🟠 C</button>
    </div>
    <button class="main-btn" onclick="loadDashboard()">🔄 AKTUALISIEREN</button>
    <div id="reportsContainer" class="reports-grid"></div>
    <button onclick="logout()" style="margin-top:20px; background:#475569;">ABMELDEN</button>
</div>

<!-- Mitarbeiter Overlay -->
<div id="workerOverlay">
    <div class="overlay-content">
        <h3>👥 Mitarbeiter wählen</h3>
        <div id="workerListOverlay"></div>
        <input type="text" id="manualWorker" placeholder="✏️ Name manuell">
        <button class="add-btn" onclick="addManualWorker()">➕ Hinzufügen</button>
        <button class="main-btn" onclick="closeOverlay()">Schließen</button>
    </div>
</div>

<script>
// ============================================
// APG BOCHUM - GOOGLE SHEETS BAĞLANTILI
// ============================================

// Google Apps Script URL (kendi URL'n ile değiştir)
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwg4kxAhydA2nlhlWpqWG5_E0N6NigKpfc4DlSocgr2jwofgJ_W6zScvDO2cIcOjCMA5A/exec";

const USERS = {
    "Keskin": "517",
    "Kunert": "502",
    "Aldirmaz": "577",
    "Beher": "510"
};

const WORKER_DATA = {
    A: ["Kunert M.", "Karali O.", "Mikuczynski K.", "Türkmen E.", "Amrouch M.", "Stania D."],
    B: ["Keskin Mur.", "Aldirmaz P.", "Anderwald R.", "Bayrakli F.", "Kilic D.", "Maafi T."],
    C: ["Beher T.", "Keskin Mustafa", "Kantaroglu Ö.", "Savas R.", "Rafo S.", "Gertz Kevin"]
};

const CODE_DATA = {
    PUR: {
        aus: ["6-2-01 Temperatur zu niedrig", "6-2-02 Schaum haftet nicht", "6-2-03 Einlegefehler", "6-2-04 Schussabbruch", "6-2-05 CIM nicht voll ausgeschäumt", "6-2-06 Lippe gerissen", "6-2-07 CIM gerissen", "7-2-01 Nacharbeit", "Sonstige"],
        stoer: ["3-01 WZ-Wechsel", "3-02 Mat-Umst.", "4-2-01 Ungepl. Inst. WZ", "4-2-02 Ungepl. Inst. Masch", "4-2-03 Poly/Iso Überdruck", "4-2-04 Mischkopf nio", "4-2-05 Fehler Lichtschr.", "4-2-06 Trennmittelpist.", "4-2-07 Formträger Prob.", "4-2-08 Reinigung WZ", "4-2-09 Not Aus", "5-2-01 Logistik Mangel", "5-2-02 Keine Teile", "5-2-04 Wartezeit", "5-2-10 Poly/Iso leer", "Sonstige"]
    },
    Spritz: {
        aus: ["6-1-01 Anfahrschrott", "6-1-02 Mat-Umst.", "6-1-03 CIM n.voll", "6-1-04 CIM gerissen", "6-1-05 Überspritzung", "6-1-06 Einfallstellen", "6-1-07 Brandstellen", "6-1-08 Silberstreifen", "Sonstige"],
        stoer: ["3-01 WZ-Wechsel", "3-02 Mat-Umst.", "4-1-01 Ungepl. Inst. WZ", "4-1-02 Ungepl. Inst. Masch", "4-1-03 Mat-Förderung", "4-1-04 Probleme Dosier.", "4-1-05 Probleme Schließeinh.", "4-1-06 Teileentnahme", "4-1-07 Probleme WZ-Heizung", "4-1-08 Probleme Beflamm.", "5-1-01 Mat-Mangel", "5-1-03 Wartezeit", "Sonstige"]
    },
    COM: {
        aus: ["6-3-01 Anfahrschrott", "6-3-02 Mat-Fehler", "Sonstige"],
        stoer: ["3-01 WZ-Wechsel", "3-02 Mat-Umst.", "4-3-01 Messer schleifen", "4-3-02 Ungepl. Inst. Masch", "4-3-04 Silowechsel", "5-3-01 Mat-Mangel", "5-3-05 Feueralarm", "Sonstige"]
    }
};

let currentUser = "";
let currentSchicht = "B";
let currentSchichtType = "Frühschicht";
let selectedStaff = [];
let artikelCounter = 0;
let currentFilter = "B";
let allReports = [];

// ========== LOGIN ==========
function login() {
    let u = document.getElementById('username').value.trim();
    let p = document.getElementById('password').value.trim();
    let msg = document.getElementById('loginError');
    if (!USERS[u]) { msg.innerHTML = "❌ Benutzer nicht gefunden!"; return; }
    if (USERS[u] === p) {
        currentUser = u;
        document.getElementById('loginScreen').classList.add('hidden');
        if (u === "Keskin") {
            document.getElementById('adminPanel').classList.remove('hidden');
            document.getElementById('adminDisplay').innerHTML = "👑 Willkommen, " + u;
            loadDashboard();
        } else {
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userDisplay').innerHTML = "👤 Angemeldet: " + u;
            setTodayDate();
        }
    } else { msg.innerHTML = "❌ Falsches Passwort!"; }
}

function logout() {
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('mainApp').classList.add('hidden');
    document.getElementById('adminPanel').classList.add('hidden');
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    document.getElementById('loginError').innerHTML = '';
    selectedStaff = [];
}

// ========== İŞÇİ EKRANI ==========
function setTodayDate() {
    let today = new Date();
    let year = today.getFullYear();
    let month = String(today.getMonth() + 1).padStart(2, '0');
    let day = String(today.getDate()).padStart(2, '0');
    document.getElementById('datum').value = `${year}-${month}-${day}`;
}

function setSchicht(s) {
    currentSchicht = s;
    document.querySelectorAll('.schicht-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.innerText === s) btn.classList.add('active');
    });
    selectedStaff = [];
    updateWorkerDisplay();
    if(s==="A") setSchichtType('Frühschicht');
    else if(s==="B") setSchichtType('Spätschicht');
    else setSchichtType('Nachtschicht');
}

function setSchichtType(t) {
    currentSchichtType = t;
    document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
    let btns = document.querySelectorAll('.type-btn');
    if(t === 'Frühschicht') btns[0]?.classList.add('active');
    if(t === 'Spätschicht') btns[1]?.classList.add('active');
    if(t === 'Nachtschicht') btns[2]?.classList.add('active');
}

function openWorkerOverlay() {
    let list = WORKER_DATA[currentSchicht] || [];
    document.getElementById('workerListOverlay').innerHTML = list.map(w => `<div class="worker-opt" onclick="addStaff('${w.replace(/'/g, "\\'")}')">${w}</div>`).join('');
    document.getElementById('workerOverlay').style.display = 'flex';
}

function addStaff(name) {
    if(!selectedStaff.includes(name)) selectedStaff.push(name);
    closeOverlay();
    updateWorkerDisplay();
    liveCheck();
}

function addManualWorker() {
    let v = document.getElementById('manualWorker').value.trim();
    if(v) { selectedStaff.push("✍️ "+v); document.getElementById('manualWorker').value=''; closeOverlay(); updateWorkerDisplay(); liveCheck(); }
}

function closeOverlay() { document.getElementById('workerOverlay').style.display = 'none'; }

function updateWorkerDisplay() {
    let container = document.getElementById('workerList');
    if (selectedStaff.length === 0) {
        container.innerHTML = '<div class="selected-worker" style="color:#94a3b8; background:rgba(56,189,248,0.15);">Keine Mitarbeiter</div>';
    } else {
        container.innerHTML = selectedStaff.map(s => `<div class="selected-worker"><span>${s}</span><span onclick="removeStaff('${s.replace(/'/g, "\\'")}')" style="color:#ff8888; cursor:pointer;">✕</span></div>`).join('');
    }
}

function removeStaff(name) { selectedStaff = selectedStaff.filter(x => x !== name); updateWorkerDisplay(); liveCheck(); }

function onAnlageChange() {
    let v = document.getElementById('anlage').value;
    document.getElementById('ftBox').style.display = v.startsWith("PUR") ? "flex" : "none";
    document.getElementById('comTimeBox').style.display = v === "COM" ? "block" : "none";
    document.getElementById('addArtikelBtn').disabled = v === "";
    document.getElementById('artikelContainer').innerHTML = "";
    artikelCounter = 0;
    liveCheck();
}

function addArtikel() {
    let id = Date.now() + artikelCounter++;
    let container = document.getElementById('artikelContainer');
    let isCom = document.getElementById('anlage').value === 'COM';
    let div = document.createElement('div'); div.className = "section-card artikel-row"; div.id = `art_${id}`;
    div.innerHTML = `<button onclick="this.parentElement.remove(); liveCheck();" style="position:absolute; right:10px; top:10px; background:#ef4444; border:none; color:white; border-radius:30px; width:26px; height:26px; cursor:pointer;">✕</button>
        <label>ARTIKELNUMMER</label><input type="text" class="art-name" placeholder="z.B. 123456">
        ${isCom ? '<label>DAUER (Min)</label><input type="number" class="art-duration" placeholder="Minuten" oninput="liveCheck()">' : ''}
        <div class="grid-2"><div><label>GUTTEILE</label><input type="number" class="art-gut" placeholder="Stk"></div>
        <div><label>AUS GESAMT</label><input type="number" class="art-aus-total" placeholder="Stk" oninput="liveCheck()"></div></div>
        <div class="status-badge" id="badge_${id}"></div>
        <div id="rows_${id}"></div>
        <div style="display:flex; gap:8px; margin-top:8px;"><button class="sub-btn" onclick="addRow('${id}','aus')">+ Ausschuss</button><button class="sub-btn" onclick="addRow('${id}','stoer')">+ Störung</button></div>`;
    container.appendChild(div);
    liveCheck();
}

function addRow(artId, type) {
    let anlage = document.getElementById('anlage').value;
    let category = anlage === 'COM' ? 'COM' : (anlage.startsWith('PUR') ? 'PUR' : 'Spritz');
    let codes = CODE_DATA[category][type];
    let targetDiv = document.getElementById(`rows_${artId}`);
    let rowDiv = document.createElement('div'); rowDiv.className = "code-row";
    rowDiv.innerHTML = `
        <div class="code-row-inputs">
            <select class="${type}-select" style="flex:2;">
                ${codes.map(c => `<option value="${c}">${c}</option>`).join('')}
            </select>
            <input type="number" class="${type}-value" placeholder="${type === 'aus' ? 'Stk' : 'Min'}" style="flex:1;" oninput="liveCheck()">
            <button onclick="this.parentElement.parentElement.remove(); liveCheck();" style="background:#ef4444; border:none; color:white; border-radius:30px; width:26px; cursor:pointer;">✕</button>
        </div>
        <input type="text" class="sonstige-input" placeholder="Grund manuell..." style="display:none;">
    `;
    targetDiv.appendChild(rowDiv);
    let select = rowDiv.querySelector(`.${type}-select`);
    let sonstInput = rowDiv.querySelector('.sonstige-input');
    select.onchange = function() { sonstInput.style.display = this.value === 'Sonstige' ? 'block' : 'none'; };
    liveCheck();
}

function liveCheck() {
    let isValid = true;
    let compoundTotal = 0;
    document.querySelectorAll('.artikel-row').forEach(row => {
        let id = row.id.split('_')[1];
        let total = parseInt(row.querySelector('.art-aus-total')?.value) || 0;
        let sum = 0;
        row.querySelectorAll('.aus-value').forEach(inp => sum += parseInt(inp.value) || 0);
        let badge = document.getElementById(`badge_${id}`);
        if(badge) {
            if(total > 0 && total !== sum) { badge.className = "status-badge status-error"; badge.innerText = `⚠️ Differenz: ${sum}/${total}`; isValid = false; }
            else if(total > 0) { badge.className = "status-badge status-ok"; badge.innerText = `✅ OK: ${sum}/${total}`; }
            else { badge.innerText = ""; }
        }
        compoundTotal += parseInt(row.querySelector('.art-duration')?.value) || 0;
    });
    if(document.getElementById('anlage').value === 'COM') {
        document.getElementById('comTotal').innerText = compoundTotal;
        if(compoundTotal !== 480) isValid = false;
    }
    if(selectedStaff.length === 0 || !document.getElementById('anlage').value) isValid = false;
    document.getElementById('sendBtn').disabled = !isValid;
}

async function sendReport() {
    let btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.innerText = "Sende...";
    
    let fts = Array.from(document.querySelectorAll('.ft-btn.active')).map(x => x.innerText).join(", ");
    let rawDate = document.getElementById('datum').value;
    let formattedDate = rawDate ? rawDate.split("-").reverse().join(".") : "";
    
    let articles = [];
    document.querySelectorAll('.artikel-row').forEach(row => {
        let artName = row.querySelector('.art-name')?.value || "NA";
        let artGut = parseInt(row.querySelector('.art-gut')?.value) || 0;
        let artAusTotal = parseInt(row.querySelector('.art-aus-total')?.value) || 0;
        let ausGrund = "-", ausStk = 0, stoerGrund = "-", stoerMin = 0;
        row.querySelectorAll('.code-row').forEach(cr => {
            let select = cr.querySelector('select');
            let val = parseInt(cr.querySelector('input[type="number"]')?.value) || 0;
            if(val > 0 && select) {
                let text = select.value === "Sonstige" ? "✍️ " + (cr.querySelector('.sonstige-input')?.value || "Sonstige") : select.value;
                if(select.classList.contains('aus-select')) { ausGrund = text; ausStk = val; }
                else { stoerGrund = text; stoerMin = val; }
            }
        });
        articles.push({ name: artName, gut: artGut, ausTotal: artAusTotal, ausGrund: ausGrund, ausStk: ausStk, stoerGrund: stoerGrund, stoerMin: stoerMin });
    });
    
    let payload = { action: "sendReport", sender: currentUser, staff: selectedStaff.join(", "), anlage: document.getElementById('anlage').value, schicht: currentSchicht, schichtType: currentSchichtType, customDate: formattedDate, ft: fts || "-", articles: articles };
    
    try {
        await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
        alert("✅ Bericht wurde erfolgreich gesendet!");
        location.reload();
    } catch(e) { alert("✅ Bericht wurde gesendet!"); location.reload(); }
}

// ========== ADMIN DASHBOARD ==========
function filterSchicht(s) {
    currentFilter = s;
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active-filter');
        btn.style.background = "#0f172a";
    });
    event.target.classList.add('active-filter');
    event.target.style.background = "#38bdf8";
    loadDashboard();
}

async function loadDashboard() {
    let container = document.getElementById('reportsContainer');
    container.innerHTML = '<div style="text-align:center">📡 Lade Berichte ...</div>';
    try {
        let res = await fetch(SCRIPT_URL + "?action=getReports");
        let data = await res.json();
        allReports = data.reports || [];
        let filtered = allReports.filter(r => r.schicht === currentFilter);
        if(filtered.length === 0) { container.innerHTML = `<p style="text-align:center; color:#94a3b8;">📭 Keine Berichte für Schicht ${currentFilter}</p>`; return; }
        container.innerHTML = filtered.map(r => `
            <div class="report-box">
                <div style="display:flex; justify-content:space-between; border-bottom:1px solid #38bdf8; padding-bottom:6px; margin-bottom:8px;">
                    <span>📅 ${r.date || '-'}</span><span>👤 ${r.sender || '-'}</span>
                </div>
                <div><b>${r.anlage || '-'}</b> ${r.ft && r.ft !== '-' ? `[FT: ${r.ft}]` : ''}</div>
                <div>📦 Artikel: ${r.artikel || '-'}</div>
                <div>✅ Gut: <b style="color:#22c55e">${r.gut || 0}</b> | ❌ Aus: <b style="color:#ef4444">${r.ausTotal || 0}</b></div>
                ${r.ausGrund && r.ausGrund !== '-' ? `<div>↳ Grund: ${r.ausGrund} (${r.ausStk || 0} Stk)</div>` : ''}
                ${r.stoerung && r.stoerung !== '-' ? `<div>⚙️ Störung: ${r.stoerung} (${r.dauer || 0} Min)</div>` : ''}
                <div style="margin-top:8px; font-size:12px;">👥 Team: ${r.staff || '-'}</div>
            </div>
        `).join('');
    } catch(e) { container.innerHTML = `<p style="color:#ef4444">❌ Fehler: ${e.message}</p>`; }
}
</script>
