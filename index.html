<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APG BOCHUM SECURE PRO</title>
    <style>
        :root { --bg: #000000; --card: #1e293b; --primary: #38bdf8; --text: #f1f5f9; --danger: #ef4444; --success: #22c55e; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 10px; }
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-card { background: var(--card); padding: 30px; border-radius: 20px; border: 2px solid var(--primary); width: 95%; max-width: 450px; text-align: center; }
        .card { width: 100%; max-width: 700px; background: var(--card); padding: 20px; border-radius: 20px; margin: auto; display: none; }
        .dashboard-card { background: #000000; border: 1px solid var(--primary); border-radius: 20px; padding: 25px; width: 100%; max-width: 1400px; margin: auto; display: none; }
        .header { text-align: center; border-bottom: 3px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px; }
        input, button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: none; font-size: 16px; background: #0f172a; color: white; }
        button { background: var(--primary); color: #0f172a; font-weight: bold; cursor: pointer; }
        .main-btn { background: var(--primary); padding: 14px; }
        .error { color: var(--danger); margin-top: 10px; }
        .success { color: var(--success); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        label { display: block; margin: 10px 0 5px; color: var(--primary); font-weight: bold; font-size: 12px; }
        .schicht-group { display: flex; gap: 10px; margin: 10px 0; }
        .schicht-btn { background: #0f172a; border: 1px solid #334155; }
        .schicht-btn.active { background: var(--primary); color: black; }
        .add-btn { background: transparent; border: 2px dashed var(--primary); color: var(--primary); }
        .selected-worker { background: rgba(56,189,248,0.1); padding: 10px; border-radius: 8px; margin-top: 5px; border: 1px solid var(--primary); display: flex; justify-content: space-between; }
        .filter-group { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
        .filter-btn { padding: 8px 20px; background: #0f172a; border-radius: 20px; cursor: pointer; }
        .filter-btn.active-filter { background: var(--primary); color: black; }
        .report-box { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; }
        .rights-box { background: rgba(56,189,248,0.05); padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        .inline-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
    <div class="login-card">
        <h2 style="color:var(--primary);">APG LOGIN</h2>
        <input type="text" id="userInp" placeholder="Nachname">
        <input type="password" id="passInp" placeholder="Passwort">
        <button class="main-btn" onclick="checkLogin()">ANMELDEN</button>
        <p id="loginError" class="error" style="display:none;"></p>
    </div>
</div>

<!-- İŞÇİ EKRANI -->
<div class="card" id="mainApp" style="display:none;">
    <div class="header"><h1>Adler Pelzer Group</h1><p id="currentUserDisplay" class="success"></p></div>
    <label>Schicht</label>
    <div class="schicht-group">
        <button class="schicht-btn" onclick="setSchicht('A')">A</button>
        <button class="schicht-btn" onclick="setSchicht('B')">B</button>
        <button class="schicht-btn" onclick="setSchicht('C')">C</button>
    </div>
    <div id="workerDisplayContainer"></div>
    <button class="add-btn" onclick="alert('Mitarbeiter Funktion kommt')">+ Mitarbeiter</button>
    <div class="grid-2">
        <div><label>Datum</label><input type="date" id="datum"></div>
        <div><label>Anlage</label><select id="anlage"><option>PUR1</option><option>IM1</option></select></div>
    </div>
    <button class="main-btn" onclick="alert('Raport gesendet!')">📤 SPEICHERN & SENDEN</button>
</div>

<!-- ADMIN PANEL -->
<div class="dashboard-card" id="adminPanel" style="display:none;">
    <div class="header"><h1>APG Live Dashboard</h1><p id="adminUserDisplay"></p></div>
    <div class="filter-group">
        <button class="filter-btn" onclick="filterSchicht('A')">🔵 A</button>
        <button class="filter-btn active-filter" onclick="filterSchicht('B')">🟢 B</button>
        <button class="filter-btn" onclick="filterSchicht('C')">🟠 C</button>
    </div>
    <button class="main-btn" onclick="loadAdminDashboard()">🔄 Aktualisieren</button>
    <div id="reportsContainer"></div>
</div>

<script>
// ============================================
// KULLANICILAR (Personal Numarası)
// ============================================
const USERS = {
    "Keskin": "517",
    "Uzun": "1433",
    "Kunert": "502",
    "Aldirmaz": "577",
    "Beher": "510"
};

let currentUser = "";
let currentFilter = "B";

// ============================================
// LOGIN
// ============================================
function checkLogin() {
    let username = document.getElementById('userInp').value.trim();
    let password = document.getElementById('passInp').value.trim();
    let errorDiv = document.getElementById('loginError');
    
    if (USERS[username] && USERS[username] === password) {
        currentUser = username;
        document.getElementById('loginScreen').style.display = 'none';
        
        if (username === "Keskin") {
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('adminUserDisplay').innerHTML = "👑 Willkommen, " + username;
            loadAdminDashboard();
        } else {
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('currentUserDisplay').innerHTML = "👤 Angemeldet: " + username;
        }
    } else {
        errorDiv.style.display = 'block';
        errorDiv.innerText = "❌ Falscher Benutzername oder Passwort!";
    }
}

function setSchicht(s) {
    document.querySelectorAll('.schicht-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.innerText === s) btn.classList.add('active');
    });
    alert("Schicht " + s + " gewählt");
}

function filterSchicht(s) {
    currentFilter = s;
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active-filter');
        btn.style.background = "#0f172a";
    });
    event.target.classList.add('active-filter');
    event.target.style.background = "#38bdf8";
    loadAdminDashboard();
}

function loadAdminDashboard() {
    let container = document.getElementById('reportsContainer');
    container.innerHTML = `<p style="text-align:center; color:#94a3b8;">📊 Keine Berichte für Schicht ${currentFilter}</p>`;
}

// Tarih bugün
let today = new Date();
let year = today.getFullYear();
let month = String(today.getMonth() + 1).padStart(2, '0');
let day = String(today.getDate()).padStart(2, '0');
if (document.getElementById('datum')) document.getElementById('datum').value = `${year}-${month}-${day}`;
</script>

</body>
</html>
