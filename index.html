<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APG BOCHUM SECURE PRO</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #bae6fd, #7dd3fc);
            --card: #ffffff;
            --card-inner: #f1f5f9;
            --primary: #0284c7;
            --danger: #dc2626;
            --success: #16a34a;
            --border: #cbd5e1;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-gradient); font-family: 'Segoe UI', sans-serif; padding: 10px; min-height: 100vh; }
        #loginScreen, #setPassScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-gradient); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-card { background: var(--card); padding: 30px; border-radius: 20px; border: 2px solid var(--primary); width: 95%; max-width: 450px; text-align: center; }
        .card { width: 100%; max-width: 700px; background: var(--card); padding: 20px; border-radius: 20px; margin: auto; border: 1px solid var(--border); display: none; }
        .dashboard-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; width: 100%; max-width: 1400px; margin: auto; display: none; }
        .header { text-align: center; border-bottom: 3px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px; }
        label { display: block; margin: 15px 0 5px; color: var(--primary); font-weight: bold; font-size: 13px; }
        input, select, button { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: white; font-size: 14px; margin: 5px 0; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        .main-btn:disabled { background: #94a3b8; }
        .schicht-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .schicht-btn, .type-btn, .ft-btn, .filter-btn { background: #e2e8f0; border: 1px solid var(--border); cursor: pointer; text-align: center; }
        .schicht-btn.active, .type-btn.active, .ft-btn.active { background: var(--primary); color: white; }
        .filter-btn.active-filter { background: var(--primary); color: white; }
        .add-btn { background: transparent; border: 2px dashed var(--primary); color: var(--primary); }
        .selected-worker { display: flex; justify-content: space-between; padding: 12px; background: #e0f2fe; border-radius: 10px; margin-top: 6px; }
        .ft-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 15px; font-size: 11px; margin-top: 8px; }
        .status-ok { background: #22c55e; color: white; }
        .status-error { background: #ef4444; color: white; }
        .code-row { margin-top: 10px; padding: 10px; background: #f8fafc; border: 1px solid var(--border); border-radius: 10px; }
        .code-row-inputs { display: flex; gap: 8px; align-items: center; }
        .code-row-inputs select { flex: 3; margin: 0; }
        .code-row-inputs input { flex: 1; margin: 0; }
        .sonstige-input { margin-top: 6px; display: none; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .reports-grid { display: grid; gap: 20px; margin-top: 20px; }
        @media(min-width: 768px) { .reports-grid { grid-template-columns: repeat(2, 1fr); } }
        @media(min-width: 1200px) { .reports-grid { grid-template-columns: repeat(3, 1fr); } }
        .report-box { background: #f8fafc; border: 1px solid var(--border); padding: 18px; border-radius: 18px; }
        #workerOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .overlay-content { background: white; width: 95%; max-width: 450px; max-height: 80vh; overflow-y: auto; border-radius: 20px; padding: 25px; }
        .worker-opt { padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .worker-opt:hover { background: #e0f2fe; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <h2 style="color:var(--primary);">⚡ APG LOGIN</h2>
        <p>Nachname & Personalnummer</p>
        <input type="text" id="userInp" placeholder="Nachname">
        <input type="password" id="passInp" placeholder="Passwort">
        <button class="main-btn" onclick="checkLogin()">ANMELDEN</button>
        <p id="loginError" style="color:var(--danger); display:none;"></p>
    </div>
</div>

<div id="setPassScreen" style="display:none;">
    <div class="login-card">
        <h3>📌 ERSTES LOGIN</h3>
        <p>Neues Passwort (min. 4 Zeichen)</p>
        <input type="password" id="newPass1" placeholder="Neues Passwort">
        <input type="password" id="newPass2" placeholder="Wiederholen">
        <button class="main-btn" onclick="saveNewPassword()">PASSWORT AKTIVIEREN</button>
    </div>
</div>

<div class="card" id="mainApp">
    <div class="header"><h1>Adler Pelzer Group</h1><p id="currentUserDisplay" style="color:var(--success);"></p></div>
    <div class="grid-2">
        <div><label>📌 Schicht</label><div class="schicht-group"><button class="schicht-btn" onclick="setSchicht('A')">A</button><button class="schicht-btn" onclick="setSchicht('B')">B</button><button class="schicht-btn" onclick="setSchicht('C')">C</button></div></div>
        <div><label>⏳ Schichtart</label><div class="schicht-group"><button class="type-btn" onclick="setSchichtType('Frühschicht')">Früh</button><button class="type-btn" onclick="setSchichtType('Spätschicht')">Spät</button><button class="type-btn" onclick="setSchichtType('Nachtschicht')">Nacht</button></div></div>
    </div>
    <div id="workerDisplayContainer"></div>
    <button class="add-btn" onclick="openWorkerOverlay()">➕ Mitarbeiter</button>
    <div class="grid-2">
        <div><label>📅 Datum</label><input type="date" id="datum"></div>
        <div><label>🏭 Anlage</label><select id="anlage" onchange="onAnlageChange(this.value)"><option value="">Wählen...</option><optgroup label="PUR"><option value="PUR1">PUR1</option><option value="PUR2">PUR2</option><option value="PUR3">PUR3</option><option value="PUR4">PUR4</option><option value="PUR5">PUR5</option><option value="PUR6">PUR6</option><option value="PUR7">PUR7</option><option value="PUR8">PUR8</option><option value="PUR9">PUR9</option></optgroup><optgroup label="Spritzguss"><option value="IM1">IM1</option><option value="IM2">IM2</option><option value="IM3">IM3</option><option value="IM4">IM4</option><option value="IM5">IM5</option><option value="CIM1">CIM1</option></optgroup><option value="COM">Compound</option></select></div>
    </div>
    <div id="ftBox" style="display:none;"><label>🧩 Formträger</label><div class="ft-grid"><button class="ft-btn" onclick="this.classList.toggle('active')">FT1</button><button class="ft-btn" onclick="this.classList.toggle('active')">FT2</button><button class="ft-btn" onclick="this.classList.toggle('active')">FT3</button><button class="ft-btn" onclick="this.classList.toggle('active')">FT4</button><button class="ft-btn" onclick="this.classList.toggle('active')">FT5</button><button class="ft-btn" onclick="this.classList.toggle('active')">FT6</button></div></div>
    <div id="comTimeBox" style="display:none; background:#e0f2fe; padding:10px; border-radius:10px; text-align:center;">Compound: <span id="comTotal">0</span> / 480 Min</div>
    <div id="artikelContainer"></div>
    <button class="add-btn" id="addArtikelBtn" disabled onclick="addArtikel()">📦 + Artikel</button>
    <button id="mainSendBtn" class="main-btn" disabled onclick="sendReport()">📤 SPEICHERN & SENDEN</button>
</div>

<div class="dashboard-card" id="adminPanel">
    <div class="header">
        <h1>📊 APG Live Dashboard</h1>
        <p id="adminUserDisplay"></p>
        <div id="rightsManagementBox" style="background:#e0f2fe; padding:12px; border-radius:12px; margin-bottom:20px; display:none;">
            <select id="rightsSelect" style="width:auto; min-width:160px;"></select>
            <select id="assignedSchichtSelect"><option value="A">A</option><option value="B">B</option><option value="C">C</option></select>
            <button class="sub-btn" onclick="grantSchichtleiterRights()">➕ Berechtigung</button>
            <div id="currentManagersList" style="font-size:12px; margin-top:8px;"></div>
        </div>
        <div class="schicht-group" style="max-width:400px; margin:15px auto;">
            <button class="filter-btn" onclick="filterSchicht('A')">🔵 A</button>
            <button class="filter-btn active-filter" onclick="filterSchicht('B')">🟢 B</button>
            <button class="filter-btn" onclick="filterSchicht('C')">🟠 C</button>
        </div>
        <button class="main-btn" style="padding:12px; max-width:300px; margin:0 auto;" onclick="loadDashboard()">🔄 Aktualisieren</button>
    </div>
    <div id="reportsContainer" class="reports-grid"></div>
</div>

<div id="workerOverlay">
    <div class="overlay-content">
        <h3>👥 Mitarbeiter</h3>
        <div id="workerList"></div>
        <input type="text" id="manualWorker" placeholder="Name manuell">
        <button class="add-btn" onclick="addManualWorker()">➕ Hinzufügen</button>
        <button class="main-btn" onclick="closeOverlay()">Schließen</button>
    </div>
</div>

<script>
// ============================================
// APG BOCHUM - FERTIG
// ============================================

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyjS7IhxBkTMbAe6tZPWnvLtbl8_wvKhsEQONFBBpcwcH3gDwF-0Euk3n1Ty5SXd2l9LQ/exec";

let currentUser = "";
let currentSchicht = "B";
let currentSchichtType = "Spätschicht";
let selectedStaff = [];
let artikelCounter = 0;
let currentFilter = "B";
let schichtLeiterDb = JSON.parse(localStorage.getItem('apg_schichtleiter_db') || '{}');
let userPasswords = {};

// ========== KULLANICILAR ==========
const DEFAULT_PASSWORDS = {
    "Keskin": "517", "Uzun": "1433", "Kunert": "502", "Aldirmaz": "577", "Beher": "510",
    "Brand": "1722", "Keskin Mur.": "518", "Naumann": "999", "Schönborn": "1361",
    "Karali": "533", "Mikuczynski": "1212", "Türkmen": "1213", "Amrouch": "1268",
    "Stania": "1368", "Kantaroglu": "1382", "Krancioch": "1405", "Held": "1421",
    "Berisha": "1534", "Neji": "1536", "Mulugeta": "1633", "Udezue": "1686", "Jansen": "1692",
    "Aksoy": "1704", "Yildirim": "1710", "Louze": "1724", "Blanquez": "1725", "Diallo": "1726",
    "Sener": "1731", "Klomrit": "1070", "Garcia": "339", "Anderwald": "509", "Bayrakli": "1377",
    "Kilic": "1384", "Maafi": "1273", "Besche": "1472", "Eickhoff": "1406", "Toth": "1699",
    "Gibba": "1367", "Helf": "1483", "Isbir": "1715", "Jeyakumar": "1698", "Kalisch": "1451",
    "Kowarsch": "484", "Nowak": "1390", "Pähler": "1332", "Patarcsity": "1700", "Pulendran": "1498",
    "Sahin": "1721", "Savas": "1360", "Schiavitelli": "1669", "Uluyüz": "1450", "Keskinmus": "518",
    "Katenz": "000", "Rafo": "1277", "Gertz": "1357", "Fortes": "1381", "Sakaguchi M.": "1391",
    "Mercan": "1437", "Krämer": "1449", "Juretzka": "1473", "Kumbara": "1474", "Skupio": "1475",
    "Skrago": "1484", "Bah": "1684", "Kaya": "1712", "Jdea": "1701", "Toure": "1713",
    "Schneider": "1714", "Tchaleu": "1723"
};

const WORKER_DATA = {
    "A": ["Kunert M.", "Karali O.", "Mikuczynski K.", "Türkmen E.", "Amrouch M.", "Stania D.", "Kantaroglu A.", "Krancioch A.", "Held D.", "Berisha I.", "Neji M.", "Mulugeta G.", "Udezue P.", "Jansen M.", "Aksoy O.", "Yildirim S.", "Brand N.", "Louze A.", "Blanquez Romero V.", "Diallo M.D.", "Sener E.", "Klomrit", "Garcia"],
    "B": ["Keskin Mur.", "Aldirmaz P.", "Anderwald R.", "Bayrakli F.", "Kilic D.", "Maafi T.", "Besche T.", "Eickhoff P.", "Toth Renata", "Gibba n.", "Helf A.", "Isbir J.", "Jeyakumar S.", "Kalisch T.", "Kowarsch R.", "Nowak M.", "Pähler D.", "Patarcsity V.", "Pulendran K.", "Sahin E.", "Savas S.", "Schiavitelli", "Uluyüz B.", "Uzun S.", "Klomrit", "Garcia"],
    "C": ["Beher T.", "Keskin Mustafa", "Kantaroglu Ö.", "Savas R.", "Rafo S.", "Gertz Kevin", "Gertz S.", "Schönborn Ch.", "Fortes Ch.", "Sakaguchi M.", "Mercan M.", "Krämer Ch.", "Juretzka T.", "Kumbara E.", "Skupio D.", "Skrago T.", "Bah A.", "Kaya A.", "Jdea A.", "Toure A.", "Schneider D.", "Tchaleu Bertrand", "Keskinmus", "Klomrit", "Garcia"]
};

const CODE_DATA = {
    PUR: { aus: ["6-2-01 Temperatur","6-2-02 Schaum haftet nicht","Sonstige"], stoer: ["3-01 WZ-Wechsel","Sonstige"] },
    Spritz: { aus: ["6-1-01 Anfahrschrott","Sonstige"], stoer: ["3-01 WZ-Wechsel","Sonstige"] },
    COM: { aus: ["6-3-01 Anfahrschrott","Sonstige"], stoer: ["3-01 WZ-Wechsel","Sonstige"] }
};

// ========== LOGIN ==========
async function checkLogin() {
    let u = document.getElementById('userInp').value.trim();
    let p = document.getElementById('passInp').value.trim();
    let err = document.getElementById('loginError');
    if (!DEFAULT_PASSWORDS[u]) { err.innerText = "❌ Benutzer nicht gefunden!"; err.style.display = 'block'; return; }
    try {
        let res = await fetch(`${SCRIPT_URL}?action=getUsers`);
        let data = await res.json();
        userPasswords = data;
    } catch(e) {}
    let saved = userPasswords[u]?.sifre;
    let def = DEFAULT_PASSWORDS[u];
    let first = userPasswords[u]?.ilkGiris === "Ja";
    if ((!saved || first) && def === p) {
        currentUser = u;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('setPassScreen').style.display = 'flex';
        return;
    }
    if (saved === p) {
        currentUser = u;
        document.getElementById('loginScreen').style.display = 'none';
        if (u === "Keskin") {
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('adminUserDisplay').innerHTML = "👑 Willkommen, " + u;
            document.getElementById('rightsManagementBox').style.display = 'block';
            loadUserSelect();
            updateManagersList();
            loadDashboard();
        } else if (schichtLeiterDb[u]) {
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('adminUserDisplay').innerHTML = "👔 " + u + " (Schichtleiter " + schichtLeiterDb[u] + ")";
            document.getElementById('rightsManagementBox').style.display = 'none';
            currentFilter = schichtLeiterDb[u];
            loadDashboard();
        } else {
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('currentUserDisplay').innerHTML = "👤 Angemeldet: " + u;
            setTodayDate();
            let found = "B";
            if(WORKER_DATA["A"].some(w => w.includes(u))) found = "A";
            if(WORKER_DATA["C"].some(w => w.includes(u))) found = "C";
            setSchicht(found);
        }
    } else { err.innerText = "❌ Falsches Passwort!"; err.style.display = 'block'; }
}

async function saveNewPassword() {
    let p1 = document.getElementById('newPass1').value;
    let p2 = document.getElementById('newPass2').value;
    if (p1.length < 4) { alert("Min. 4 Zeichen!"); return; }
    if (p1 !== p2) { alert("Passwörter stimmen nicht!"); return; }
    await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "updatePassword", username: currentUser, password: p1 }) });
    alert("✅ Passwort geändert!");
    document.getElementById('setPassScreen').style.display = 'none';
    if (currentUser === "Keskin") {
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminUserDisplay').innerHTML = "👑 Willkommen, " + currentUser;
        loadDashboard();
    } else if (schichtLeiterDb[currentUser]) {
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminUserDisplay').innerHTML = "👔 " + currentUser + " (Schichtleiter " + schichtLeiterDb[currentUser] + ")";
        loadDashboard();
    } else {
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('currentUserDisplay').innerHTML = "👤 Angemeldet: " + currentUser;
        setTodayDate();
    }
}

function loadUserSelect() {
    let s = document.getElementById('rightsSelect');
    s.innerHTML = '<option value="">Mitarbeiter...</option>' + Object.keys(DEFAULT_PASSWORDS).filter(u => u !== "Keskin").map(u => `<option value="${u}">${u}</option>`).join('');
}
function grantSchichtleiterRights() {
    let name = document.getElementById('rightsSelect').value;
    let sch = document.getElementById('assignedSchichtSelect').value;
    if (!name) return;
    schichtLeiterDb[name] = sch;
    localStorage.setItem('apg_schichtleiter_db', JSON.stringify(schichtLeiterDb));
    updateManagersList();
    alert(`✅ ${name} ist jetzt Schichtleiter ${sch}`);
}
function removeSchichtleiterRight(name) {
    if (confirm(`${name} entfernen?`)) { delete schichtLeiterDb[name]; localStorage.setItem('apg_schichtleiter_db', JSON.stringify(schichtLeiterDb)); updateManagersList(); alert(`❌ ${name} entfernt`); }
}
function updateManagersList() {
    let entries = Object.entries(schichtLeiterDb);
    let html = "Schichtleiter: ";
    if (entries.length === 0) html += "keine";
    else html += entries.map(([n,s]) => `${n} (${s}) <span onclick="removeSchichtleiterRight('${n}')" style="color:var(--danger); cursor:pointer;">✕</span>`).join(', ');
    document.getElementById('currentManagersList').innerHTML = html;
}

// ========== DASHBOARD ==========
function filterSchicht(s) {
    currentFilter = s;
    document.querySelectorAll('.filter-btn').forEach(btn => { btn.classList.remove('active-filter'); btn.style.background = "#e2e8f0"; });
    event.target.classList.add('active-filter');
    event.target.style.background = "#0284c7";
    event.target.style.color = "white";
    loadDashboard();
}
async function loadDashboard() {
    let container = document.getElementById('reportsContainer');
    container.innerHTML = '<div style="text-align:center">📡 Laden...</div>';
    try {
        let res = await fetch(`${SCRIPT_URL}?action=getReports&schicht=${currentFilter}`);
        let reports = await res.json();
        if (!reports.length) { container.innerHTML = `<p style="text-align:center">📭 Keine Berichte für Schicht ${currentFilter}</p>`; return; }
        reports.sort((a,b) => new Date(b.datum) - new Date(a.datum));
        container.innerHTML = reports.map(r => `
            <div class="report-box">
                <div style="display:flex; justify-content:space-between; border-bottom:1px solid var(--border); padding-bottom:6px; margin-bottom:8px;">
                    <span style="color:var(--primary); font-weight:bold;">📅 ${r.datum}</span><span>👤 ${r.user}</span>
                </div>
                <div><b>${r.anlage}</b> ${r.formtraeger ? `[FT: ${r.formtraeger}]` : ''}</div>
                <div>📦 ${r.artikelNummer}</div>
                <div>✅ Gut: <b style="color:var(--success);">${r.gutteile}</b> | ❌ Aus: <b style="color:var(--danger);">${r.ausschussGesamt}</b></div>
                ${r.ausschussDetails !== "Keine" ? `<div>↳ ${r.ausschussDetails}</div>` : ''}
                ${r.stoerungDetails !== "Keine" ? `<div>⚙️ ${r.stoerungDetails}</div>` : ''}
                <div style="margin-top:8px;">👥 ${r.mitarbeiter}</div>
            </div>
        `).join('');
    } catch(e) { container.innerHTML = `<p style="color:var(--danger);">❌ Fehler</p>`; }
}

// ========== İŞÇİ EKRANI ==========
function setTodayDate() {
    let d = new Date();
    document.getElementById('datum').value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function setSchicht(s) {
    currentSchicht = s;
    document.querySelectorAll('.schicht-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`.schicht-btn[onclick="setSchicht('${s}')"]`)?.classList.add('active');
    selectedStaff = [];
    renderStaff();
}
function setSchichtType(t) {
    currentSchichtType = t;
    document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
    if(t === 'Frühschicht') document.querySelector('.type-btn[onclick="setSchichtType(\'Frühschicht\')"]')?.classList.add('active');
    if(t === 'Spätschicht') document.querySelector('.type-btn[onclick="setSchichtType(\'Spätschicht\')"]')?.classList.add('active');
    if(t === 'Nachtschicht') document.querySelector('.type-btn[onclick="setSchichtType(\'Nachtschicht\')"]')?.classList.add('active');
}
function openWorkerOverlay() {
    document.getElementById('workerList').innerHTML = WORKER_DATA[currentSchicht].map(w => `<div class="worker-opt" onclick="addStaff('${w}')">${w}</div>`).join('');
    document.getElementById('workerOverlay').style.display = 'flex';
}
function addStaff(n) { if(!selectedStaff.includes(n)) selectedStaff.push(n); closeOverlay(); renderStaff(); liveCheck(); }
function addManualWorker() { let v = document.getElementById('manualWorker').value.trim(); if(v) { selectedStaff.push("✍️ "+v); document.getElementById('manualWorker').value=''; closeOverlay(); renderStaff(); liveCheck(); } }
function closeOverlay() { document.getElementById('workerOverlay').style.display = 'none'; }
function renderStaff() {
    let c = document.getElementById('workerDisplayContainer');
    if (!selectedStaff.length) c.innerHTML = '<div class="selected-worker" style="color:#94a3b8;">Keine Mitarbeiter</div>';
    else c.innerHTML = selectedStaff.map(s => `<div class="selected-worker"><span>${s}</span><span onclick="removeStaff('${s}')" style="color:var(--danger); cursor:pointer;">✕</span></div>`).join('');
}
function removeStaff(n) { selectedStaff = selectedStaff.filter(x => x !== n); renderStaff(); liveCheck(); }
function onAnlageChange(v) {
    document.getElementById('ftBox').style.display = v.startsWith("PUR") ? "block" : "none";
    document.getElementById('comTimeBox').style.display = v === "COM" ? "block" : "none";
    document.getElementById('addArtikelBtn').disabled = v === "";
    document.getElementById('artikelContainer').innerHTML = "";
    artikelCounter = 0;
    liveCheck();
}
function addArtikel() {
    let id = Date.now() + artikelCounter++;
    let c = document.getElementById('artikelContainer');
    let isCom = document.getElementById('anlage').value === 'COM';
    let d = document.createElement('div'); d.className = "section-card artikel-row"; d.id = `art_${id}`;
