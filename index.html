<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APG BOCHUM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f172a;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background: #1e293b;
            padding: 40px 30px;
            border-radius: 32px;
            border: 2px solid #38bdf8;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        h2 {
            color: #38bdf8;
            margin-bottom: 20px;
            font-size: 28px;
        }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 24px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            border-radius: 24px;
            border: none;
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }
        .error {
            color: #ef4444;
            margin-top: 15px;
            font-size: 14px;
        }
        .success {
            color: #22c55e;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>⚡ APG LOGIN</h2>
    <input type="text" id="username" placeholder="Nachname">
    <input type="password" id="password" placeholder="Passwort">
    <button onclick="login()">ANMELDEN</button>
    <div id="message"></div>
</div>

<script>
    // KULLANICILAR (Nachname : Passwort)
    const USERS = {
        "Keskin": "517",
        "Uzun": "1433",
        "Kunert": "502",
        "Aldirmaz": "577",
        "Beher": "510"
    };

    function login() {
        let username = document.getElementById('username').value.trim();
        let password = document.getElementById('password').value.trim();
        let msgDiv = document.getElementById('message');
        
        if (USERS[username] && USERS[username] === password) {
            msgDiv.innerHTML = '<span class="success">✅ Login erfolgreich! Willkommen ' + username + '</span>';
            msgDiv.style.color = "#22c55e";
            // Buraya ana uygulama gelecek
        } else {
            msgDiv.innerHTML = '<span class="error">❌ Falscher Benutzername oder Passwort!</span>';
        }
    }
</script>

</body>
</html>
