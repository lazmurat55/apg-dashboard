        .header { 
            text-align: center; 
            border-bottom: 3px solid var(--primary);

            padding-bottom: 0.75rem;

// Check if current time is in auto-refresh window
function isInRefreshWindow() {
    const now = new Date();
    const currentTime = now.getHours() * 100 + now.getMinutes();
    return REFRESH_WINDOWS.some(window => currentTime >= window.start && currentTime <= window.end);
}

// Get next refresh window time for display
function getNextRefreshTime() {
    const now = new Date();
    const currentTime = now.getHours() * 100 + now.getMinutes();
    
    for(let window of REFRESH_WINDOWS) {
        if(currentTime < window.start) {
            return { start: window.start, end: window.end };
        }
    }
    return REFRESH_WINDOWS[0]; // Next day first window
}

function formatTimeFromNumber(timeNum) {
    const hours = Math.floor(timeNum / 100);
    const minutes = timeNum % 100;
    return `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}`;
}

function updateRefreshInfoText() {
    const infoDiv = document.getElementById('refreshInfoText');
    const indicator = document.getElementById('liveIndicator');
    
    if(isInRefreshWindow()) {
        indicator.className = "live-indicator active";
        indicator.innerHTML = "🔄 Auto-Refresh aktiv (alle 90 Sek.)";
        infoDiv.innerHTML = "✅ Automatische Aktualisierung ist AKTIV (13:30-14:10 / 21:30-22:10 / 05:30-06:10)";
    } else {
        indicator.className = "live-indicator inactive";
        indicator.innerHTML = "⏸ Auto-Refresh inaktiv";
        const next = getNextRefreshTime();
        infoDiv.innerHTML = `⏳ Nächste Auto-Aktualisierung: ${formatTimeFromNumber(next.start)} - ${formatTimeFromNumber(next.end)} Uhr | <strong style="color:var(--primary);">👉 Manuell aktualisieren mit Button</strong>`;
    }
}

            console.log("Auto-refresh triggered at", new Date().toLocaleTimeString());
            loadAdminDashboard();
        }, 90000); // 90 seconds
        isAutoRefreshActive = true;
    } else {
        isAutoRefreshActive = false;
    }
    updateRefreshInfoText();
}

// Check every minute if refresh window changed
setInterval(() => {
    const shouldBeActive = isInRefreshWindow();
    if(shouldBeActive !== isAutoRefreshActive) {
        manageAutoRefresh();
        if(shouldBeActive && document.getElementById('adminPanel').style.display === 'block') {
            loadAdminDashboard(); // Load immediately when entering window
        }
    }
}, 60000); // Check every minute

function manualRefreshDashboard() {
    loadAdminDashboard();
    // Show feedback
    const btn = event?.target;
    if(btn) {
        const originalText = btn.innerText;
        btn.innerText = "🔄 Aktualisiere...";
        setTimeout(() => { btn.innerText = originalText; }, 1000);
    }
}

function setInitialTodayDate() {
    const today = new Date();
    document.getElementById('datum').value = today.toISOString().slice(0,10);
}

function checkLogin() {
    const u = document.getElementById('userInp').value.trim();
    const p = document.getElementById('passInp').value.trim();
    const err = document.getElementById('loginError');
    if(!initialDB[u]) { err.innerText = "❌ Benutzer nicht gefunden!"; err.style.display='block'; return; }
    if(initialDB[u] === p) { enterApp(u); }
    else { err.innerText = "❌ Falsches Passwort!"; err.style.display='block'; }
}

function saveNewPassword() { alert("Passwort geändert"); enterApp(loggedInUser); }

function enterApp(u) {
    loggedInUser = u;
    document.getElementById('loginScreen').style.display = 'none';
    setInitialTodayDate();
    
    if(u === superAdmin) {
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminUserDisplay').innerHTML = "👑 Admin: " + u;
        document.getElementById('rightsManagementBox').style.display = 'flex';
        loadUserSelect();
        updateManagersList();
        filterSchicht('B');
        manageAutoRefresh();
        loadAdminDashboard();
    } else if(schichtLeiterDb[u]) {
        const assigned = schichtLeiterDb[u];
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminUserDisplay').innerHTML = `🏃 Schichtleiter: ${u} (Vardiya ${assigned})`;
        document.getElementById('rightsManagementBox').style.display = 'none';
        document.querySelectorAll('.filter-btn').forEach(btn => btn.style.display = 'none');
        let target = document.getElementById('flt' + assigned);
        if(target) { target.style.display = 'inline-block'; target.classList.add('active-filter'); }
        filterSchicht(assigned);
        manageAutoRefresh();
        loadAdminDashboard();
    } else {
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('currentUserDisplay').innerHTML = "👤 Angemeldet: " + u;
        let found = "B";
        if(workerData["A"].some(w => w.includes(u.split(" ")[0]))) found = "A";
        if(workerData["C"].some(w => w.includes(u.split(" ")[0]))) found = "C";
        setSchicht(found);
    }
}

function setSchicht(s) { 
    currentSchicht = s; 
    document.querySelectorAll('.schicht-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById('mSchicht' + s)?.classList.add('active');
    selectedStaff = []; renderStaff();
    if(s==="A") setSchichtType('Frühschicht');
    else if(s==="B") setSchichtType('Spätschicht');
    else setSchichtType('Nachtschicht');
}

function setSchichtType(t) { 
    currentSchichtType = t; 
    document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
    if(t === 'Frühschicht') document.querySelector('.type-btn[onclick="setSchichtType(\'Frühschicht\')"]')?.classList.add('active');
    if(t === 'Spätschicht') document.querySelector('.type-btn[onclick="setSchichtType(\'Spätschicht\')"]')?.classList.add('active');
    if(t === 'Nachtschicht') document.querySelector('.type-btn[onclick="setSchichtType(\'Nachtschicht\')"]')?.classList.add('active');
}

function openWorkerOverlay() { 
    document.getElementById('workerList').innerHTML = workerData[currentSchicht].map(w => `<div class="worker-opt" onclick="addStaff('${w.replace(/'/g, "\\'")}')">${w}</div>`).join(""); 
    document.getElementById('workerOverlay').style.display='flex'; 
}

function addStaff(n) { if(!selectedStaff.includes(n)) selectedStaff.push(n); closeOverlay(); renderStaff(); }
function addManualWorker() { let v=document.getElementById('manualWorker').value.trim(); if(v){ selectedStaff.push("✍️ "+v); document.getElementById('manualWorker').value=""; closeOverlay(); renderStaff(); } }
function closeOverlay() { document.getElementById('workerOverlay').style.display='none'; }
function renderStaff() { document.getElementById('workerDisplayContainer').innerHTML = selectedStaff.map(s => `<div class="selected-worker"><span>${s}</span><span onclick="removeStaff('${s.replace(/'/g, "\\'")}')" style="color:var(--danger);cursor:pointer;">✕</span></div>`).join(""); checkFormValidity(); }

function removeStaff(n) { selectedStaff = selectedStaff.filter(x=>x!==n); renderStaff(); }

function onAnlageChange(v) { 
    document.getElementById('ftBox').style.display = v.startsWith("PUR") ? "block" : "none";
    document.getElementById('comTimeBox').style.display = v === "COM" ? "block" : "none";
    document.getElementById('artikelContainer').innerHTML = "";
    document.getElementById('addArtikelBtn').disabled = v === "";
    checkFormValidity();
}

let artikelCounter = 0;
function addArtikel() {
    const id = Date.now() + artikelCounter++;
    const div = document.createElement('div'); div.className = "section-card artikel-row"; div.id = `art_${id}`;
    div.innerHTML = `<button onclick="this.parentElement.remove(); checkFormValidity();" style="position:absolute; right:12px; top:12px; background:var(--danger); color:white; border:none; border-radius:30px; width:28px; height:28px; cursor:pointer;">✕</button>
        <label>📌 Artikelnummer</label><input type="text" class="art-name" placeholder="z.B. 123456">
        ${document.getElementById('anlage').value === 'COM' ? '<label>⏱️ Dauer (Min)</label><input type="number" class="art-duration" placeholder="Minuten" oninput="checkFormValidity()">' : ''}
        <div class="grid-2"><div><label>✅ Gutteile</label><input type="number" class="art-gut" placeholder="Stk"></div><div><label>❌ Aus Gesamt</label><input type="number" class="art-aus-total" placeholder="Stk" oninput="checkFormValidity()"></div></div>
        <div class="status-badge" id="badge_${id}"></div><div id="rows_${id}"></div>
        <div style="display:flex; gap:12px; margin-top:12px;"><button class="sub-btn" onclick="addRow('${id}','aus')">+ Ausschuss</button><button class="sub-btn" onclick="addRow('${id}','stoer')">+ Störung</button></div>`;
    document.getElementById('artikelContainer').appendChild(div);
    checkFormValidity();
}

function addRow(artId, type) {
    const anl = document.getElementById('anlage').value;
    const cat = anl === 'COM' ? 'COM' : (anl.startsWith("PUR") ? 'PUR' : 'Spritz');
    const div = document.createElement('div'); div.className = "code-row";
    div.innerHTML = `<div class="code-row-inputs">
        <select class="${type}-select">${codeData[cat][type].map(c => `<option value="${c}">${c}</option>`).join("")}</select>
        <input type="number" class="${type}-value" placeholder="${type==='aus'?'Stk':'Min'}" oninput="checkFormValidity()">
        <button onclick="this.parentElement.parentElement.remove(); checkFormValidity();" style="color:var(--danger); background:none; border:none; font-size:20px;">✕</button></div>
        <input type="text" class="sonstige-input" placeholder="Grund manuell..." style="display:none;">`;
    document.getElementById(`rows_${artId}`).appendChild(div);
    const sel = div.querySelector(`.${type}-select`);
    const sonst = div.querySelector('.sonstige-input');
    sel.onchange = () => { sonst.style.display = sel.value === 'Sonstige' ? 'block' : 'none'; };
    checkFormValidity();
}

function checkFormValidity() {
    let allValid = true;
    let totalCompound = 0;
    const sendBtn = document.getElementById('mainSendBtn');
    
    document.querySelectorAll('.artikel-row').forEach(row => {
        const ausTotal = parseInt(row.querySelector('.art-aus-total')?.value) || 0;
        let sumAus = 0;
        row.querySelectorAll('.aus-value').forEach(inp => sumAus += parseInt(inp.value) || 0);
        const badge = row.querySelector('.status-badge');
        
        if (ausTotal > 0 && sumAus !== ausTotal) {
            badge.className = "status-badge status-error";
            badge.innerText = `⚠️ Differenz: ${sumAus}/${ausTotal}`;
            allValid = false;
        } else if (ausTotal > 0 && sumAus === ausTotal) {
            badge.className = "status-badge status-ok";
            badge.innerText = `✅ OK: ${sumAus}/${ausTotal}`;
        } else if (sumAus > 0 && ausTotal === 0) {
            badge.className = "status-badge status-ok";
            badge.innerText = `📝 Auto: ${sumAus}`;
            row.querySelector('.art-aus-total').value = sumAus;
        } else {
            badge.innerText = "";
        }
        
        if(document.getElementById('anlage').value === 'COM') {
            totalCompound += parseInt(row.querySelector('.art-duration')?.value) || 0;
        }
    });
    
    document.getElementById('comTotal').innerText = totalCompound;
    if(totalCompound > 480) {
        allValid = false;
        sendBtn.innerText = "⚠️ Compound: max 480 Min!";
        sendBtn.disabled = true;
        return;
    }
    
    const hasWorkers = selectedStaff.length > 0;
    const hasAnlage = document.getElementById('anlage').value !== "";
    const hasRows = document.querySelectorAll('.artikel-row').length > 0;
    
    if(!hasWorkers) {
        sendBtn.innerText = "👥 Mitarbeiter hinzufügen";
        sendBtn.disabled = true;
    } else if(!hasAnlage) {
        sendBtn.innerText = "🏭 Anlage wählen";
        sendBtn.disabled = true;
    } else if(!hasRows) {
        sendBtn.innerText = "📦 Artikel hinzufügen";
        sendBtn.disabled = true;
    } else if(!allValid) {
        sendBtn.innerText = "⚠️ Ausschuss-Korrektur erforderlich";
        sendBtn.disabled = true;
    } else {
        sendBtn.innerText = "🚀 SPEICHERN & SENDEN";
        sendBtn.disabled = false;
    }
}

function loadUserSelect() {
    const select = document.getElementById('rightsSelect');
    select.innerHTML = '<option value="">Mitarbeiter wählen...</option>' + 
                       '<option value="__CLEAR_ALL__" style="color:var(--danger); font-weight:bold;">⚠️ Alle Berechtigungen löschen</option>' +
                       Object.keys(initialDB).filter(x => x !== superAdmin).map(u => `<option value="${u}">${u}</option>`).join('');
}

function grantSchichtleiterRights() {
    const name = document.getElementById('rightsSelect').value;
    const schicht = document.getElementById('assignedSchichtSelect').value;
    if(!name || name === "__CLEAR_ALL__") { alert("Bitte einen Mitarbeiter wählen!"); return; }
    schichtLeiterDb[name] = schicht;
    localStorage.setItem('apg_schichtleiter_db', JSON.stringify(schichtLeiterDb));
    updateManagersList();
    alert(`✅ ${name} wurde für Schicht ${schicht} autorisiert.`);
}

function removeSchichtleiterRight(name) {
    if(confirm(`Möchten Sie die Berechtigung für ${name} wirklich löschen?`)) {
        delete schichtLeiterDb[name];
        localStorage.setItem('apg_schichtleiter_db', JSON.stringify(schichtLeiterDb));
        updateManagersList();
        alert(`❌ Berechtigung für ${name} wurde aufgehoben.`);
    }
}

function updateManagersList() { 
    let listText = "Aktiv: ";
    const entries = Object.entries(schichtLeiterDb);
    if(entries.length === 0) { listText += "Keine Leiter zugewiesen"; } 
    else { listText += entries.map(([name, schicht]) => `${name} (${schicht})<span class="delete-manager-btn" onclick="removeSchichtleiterRight('${name}')" title="Löschen">✕</span>`).join(', '); }
    document.getElementById('currentManagersList').innerHTML = listText; 
}

function filterSchicht(s) {
    activeFilterSchicht = s;
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active-filter'));
    document.getElementById('flt' + s)?.classList.add('active-filter');
    loadAdminDashboard();
}

async function loadAdminDashboard() {
    const container = document.getElementById('reportsContainer');
    if(!container || container.length === 0) return;
    
    try {
        container.innerHTML = '<div style="text-align:center; padding:40px;">⏳ Lade Daten...</div>';
        const response = await fetch(`${scriptURL}?action=getReports&schicht=${activeFilterSchicht}&_cb=${Date.now()}`);
        
        if (!response.ok) throw new Error("Server error: " + response.status);
        const data = await response.json();
        
        container.innerHTML = "";
        
        if(!data || data.length === 0) {
            container.innerHTML = `<p style="text-align:center; color:var(--text-muted); grid-column: 1/-1;">Keine Berichte für Schicht ${activeFilterSchicht} gefunden.</p>`;
            return;
        }
        
        data.forEach(r => {
            const box = document.createElement('div');
            box.className = "report-box";
            let ftText = r.formtraeger ? `<div style="font-size:12px; color:var(--primary); margin-bottom:5px;">🧩 FT: ${r.formtraeger}</div>` : '';
            let durationText = r.dauer ? `<span style="color:var(--text-muted)"> (${r.dauer} Min)</span>` : '';
            
            box.innerHTML = `
                <div class="badge-origin">${r.anlage}</div>
                <div class="report-date">📅 ${r.datum} - ⏳ ${r.schichtType}</div>
                ${ftText}
                <div class="report-artikel">📦 ArtNr: ${r.artikelNummer}${durationText}</div>
                <div class="report-ausschuss">✅ Gut: ${r.gutteile} | ❌ Aus: ${r.ausschussGesamt}</div>
                <div style="font-size:12px; margin-top:5px; color:var(--text-muted)">
                    <div>⚠️ Fehler: ${r.ausschussDetails || 'Keine'}</div>
                    <div>⚙️ Störungen: ${r.stoerungDetails || 'Keine'}</div>
                </div>
                <div class="report-workers">👥 ${r.mitarbeiter}</div>
            `;
            container.appendChild(box);
        });
    } catch (error) {
        console.error("Dashboard error:", error);
        container.innerHTML = `<p style="text-align:center; color:var(--danger); grid-column: 1/-1;">❌ Fehler beim Laden: ${error.message}</p>`;
    }
}

async function processReport() {
    const sendBtn = document.getElementById('mainSendBtn');
    sendBtn.disabled = true;
    sendBtn.innerText = "⏳ SENDEN...";
    
    const anlage = document.getElementById('anlage').value;
    const datum = document.getElementById('datum').value;
    
    let selectedFTs = [];
    document.querySelectorAll('.ft-btn.active').forEach(b => selectedFTs.push(b.innerText));
    
    let reportData = {
        action: "saveReport",
        schicht: currentSchicht,
        schichtType: currentSchichtType,
        mitarbeiter: selectedStaff.join(", "),
        datum: datum,
        anlage: anlage,
        formtraeger: selectedFTs.join(", "),
        user: loggedInUser,
        rows: []
    };
    
    document.querySelectorAll('.artikel-row').forEach(row => {
        const artName = row.querySelector('.art-name').value.trim() || "Unbekannt";
        const artGut = row.querySelector('.art-gut').value || "0";
        let artAusTotal = parseInt(row.querySelector('.art-aus-total').value) || 0;
        const duration = row.querySelector('.art-duration')?.value || "";
        
        let ausDetails = [];
        let totalAusFromRows = 0;
        
        row.querySelectorAll('.code-row').forEach(r => {
            const sel = r.querySelector('.aus-select');
            const val = r.querySelector('.aus-value');
            if(sel && val && val.value) {
                let pieceCount = parseInt(val.value) || 0;
                totalAusFromRows += pieceCount;
                let txt = sel.value === 'Sonstige' ? r.querySelector('.sonstige-input').value.trim() : sel.value;
                ausDetails.push(`${txt} (${pieceCount} Stk)`);
            }
        });
        
        if(artAusTotal === 0 && totalAusFromRows > 0) {
            artAusTotal = totalAusFromRows;
        }
        
        let stoerDetails = [];
        row.querySelectorAll('.code-row').forEach(r => {
            const sel = r.querySelector('.stoer-select');
            const val = r.querySelector('.stoer-value');
            if(sel && val && val.value) {
                let txt = sel.value === 'Sonstige' ? r.querySelector('.sonstige-input').value.trim() : sel.value;
                stoerDetails.push(`${txt} (${val.value} Min)`);
            }
        });
        
        reportData.rows.push({
            artikelNummer: artName,
            dauer: duration,
            gutteile: artGut,
            ausschussGesamt: artAusTotal.toString(),
            ausschussDetails: ausDetails.join(" | ") || "Keine",
            stoerungDetails: stoerDetails.join(" | ") || "Keine"
        });
    });
    
    try {
        await fetch(scriptURL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify(reportData)
        });
        
        alert("🚀 Daten erfolgreich an Google Sheets gesendet!");
        
        document.getElementById('artikelContainer').innerHTML = "";
        selectedStaff = [];
        renderStaff();
        document.getElementById('anlage').value = "";
        onAnlageChange("");
    } catch (e) {
        alert("❌ Fehler beim Senden: " + e.toString());
    } finally {
        sendBtn.innerText = "🚀 SPEICHERN & SENDEN";
        checkFormValidity();
    }
}
</script>
